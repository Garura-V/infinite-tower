<script>
/* === v5追加アップデート: 7体ステージ / 素材合成 / 合成鍛冶屋 / 宝部屋 / 極小〜極大オーブ / 超上振れ装備 === */
(()=>{
  const ORB_RANKS={
    micro:{jp:'極小',power:.5,costMul:.75,weight:38},
    small:{jp:'小',power:1,costMul:1,weight:30},
    mid:{jp:'中',power:1.7,costMul:1.8,weight:20},
    large:{jp:'大',power:2.7,costMul:3.4,weight:9},
    huge:{jp:'極大',power:4.4,costMul:7.5,weight:3}
  };
  const ORB_KIND={
    atk:{jp:'攻撃強化',desc:'物理/通常火力アップ'},
    def:{jp:'防御強化',desc:'被ダメージ軽減'},
    hpdrain:{jp:'HPドレイン',desc:'与ダメージをHP吸収'},
    mpdrain:{jp:'MPドレイン',desc:'攻撃時MP回復'},
    crit:{jp:'会心強化',desc:'クリティカル率アップ'},
    luck:{jp:'幸運強化',desc:'宝箱/レアドロップ補助'}
  };
  const POST_ROOM_WEIGHTS=[
    {type:'shop',jp:'Shop',icon:'🏪',w:2},
    {type:'forge',jp:'鍛冶屋',icon:'⚒️',w:3},
    {type:'treasure',jp:'宝部屋',icon:'🎁',w:5}
  ];

  function addV5Style(){
    if(document.getElementById('v5-style'))return;
    const st=document.createElement('style');st.id='v5-style';
    st.textContent=`
      .v5-room-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px}
      .v5-mini{font-size:11px;color:var(--color-text-secondary);line-height:1.7}
      .v5-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:999px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);margin:2px}
      .v5-highroll{background:linear-gradient(90deg,#fff6d8,#f2e8ff,#dff9ff);border-color:#BA7517!important}
    `;
    document.head.appendChild(st);
  }
  addV5Style();

  function ensureRoomScreen(){
    let s=document.getElementById('scr-room');
    if(s)return s;
    s=document.createElement('div');s.id='scr-room';s.className='scr';
    s.innerHTML=`<div class="card" style="margin-bottom:10px;text-align:center;padding:20px">
      <div style="font-size:40px;margin-bottom:8px" id="room-icon">🏪</div>
      <h2 id="room-title" style="margin-bottom:6px">部屋</h2>
      <div class="muted" id="room-text"></div>
    </div>
    <div id="room-body"></div>`;
    const app=document.getElementById('app')||document.body;
    app.appendChild(s);
    return s;
  }

  function weightedPick(list){
    const total=list.reduce((a,b)=>a+b.w,0);let r=Math.random()*total;
    for(const x of list){r-=x.w;if(r<=0)return x;}
    return list[list.length-1];
  }
  function pickRank(){
    const list=Object.entries(ORB_RANKS).map(([id,v])=>({id,...v,w:v.weight}));
    return weightedPick(list);
  }
  function rankByColor(color){
    if(color==='レインボー')return ORB_RANKS.huge;
    if(color==='金')return Math.random()<.65?ORB_RANKS.large:ORB_RANKS.huge;
    if(color==='銀')return Math.random()<.7?ORB_RANKS.mid:ORB_RANKS.large;
    return Math.random()<.75?ORB_RANKS.small:ORB_RANKS.mid;
  }
  function materialTotal(p){return Object.values(p.materials||{}).reduce((a,b)=>a+(b||0),0);}
  function consumeFusionMaterials(p,cost){
    ensureV3State(p);cleanupMaterials&&cleanupMaterials();
    cost=cost||{};
    const needU=cost.universal||0, needAny=cost.any||0, needRare=cost.rare||0;
    if((p.materials['万能素材']||0)<needU)return false;
    let rareHave=Object.entries(p.materials||{}).filter(([k,v])=>String(k).includes('希少')&&v>0).reduce((a,[,v])=>a+v,0);
    let anyHave=materialTotal(p)-(p.materials['万能素材']||0);
    if(rareHave<needRare||anyHave<needAny)return false;
    p.materials['万能素材']-=needU;
    let restRare=needRare;
    Object.keys(p.materials).forEach(k=>{if(restRare>0&&String(k).includes('希少')){const use=Math.min(restRare,p.materials[k]||0);p.materials[k]-=use;restRare-=use;}});
    let restAny=needAny;
    Object.keys(p.materials).forEach(k=>{if(restAny>0&&k!=='万能素材'){const use=Math.min(restAny,p.materials[k]||0);p.materials[k]-=use;restAny-=use;}});
    cleanupMaterials&&cleanupMaterials();
    return true;
  }
  function fusionCostText(cost){
    const parts=[];if(cost.universal)parts.push(`万能素材${cost.universal}`);if(cost.any)parts.push(`魔物素材${cost.any}`);if(cost.rare)parts.push(`希少素材${cost.rare}`);return parts.join(' / ')||'素材なし';
  }
  function weaponFusionCost(a,b){
    const lv=((a&&a.lv)||1)+((b&&b.lv)||1);
    const rarA=ADV_RARITIES.findIndex(r=>r.id===(a&&a.rar));
    const rarB=ADV_RARITIES.findIndex(r=>r.id===(b&&b.rar));
    return {universal:3+Math.ceil(lv/2),any:2+Math.max(0,rarA,rarB),rare:Math.max(0,Math.floor(Math.max(rarA,rarB)/2))};
  }
  function makeUltraWeapon(floor,source){
    const eq=makeEquip('weapon',Math.max(1,(floor||1)+R(6,14)),ADV_RARITIES[4]);
    eq.ultra=true;eq.rar='legend';eq.rarJp='超上振れ';eq.rarCls='r-legend';
    eq.n=`🌈超上振れ ${source||'星落ち'}${pick(['覇剣','魔槍','双牙','天刃','竜剣'])}`;
    eq.lv=(eq.lv||1)+R(3,8);
    eq.stats.atk=Math.round((eq.stats.atk||20)*R(190,280)/100 + (floor||1)*2 + R(20,45));
    eq.stats.STR=(eq.stats.STR||0)+R(4,9);
    eq.stats.DEX=(eq.stats.DEX||0)+R(3,7);
    if(Math.random()<.55)eq.stats.LUK=(eq.stats.LUK||0)+R(2,6);
    return eq;
  }
  function makeOrbItem(rankId,kindId){
    const r=rankId?ORB_RANKS[rankId]:pickRank();
    const kinds=Object.keys(ORB_KIND);const k=kindId||pick(kinds);
    const floor=(G.player&&G.player.floor)||1;
    const base={atk:110,def:115,hpdrain:145,mpdrain:135,crit:150,luck:160}[k]||120;
    return {t:'orb2',orb:{kind:k,rank:Object.keys(ORB_RANKS).find(x=>ORB_RANKS[x]===r)||rankId||'small'},
      n:`スキルオーブ：${ORB_KIND[k].jp}【${r.jp}】`,d:`${ORB_KIND[k].desc} / ランク${r.jp}`,c:Math.round((base+floor*9)*r.costMul)};
  }
  function applyOrbEffect(orb){
    const p=G.player;ensureV3State(p);
    let kind=typeof orb==='string'?orb:(orb&&orb.kind)||'atk';
    let rankId=(orb&&orb.rank)||'small';
    const r=ORB_RANKS[rankId]||ORB_RANKS.small;
    p.skillOrbs.push({kind,rank:rankId,jp:`${ORB_KIND[kind]?.jp||kind}【${r.jp}】`});
    if(kind==='atk')p.physBonus=(p.physBonus||1)+0.08*r.power;
    if(kind==='def')p.dmgReduce=(p.dmgReduce||0)+0.055*r.power;
    if(kind==='hpdrain')p.lifeSteal=(p.lifeSteal||0)+0.07*r.power;
    if(kind==='mpdrain')p.mpOnAtk=(p.mpOnAtk||0)+Math.max(1,Math.round(3*r.power));
    if(kind==='crit')p.critRate=(p.critRate||0)+0.035*r.power;
    if(kind==='luck'){p.stats.LUK=(p.stats.LUK||0)+Math.max(1,Math.round(2*r.power));}
    recalcVitals(p);
  }
  window.applyOrb=function(orb){applyOrbEffect(orb);};

  window.generateShopStock=function(){
    const p=G.player;ensureV3State(p);const f=p.floor;const items=[];
    for(let i=0;i<7;i++){
      const slot=pick(['weapon','weapon','armor','armor','accessory']);
      const eq=(Math.random()<.025)?makeUltraWeapon(f,'商店奇跡'):makeEquip(slot,f);
      items.push({t:'equip',n:eq.n,d:`${eq.rarJp} / ${eq.slot} / ${statText(eq.stats)}`,c:Math.round((eq.ultra?520:35)+f*(eq.ultra?18:6)+(ADV_RARITIES.find(r=>r.id===eq.rar)?.mul||3)*55),eq});
    }
    ['phys','mag','ult'].forEach(type=>{
      items.push({t:'skill',target:type,kind:'power',n:`${type==='phys'?'物理':type==='mag'?'魔法':'ULT'}強化カード`,d:'スキル倍率+0.25',c:90+f*8});
      items.push({t:'skill',target:type,kind:'cost',n:`${type==='phys'?'物理':type==='mag'?'魔法':'ULT'}省エネカード`,d:'消費MP-2',c:70+f*6});
    });
    for(let i=0;i<8;i++)items.push(makeOrbItem());
    if(Math.random()<.06)items.push(makeOrbItem('huge'));
    POTION_DEF.forEach((po,i)=>items.push({t:'potion',pid:po.id,qty:i<2?2:1,n:`${po.jp}${i<2?'×2':''}`,d:`最大HPの${Math.round(po.pct*100)}%回復 / ${po.rare}`,c:20+f*2+i*35}));
    ADV_COLORS.forEach((c,i)=>items.push({t:'key',color:c,n:`${ADV_COLOR_ICON[c]} ${c}の鍵`,d:`${c}宝箱を1回開けられる`,c:30+f*3+i*70}));
    items.push({t:'material',mat:'万能素材',qty:R(4,8),n:'万能素材袋',d:'合成・鍛冶で使う素材',c:45+f*3});
    items.push({t:'material',mat:'希少な結晶素材',qty:R(1,2),n:'希少素材袋',d:'高ランク合成で使う素材',c:120+f*7});
    return items.sort(()=>Math.random()-0.5).slice(0,20);
  };

  window.renderShop=function(){
    const p=G.player;ensureV3State(p);document.getElementById('sh-gold').textContent=p.gold;
    const grid=document.getElementById('shop-grid');grid.style.gridTemplateColumns='repeat(auto-fill,minmax(165px,1fr))';grid.innerHTML='';
    if(!G.shopStock)G.shopStock=generateShopStock();
    G.shopStock.forEach((item,idx)=>{
      const d=document.createElement('div');d.className='card'+(item.eq&&item.eq.ultra?' v5-highroll':'');d.style.cursor=item.sold?'default':'pointer';d.style.opacity=item.sold?.45:1;
      d.innerHTML=`<div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">${item.sold?'✅ ':''}${safeHtml(item.n)}</div>
        <div class="muted" style="margin:3px 0">${safeHtml(item.d)}</div>
        <div style="font-size:12px;color:#BA7517;font-weight:500">💰 ${item.c}G</div>`;
      d.onclick=()=>buyShopItemV3(idx);grid.appendChild(d);
    });
    let reroll=document.getElementById('shop-reroll-btn');
    if(!reroll){reroll=document.createElement('button');reroll.id='shop-reroll-btn';reroll.className='btn';reroll.style='width:100%;margin-top:8px;padding:8px';const leave=document.querySelector('#scr-shop .btn-p');leave.parentNode.insertBefore(reroll,leave);}
    const cost=40+p.floor*3;reroll.textContent=`🔄 リロール（${cost}G）`;reroll.onclick=()=>rerollShop();
    const leaveBtn=document.querySelector('#scr-shop .btn-p');leaveBtn.textContent=G.shopPreboss?'ボス選択に戻る':'次の階層へ進む';
    if(typeof renderShopMaterialTools==='function')renderShopMaterialTools();
    updateQuickActions&&updateQuickActions();
  };

  window.buyShopItemV3=function(idx){
    const item=G.shopStock&&G.shopStock[idx];if(!item||item.sold)return;
    const p=G.player;ensureV3State(p);
    if(p.gold<item.c){addLog('所持金不足！');return;}
    p.gold-=item.c;item.sold=true;
    if(item.t==='equip'){p.inventory.equipment.push(item.eq);addLog(`${item.eq.n}入手！`,'l-i');}
    else if(item.t==='skill'){upgradeSkill(item.target,item.kind);addLog(`${item.n}使用！`,'l-s');}
    else if(item.t==='orb'||item.t==='orb2'){applyOrbEffect(item.orb||item.orbKind||item.orb);addLog(`${item.n}装着！`,'l-s');}
    else if(item.t==='potion'){p.inventory.potions[item.pid]=(p.inventory.potions[item.pid]||0)+(item.qty||1);addLog(`${item.n}購入！`,'l-h');}
    else if(item.t==='key'){p.inventory.keys[item.color]=(p.inventory.keys[item.color]||0)+1;addLog(`${item.color}の鍵+1`,'l-i');}
    else if(item.t==='material'){p.materials[item.mat]=(p.materials[item.mat]||0)+(item.qty||1);addLog(`${item.mat}+${item.qty}`,'l-i');}
    syncEquipmentStats(p);recalcVitals(p);renderShop();try{renderGame();}catch(e){}
  };

  window.fuseWeapons=function(){
    const p=G.player;ensureV3State(p);const used=equippedIds(p);
    const weapons=p.inventory.equipment.filter(x=>x.slot==='weapon'&&!used.has(x.id));
    if(weapons.length<2){addLog('未装備武器が2本必要');return;}
    const a=weapons[0],b=weapons[1];const cost=weaponFusionCost(a,b);
    if(!consumeFusionMaterials(p,cost)){addLog(`合成素材不足：${fusionCostText(cost)}`,'l-w');return;}
    const rarIdx=Math.max(ADV_RARITIES.findIndex(r=>r.id===a.rar),ADV_RARITIES.findIndex(r=>r.id===b.rar));
    const great=Math.random()<(.14+statVal(p,'LUK')*.003);
    const ultra=Math.random()<(.025+statVal(p,'LUK')*.0008)||((a.ultra||b.ultra)&&Math.random()<.22);
    const nw=ultra?makeUltraWeapon(p.floor,'合成大成功'):makeEquip('weapon',p.floor,ADV_RARITIES[Math.min(4,rarIdx+(great?1:0))]);
    nw.n=ultra?nw.n:`合成武器：${a.n.split(' ').pop()}×${b.n.split(' ').pop()}${great?'★':''}`;
    nw.lv=Math.max(a.lv||1,b.lv||1)+(great?2:1);
    nw.stats.atk=Math.round(((a.stats.atk||0)+(b.stats.atk||0))*(great?0.92:0.78)+R(7,18)+(ultra?35:0));
    nw.stats.STR=(a.stats.STR||0)+(b.stats.STR||0)+(great?3:1);
    nw.stats.DEX=(a.stats.DEX||0)+(b.stats.DEX||0)+(great?2:0);
    if(ultra)nw.stats.LUK=(nw.stats.LUK||0)+R(4,8);
    p.inventory.equipment=p.inventory.equipment.filter(x=>x.id!==a.id&&x.id!==b.id);
    p.inventory.equipment.push(nw);
    addLog(`${ultra?'🌈超大成功！':'武器合成成功！'} ${nw.n}`,'l-s');renderInventory();try{renderForgeRoom();}catch(e){}
  };

  function spawnStageWave(){
    const p=G.player;ensureV3State(p);G.stageMode='wave';
    const remain=Math.max(0,(G.stageTotal||7)-(G.stageKills||0));
    if(remain<=0){showPostStageRoom();return;}
    const type=G.stageType||'battle';const count=Math.min(remain,remain<=4?remain:R(3,4));const enemies=[];
    for(let i=0;i<count;i++){
      let elite=type==='elite'?Math.random()<.65:false;
      let floor=p.floor;
      if(type==='danger_wave'){elite=Math.random()<.55;floor+=R(5,12);}
      enemies.push(makeEnemyFromPool(floor,elite));
    }
    G.enemies=enemies;G.enemy=enemies[0];G.turn=0;G.stageWaveNo=(G.stageWaveNo||0)+1;
    go('game');renderGame();
    addLog(`ウェーブ${G.stageWaveNo}: 残り${remain}体中${count}体が出現！`,'l-w');
  }
  function startFloorStage(type){
    const p=G.player;ensureV3State(p);
    G.stageMode='wave';G.stageTotal=7;G.stageKills=0;G.stageWaveNo=0;G.stageType=type||'battle';G.postRoom=null;G.shopStock=null;
    if(type==='boon_wave'){
      const mat=R(2,5);p.materials['万能素材']=(p.materials['万能素材']||0)+mat;addLog(`上振れ！万能素材+${mat}`,'l-i');G.stageType='battle';
    }
    if(type==='danger_wave'){
      p.curses=(p.curses||0)+1;addLog('下振れ！呪い+1、敵が強化された','l-w');
    }
    spawnStageWave();
  }
  window.makeStageOptions=function(){
    const fi=getFloorInSeg();
    if(fi===5){return [
      {type:'boss',icon:'👑',title:'ボスステージ',desc:'セグメント突破戦。勝つと職業解放が進む。',danger:'高'},
      {type:'boss_elite',icon:'💀',title:'凶暴ボス',desc:'かなり危険。ただし報酬と経験値が多い。',danger:'超高'},
      {type:'shop_preboss',icon:'🏪',title:'準備ショップ',desc:'買い物してからボス選択に戻る。',danger:'なし'}
    ];}
    return [
      {type:'battle',icon:'⚔️',title:'探索ステージ',desc:'合計7体を3〜4体ずつ倒す通常ステージ。',danger:'中'},
      {type:'elite',icon:'🔥',title:'エリート混成',desc:'合計7体。エリート率高めで報酬も多め。',danger:'高'},
      {type:Math.random()<.55?'boon_wave':'danger_wave',icon:'❔',title:'イベントステージ',desc:'上振れなら素材、下振れなら呪い＋強敵。',danger:'運'}
    ];
  };
  window.showStageSelect=function(){
    const p=G.player;ensureV3State(p);G.stageMode=null;
    go('stage');renderFloorProg();
    document.getElementById('st-gold').textContent=p.gold;
    document.getElementById('stage-sub').textContent=`${p.floor}階 / 1ステージ7体制 ${getFloorInSeg()}/5階目`;
    const grid=document.getElementById('stage-grid');grid.innerHTML='';
    makeStageOptions().forEach(o=>{
      const d=document.createElement('div');d.className='card stage-card';
      d.innerHTML=`<div style="font-size:30px">${o.icon}</div><div style="font-size:14px;font-weight:600;color:var(--color-text-primary);margin:4px 0">${safeHtml(o.title)}</div>
        <div class="muted">${safeHtml(o.desc)}</div><div style="font-size:11px;margin-top:8px">危険度：${safeHtml(o.danger)}</div>`;
      d.onclick=()=>chooseStage(o.type);grid.appendChild(d);
    });
  };
  window.chooseStage=function(type){
    const p=G.player;ensureV3State(p);p.stageHistory.push({floor:p.floor,type});
    if(type==='shop_preboss'){G.shopPreboss=true;G.shopStock=null;showShop(true);return;}
    if(type==='boss'||type==='boss_elite'){G.stageMode='boss';G.stageType=type;G.stageTotal=1;G.stageKills=0;spawnEnemy(type);return;}
    startFloorStage(type||'battle');
  };
  window.killEnemy=function(){
    const p=G.player;const e=G.enemy;if(!e)return;
    const gold=Math.round((e.g||0)*(p.goldBonus||1));const xp=e.x||0;
    p.gold+=gold;p.xp+=xp;if(p.killHeal>0)p.hp=Math.min(p.maxHp,p.hp+p.killHeal);
    giveMonsterDrops(e);addLog(`${e.n}撃破！ 💰+${gold} XP+${xp}`,'l-h');
    if(G.stageMode==='wave')G.stageKills=(G.stageKills||0)+1;
    G.enemies=(G.enemies||[]).filter(x=>x!==e&&x.hp>0);checkLevelUp();
    if(G.enemies.length>0){setCurrentEnemy();renderGame();return;}
    encounterCleared();
  };
  window.encounterCleared=function(){
    const p=G.player;ensureV3State(p);tryChestDrop();
    if(G.stageMode==='wave'){
      if((G.stageKills||0)<(G.stageTotal||7)){setTimeout(spawnStageWave,350);return;}
      addLog(`ステージクリア！合計${G.stageKills}体撃破`,'l-h');
      setTimeout(showPostStageRoom,450);return;
    }
    if(getFloorInSeg()===5||G.stageMode==='boss'){showClear(true);return;}
    showPostStageRoom();
  };

  function rollPostRoom(){return weightedPick(POST_ROOM_WEIGHTS).type;}
  window.showPostStageRoom=function(){
    const type=rollPostRoom();G.postRoom=type;G.shopPreboss=false;G.shopStock=null;
    if(type==='shop'){addLog('次の部屋：Shop','l-i');showShop(false);return;}
    if(type==='forge'){addLog('次の部屋：鍛冶屋（合成限定）','l-i');showForgeRoom();return;}
    addLog('次の部屋：宝部屋','l-i');showTreasureRoom();
  };

  window.renderForgeRoom=function(){
    ensureRoomScreen();const p=G.player;ensureV3State(p);const used=equippedIds(p);
    const weapons=p.inventory.equipment.filter(x=>x.slot==='weapon'&&!used.has(x.id));
    const a=weapons[0],b=weapons[1];const cost=a&&b?weaponFusionCost(a,b):null;
    const body=document.getElementById('room-body');
    body.innerHTML=`<div class="card" style="margin-bottom:8px;text-align:center">
      <div class="v5-mini">この鍛冶屋は<strong>合成限定</strong>。強化ではなく、未装備武器2本＋素材で新武器を作る。</div>
      <div style="margin-top:8px">所持：万能素材 ${p.materials['万能素材']||0} / 魔物素材 ${materialTotal(p)-(p.materials['万能素材']||0)}</div>
      <div class="v5-mini" style="margin-top:6px">${a&&b?`使用予定：${safeHtml(a.n)} × ${safeHtml(b.n)}<br>必要素材：${fusionCostText(cost)}`:'未装備武器が2本必要'}</div>
      <div class="v5-room-actions">
        <button class="btn btn-g" onclick="fuseWeapons()" ${a&&b?'':'disabled'}>武器を素材合成</button>
        <button class="btn" onclick="openInventory()">所持装備を見る</button>
        <button class="btn btn-p" onclick="advanceFloor()">次の階層へ</button>
      </div>
    </div>`;
  };
  window.showForgeRoom=function(){
    const s=ensureRoomScreen();document.getElementById('room-icon').textContent='⚒️';document.getElementById('room-title').textContent='鍛冶屋（合成限定）';
    document.getElementById('room-text').innerHTML='出現率はShopより高め。素材を使って武器合成できる。';renderForgeRoom();go('room');
  };

  window.showTreasureRoom=function(){
    ensureRoomScreen();const p=G.player;ensureV3State(p);
    const bonusCount=Math.random()<.25?2:1;
    for(let i=0;i<bonusCount;i++){
      const roll=Math.random()+statVal(p,'LUK')*.004;const c=roll>.96?'レインボー':roll>.82?'金':roll>.48?'銀':'銅';
      p.inventory.chests[c]=(p.inventory.chests[c]||0)+1;
    }
    document.getElementById('room-icon').textContent='🎁';document.getElementById('room-title').textContent='宝部屋';
    document.getElementById('room-text').innerHTML='3部屋の中で一番出やすい。宝箱を拾って、鍵があれば開けられる。';
    renderTreasureRoom();go('room');
  };
  window.renderTreasureRoom=function(){
    const p=G.player;ensureV3State(p);const body=document.getElementById('room-body');
    body.innerHTML=`<div class="card" style="margin-bottom:8px">
      <div class="screen-grid">${ADV_COLORS.map(c=>`<div class="inv-item"><b>${ADV_COLOR_ICON[c]} ${c}</b><br>鍵:${p.inventory.keys[c]||0} / 宝箱:${p.inventory.chests[c]||0}<br><button class="btn tiny-btn" onclick="openChest('${c}');renderTreasureRoom()">開ける</button></div>`).join('')}</div>
      <div class="v5-room-actions"><button class="btn" onclick="openInventory()">宝箱・装備確認</button><button class="btn btn-p" onclick="advanceFloor()">次の階層へ</button></div>
    </div>`;
  };

  window.openChest=function(color,auto){
    const p=G.player;ensureV3State(p);
    if((p.inventory.chests[color]||0)<=0){if(!auto)addLog(`${color}宝箱がない`);return;}
    if((p.inventory.keys[color]||0)<=0){if(!auto)addLog(`${color}の鍵がない`);return;}
    p.inventory.chests[color]--;p.inventory.keys[color]--;
    const rank=ADV_COLORS.indexOf(color);const gold=R(25,60)*(rank+1)+p.floor*R(2,5);p.gold+=gold;
    let msg=`${ADV_COLOR_ICON[color]}${color}宝箱OPEN！ G+${gold}`;
    const ultraChance={銅:.01,銀:.025,金:.055,レインボー:.14}[color]||.01;
    if(Math.random()<ultraChance){const eq=makeUltraWeapon(p.floor,'宝箱奇跡');p.inventory.equipment.push(eq);msg+=` / ${eq.n}`;}
    else if(Math.random()<.42){const rankObj=rankByColor(color);const rankId=Object.keys(ORB_RANKS).find(k=>ORB_RANKS[k]===rankObj)||'small';const item=makeOrbItem(rankId);applyOrbEffect(item.orb);msg+=` / ${item.n}`;}
    else if(Math.random()<.75){const eq=makeEquip(pick(['weapon','armor','accessory']),p.floor,ADV_RARITIES[Math.min(4,rank+R(0,1))]);p.inventory.equipment.push(eq);msg+=` / ${eq.n}`;}
    else{const po=POTION_DEF[Math.min(4,rank+1)];p.inventory.potions[po.id]=(p.inventory.potions[po.id]||0)+1;msg+=` / ${po.jp}`;}
    addLog(msg,'l-i');try{renderInventory();}catch(e){};
  };

  window.leaveShop=function(){
    if(G.shopPreboss){G.shopStock=null;G.shopPreboss=false;showStageSelect();return;}
    advanceFloor();
  };
  const oldRenderGame=window.renderGame;
  window.renderGame=function(){
    oldRenderGame&&oldRenderGame();
    if(G&&G.player&&G.stageMode==='wave'){
      const seg=document.getElementById('g-seg-label');
      if(seg)seg.textContent=`${G.stageKills||0}/${G.stageTotal||7}体撃破・Wave${G.stageWaveNo||1}`;
    }
  };

  // 既存セーブでもv5導線を反映
  const oldInitTitle=window.initTitle;
  window.initTitle=function(){oldInitTitle&&oldInitTitle();addV5Style();};
  try{if(G&&G.player)ensureV3State(G.player);}catch(e){}
  initTitle();
})();
</script>

<script>
/* === v6追加アップデート: セーブ廃止 / UI整理 / 3-3-ボス固定ウェーブ / 永久SP === */
(()=>{
  const PERM_STAT_KEYS=['HP','MP','STR','DEX','AGI','INT','VIT','LUK'];
  const OLD_SAVE_KEY=(typeof SAVE_KEY!=='undefined')?SAVE_KEY:'itrl_save_v2';

  function metaV6(){
    let m=(typeof metaV3==='function')?metaV3():{unlocked:5,bestFloor:1};
    if(!m.permPoints)m.permPoints=0;
    if(!m.permStats)m.permStats={};
    if(!m.permClaimed)m.permClaimed={};
    PERM_STAT_KEYS.forEach(k=>{if(m.permStats[k]===undefined)m.permStats[k]=0;});
    return m;
  }
  function saveMetaV6(m){
    if(typeof saveMetaV3==='function')saveMetaV3(m);
    else localStorage.setItem('itrl_meta_v3',JSON.stringify(m));
  }
  function getPermStats(){return metaV6().permStats||{};}
  function getPermUnspent(){return metaV6().permPoints||0;}
  window.metaV6=metaV6;

  function addV6Style(){
    if(document.getElementById('v6-style'))return;
    const st=document.createElement('style');st.id='v6-style';
    st.textContent=`
      #app{max-width:920px!important}
      .game-wrap{grid-template-columns:minmax(0,1fr) 240px!important}
      .v6-note{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:9px 11px;font-size:12px;color:var(--color-text-secondary);line-height:1.65;margin:8px 0}
      .v6-hud{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 8px}
      .v6-chip{display:inline-flex;align-items:center;gap:4px;border:0.5px solid var(--color-border-tertiary);border-radius:999px;background:var(--color-background-secondary);padding:4px 8px;font-size:11px;color:var(--color-text-secondary)}
      .fp-dot.v6-step{width:auto;min-width:86px;height:26px;border-radius:999px;padding:0 10px;font-size:11px;gap:4px}
      .fp-dot.v6-step.boss{background:#FCEBEB;color:#791F1F}.fp-dot.v6-step.cur{background:#534AB7;color:#fff}.fp-dot.v6-step.done{background:#EAF3DE;color:#27500A}
      .v6-stat-box{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px;background:var(--color-background-primary)}
      .v6-stat-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
      .quick-actions{box-shadow:0 4px 18px rgba(0,0,0,.12);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);border-radius:999px;padding:6px}
      @media(max-width:720px){.game-wrap{grid-template-columns:1fr!important}.side-col{order:-1}.fp-dot.v6-step{min-width:70px;font-size:10px}}
    `;
    document.head.appendChild(st);
  }

  function installV6Layout(){
    addV6Style();
    try{localStorage.removeItem(OLD_SAVE_KEY);}catch(e){}
    const saveBtn=document.querySelector('button[onclick="openSave()"]');
    if(saveBtn){
      const span=document.createElement('span');span.className='v6-chip';span.textContent='☠️ 死亡で最初から';
      saveBtn.replaceWith(span);
    }
    const loadBtn=document.getElementById('load-btn');if(loadBtn)loadBtn.style.display='none';
    const saveNotice=document.getElementById('save-notice');
    if(saveNotice){saveNotice.style.display='block';saveNotice.innerHTML=`<div class="v6-note">☠️ <b>ローグライク仕様</b>：中断セーブなし。死亡すると通常Lv・装備・素材・通常SPはすべて失う。<br>🌟 <b>永久SP</b>：100階以降、50階層ごとに+1。これは死亡しても残る。</div>`;}
    const title=document.querySelector('#scr-title h2');if(title)title.textContent='🏰 無限の塔 v6';
    const shopH=document.querySelector('#scr-shop h2');if(shopH)shopH.textContent='🏪 Shop';
    const invH=document.querySelector('#scr-inventory h2');if(invH)invH.textContent='🎒 装備・合成・宝箱';
  }

  // セーブ/ロード系は完全に無効化
  window.saveGame=function(){console.log('v6: save disabled');};
  window.openSave=function(){if(typeof addLog==='function')addLog('中断セーブは廃止。死んだら最初から！','l-w');};
  window.loadGame=function(){initTitle();};
  try{saveGame=window.saveGame;openSave=window.openSave;loadGame=window.loadGame;}catch(e){}

  const oldEnsure=window.ensureV3State||ensureV3State;
  window.ensureV3State=function(p){
    oldEnsure&&oldEnsure(p);
    if(!p)return;
    p.permStats=Object.assign({},getPermStats());
    if(p.permStatPoints===undefined)p.permStatPoints=getPermUnspent();
  };
  try{ensureV3State=window.ensureV3State;}catch(e){}

  // 通常ステータス + 装備 + 永久ステータスを合算
  window.statVal=function(p,k){
    const normal=(p&&p.stats&&p.stats[k])||0;
    const equip=(p&&p.equipStatBonus&&p.equipStatBonus[k])||0;
    const perm=(getPermStats()[k])||0;
    return normal+equip+perm;
  };
  try{statVal=window.statVal;}catch(e){}

  function checkPermanentReward(floorCleared){
    const f=Number(floorCleared)||0;
    if(f<100||f%50!==0)return null;
    const m=metaV6();
    const key=String(f);
    if(m.permClaimed[key])return null;
    m.permClaimed[key]=true;
    m.permPoints=(m.permPoints||0)+1;
    m.bestFloor=Math.max(m.bestFloor||1,f);
    saveMetaV6(m);
    return f;
  }

  const oldStartGame=window.startGame||startGame;
  window.startGame=function(){
    try{localStorage.removeItem(OLD_SAVE_KEY);}catch(e){}
    oldStartGame&&oldStartGame();
    if(G&&G.player){
      ensureV3State(G.player);
      recalcVitals(G.player);
      if(typeof showStageSelect==='function')showStageSelect();
      updateQuickActions&&updateQuickActions();
    }
  };
  try{startGame=window.startGame;}catch(e){}

  window.initTitle=function(){
    G={};
    try{localStorage.removeItem(OLD_SAVE_KEY);}catch(e){}
    renderJobGrid('');
    const lb=document.getElementById('load-btn');if(lb)lb.style.display='none';
    const sb=document.getElementById('start-btn');if(sb)sb.disabled=true;
    installV6Layout();
    go('title');
    updateQuickActions&&updateQuickActions();
  };
  try{initTitle=window.initTitle;}catch(e){}

  window.updateQuickActions=function(){
    const q=document.getElementById('quick-actions');if(!q)return;
    const p=G&&G.player;
    const screen=(typeof CURRENT_SCREEN!=='undefined')?CURRENT_SCREEN:'title';
    const hide=!p||['title','over','inventory','stats'].includes(screen);
    if(hide){q.style.display='none';q.innerHTML='';return;}
    ensureV3State(p);
    q.style.display='flex';
    q.innerHTML=`<button class="btn" onclick="openInventory()">🎒 装備</button>
      <button class="btn" onclick="openStats()">📈 SP ${p.statPoints||0} / 永久 ${getPermUnspent()}</button>`;
  };
  try{updateQuickActions=window.updateQuickActions;}catch(e){}

  // UI: ステージ進行を 3体→3体→ボス の3段階で表示
  window.renderFloorProg=function(){
    const p=G&&G.player;if(!p)return;
    const prog=document.getElementById('floor-prog');if(!prog)return;
    const wave=G.stageWaveNo||0;
    document.getElementById('g-floor-label').textContent=`🏰 ${p.floor}階`;
    const seg=document.getElementById('g-seg-label');
    if(seg)seg.textContent=`3体 → 3体 → ボス1体 / 通常SP:${p.statPoints||0} 永久SP:${getPermUnspent()}`;
    const steps=[['①','雑魚3体'],['②','雑魚3体'],['👑','ボス1体']];
    prog.innerHTML='';
    steps.forEach((s,i)=>{
      const d=document.createElement('div');d.className='fp-dot v6-step';
      const step=i+1;
      if(wave>step)d.classList.add('done');
      else if(wave===step)d.classList.add(step===3?'boss':'cur');
      else if(step===3)d.classList.add('boss');
      d.textContent=`${s[0]} ${s[1]}`;
      prog.appendChild(d);
    });
  };
  try{renderFloorProg=window.renderFloorProg;}catch(e){}

  function makeFloorBossV6(type){
    const p=G.player;ensureV3State(p);
    let e;
    if(p.floor%5===0){
      const bi=Math.min(Math.floor(p.floor/25),BOSSES.length-1);
      e=JSON.parse(JSON.stringify(BOSSES[bi]));
      e.n=`${p.floor}階の支配者 ${e.n}`;
    }else{
      e=makeEnemyFromPool(p.floor,true);
      e.n=`${p.floor}階の番人 ${e.n}`;
    }
    const danger=(type==='danger_wave');
    const elite=(type==='elite'||danger);
    const scale=1+Math.floor(p.floor/10)*0.12+(elite?0.28:0)+(p.floor%5===0?0.35:0);
    e.hp=Math.round((e.hp||80)*scale*1.65);
    e.atk=Math.round((e.atk||10)*(1+p.floor*0.015+(elite?0.22:0)));
    e.def=Math.round((e.def||4)*(1+p.floor*0.01+(elite?0.18:0)));
    e.g=Math.round((e.g||20)*(2.2+(elite?0.7:0)));
    e.x=Math.round((e.x||30)*(2.1+(elite?0.75:0)));
    e.isBoss=true;e.isElite=elite;e.maxHp=e.hp;
    if(typeof initEnemyStatus==='function')initEnemyStatus(e);
    if(typeof empowerEnemy==='function')empowerEnemy(e,p.floor,true,true);
    return e;
  }

  function spawnStageWaveV6(){
    const p=G.player;ensureV3State(p);
    G.stageMode='wave';
    G.stageWaveNo=(G.stageWaveNo||0)+1;
    const type=G.stageType||'battle';
    let enemies=[];
    if(G.stageWaveNo===1||G.stageWaveNo===2){
      const floorMod=type==='danger_wave'?R(6,14):0;
      const eliteRate=type==='elite'?0.55:(type==='danger_wave'?0.45:0.08);
      for(let i=0;i<3;i++)enemies.push(makeEnemyFromPool(p.floor+floorMod,Math.random()<eliteRate));
    }else{
      enemies=[makeFloorBossV6(type)];
    }
    G.enemies=enemies;G.enemy=enemies[0];G.turn=0;
    go('game');renderGame();renderFloorProg();
    const label=G.stageWaveNo===3?'👑 最終Wave：ボス1体':`Wave${G.stageWaveNo}/3：敵3体`;
    addLog(`${label}が出現！`,G.stageWaveNo===3?'l-w':'l-i');
  }

  function startFloorStageV6(type){
    const p=G.player;ensureV3State(p);
    G.stageMode='wave';G.stageTotal=7;G.stageKills=0;G.stageWaveNo=0;G.stageType=type||'battle';G.postRoom=null;G.shopStock=null;
    if(type==='boon_wave'){
      const mat=R(3,7);p.materials['万能素材']=(p.materials['万能素材']||0)+mat;
      addLog(`上振れイベント！万能素材+${mat}`,'l-i');G.stageType='battle';
    }
    if(type==='danger_wave'){
      p.curses=(p.curses||0)+1;addLog('下振れイベント！呪い+1、敵が強化された','l-w');
    }
    spawnStageWaveV6();
  }

  window.makeStageOptions=function(){
    return [
      {type:'battle',icon:'⚔️',title:'通常探索',desc:'3体 → 3体 → ボス1体。安定して素材と経験値を稼ぐ。',danger:'中'},
      {type:'elite',icon:'🔥',title:'エリート探索',desc:'敵が強め。報酬・経験値・素材の上振れを狙う。',danger:'高'},
      {type:Math.random()<.55?'boon_wave':'danger_wave',icon:'❔',title:'イベント探索',desc:'上振れなら素材ボーナス、下振れなら呪い＋強敵。',danger:'運'}
    ];
  };
  try{makeStageOptions=window.makeStageOptions;}catch(e){}

  window.showStageSelect=function(){
    const p=G.player;ensureV3State(p);G.stageMode=null;
    go('stage');renderFloorProg();
    document.getElementById('st-gold').textContent=p.gold;
    const sub=document.getElementById('stage-sub');
    if(sub)sub.innerHTML=`${p.floor}階：ステージを1つ選択 → <b>3体・3体・ボス1体</b>を倒す → Shop/鍛冶屋/宝部屋 → 次階層`;
    const grid=document.getElementById('stage-grid');grid.innerHTML='';
    makeStageOptions().forEach(o=>{
      const d=document.createElement('div');d.className='card stage-card';
      d.innerHTML=`<div style="font-size:30px">${o.icon}</div><div style="font-size:14px;font-weight:600;color:var(--color-text-primary);margin:4px 0">${safeHtml(o.title)}</div>
        <div class="muted">${safeHtml(o.desc)}</div><div style="font-size:11px;margin-top:8px">危険度：${safeHtml(o.danger)}</div>`;
      d.onclick=()=>chooseStage(o.type);grid.appendChild(d);
    });
    updateQuickActions&&updateQuickActions();
  };
  try{showStageSelect=window.showStageSelect;}catch(e){}

  window.chooseStage=function(type){
    const p=G.player;ensureV3State(p);
    p.stageHistory.push({floor:p.floor,type});
    startFloorStageV6(type||'battle');
  };
  try{chooseStage=window.chooseStage;}catch(e){}

  window.killEnemy=function(){
    const p=G.player;const e=G.enemy;if(!e)return;
    const gold=Math.round((e.g||0)*(p.goldBonus||1));const xp=e.x||0;
    p.gold+=gold;p.xp+=xp;if(p.killHeal>0)p.hp=Math.min(p.maxHp,p.hp+p.killHeal);
    if(typeof giveMonsterDrops==='function')giveMonsterDrops(e);
    addLog(`${e.n}撃破！ 💰+${gold} XP+${xp}`,'l-h');
    if(G.stageMode==='wave')G.stageKills=(G.stageKills||0)+1;
    G.enemies=(G.enemies||[]).filter(x=>x!==e&&x.hp>0);
    checkLevelUp();
    if(G.enemies.length>0){setCurrentEnemy();renderGame();return;}
    encounterCleared();
  };
  try{killEnemy=window.killEnemy;}catch(e){}

  window.encounterCleared=function(){
    if(typeof tryChestDrop==='function')tryChestDrop();
    if(G.stageMode==='wave'){
      if((G.stageKills||0)<7){setTimeout(spawnStageWaveV6,350);return;}
      addLog(`階層ステージクリア！7体撃破`, 'l-h');
      setTimeout(showPostStageRoom,450);return;
    }
    showPostStageRoom();
  };
  try{encounterCleared=window.encounterCleared;}catch(e){}

  window.advanceFloor=function(){
    const p=G.player;ensureV3State(p);
    const cleared=p.floor;
    const reward=checkPermanentReward(cleared);
    let m=metaV6();
    const before=m.unlocked||5;
    if(cleared%5===0){m.unlocked=clamp((m.unlocked||5)+1,5,JOBS.length);}
    m.bestFloor=Math.max(m.bestFloor||1,cleared+1);saveMetaV6(m);
    if(reward)addLog(`🌟 ${reward}階突破！永久ステータスポイント+1`, 'l-s');
    if(m.unlocked>before)addLog(`🔓 新職業解放：${JOBS[m.unlocked-1].n}`, 'l-i');
    p.floor++;

<script>

(()=>{
  const PERM_STAT_KEYS_V7=['HP','MP','STR','DEX','AGI','INT','VIT','LUK'];
  const OLD_SAVE_KEY_V7=(typeof SAVE_KEY!=='undefined')?SAVE_KEY:'itrl_save_v2';

  function metaV7(){
    let m=(typeof metaV3==='function')?metaV3():{unlocked:5,bestFloor:1};
    if(!m.permPoints)m.permPoints=0;
    if(!m.permStats)m.permStats={};
    PERM_STAT_KEYS_V7.forEach(k=>{if(m.permStats[k]===undefined)m.permStats[k]=0;});
    // v6以前に101階以上を記録していた場合も、自動で解放済みにする
    if(m.bestFloor>100)m.permUnlocked=true;
    if(m.permRuns===undefined)m.permRuns=0;
    if(m.totalPermEarned===undefined)m.totalPermEarned=0;
    return m;
  }
  function saveMetaV7(m){
    if(typeof saveMetaV3==='function')saveMetaV3(m);
    else localStorage.setItem('itrl_meta_v3',JSON.stringify(m));
  }
  function getPermUnspentV7(){return metaV7().permPoints||0;}

    const m=metaV7();

  }
  function isPermUnlockedV7(){return !!metaV7().permUnlocked;}
  function permDeathRewardForFloorV7(f){
    f=Number(f)||0;
    if(f<50)return 0;
    return Math.floor(f/50);
  }
  window.metaV7=metaV7;

  function v7NoteHtml(){

    return `<div class="v6-note" id="v7-note">
      ☠️ <b>ローグライク仕様</b>：中断セーブなし。死亡すると通常Lv・装備・素材・通常SPはすべて失う。<br>
      🌟 <b>永久SP</b>：一度でも<b>101階以上</b>に到達すると解放。解放後は死亡時に到達階層50階ごとに永久SPを獲得。例：50〜99階で+1、100〜149階で+2。<br>
      ${unlocked?'✅ 永久SP：解放済み':'🔒 永久SP：未解放（まずは100階突破を目指す）'} / 未使用 ${m.permPoints||0} / 永久補正 ${PERM_STAT_KEYS_V7.map(k=>`${k}+${m.permStats[k]||0}`).join(' ')}
    </div>`;

    const loadBtn=document.getElementById('load-btn');if(loadBtn)loadBtn.style.display='none';
    const saveBtn=document.querySelector('button[onclick="openSave()"]');

    try{localStorage.removeItem(OLD_SAVE_KEY_V7);}catch(e){}
  }

  // v6の「100/150/200階クリアで一度だけ+1」は廃止し、100階突破は“解放フラグ”だけにする
  function unlockPermanentIfNeededV7(floorReached, silent){
    const m=metaV7();
    if((Number(floorReached)||0)>100 && !m.permUnlocked){
      m.permUnlocked=true;
      m.bestFloor=Math.max(m.bestFloor||1,Number(floorReached)||1);
      saveMetaV7(m);
      if(!silent && typeof addLog==='function')addLog('🌟 永久SPが解放！以後は死亡時に50階ごと永久SPを獲得できる。','l-s');
      return true;
    }
    return false;
  }

  function grantDeathPermanentRewardV7(p){
    const floorReached=Number(p&&p.floor)||0;
    unlockPermanentIfNeededV7(floorReached,false);
    const m=metaV7();
    if(!m.permUnlocked)return {gain:0,unlocked:false,floor:floorReached};
    const gain=permDeathRewardForFloorV7(floorReached);
    if(gain>0){
      m.permPoints=(m.permPoints||0)+gain;
      m.totalPermEarned=(m.totalPermEarned||0)+gain;
      m.permRuns=(m.permRuns||0)+1;
      m.bestFloor=Math.max(m.bestFloor||1,floorReached);
      saveMetaV7(m);
    }else{
      m.bestFloor=Math.max(m.bestFloor||1,floorReached);
      saveMetaV7(m);
    }
    return {gain,unlocked:true,floor:floorReached};
  }

  // 100階以降の敵は永久SP強化を前提にかなり強くなる
  function applyV7EnemyScaling(e,floor,boss,elite){
    floor=Number(floor)||1;
    if(!e)return e;
    let hpMul=1, atkMul=1, defMul=1, rewardMul=1;
    if(floor>=75){
      const ramp=Math.floor((floor-75)/5);
      hpMul*=1+ramp*0.045;
      atkMul*=1+ramp*0.032;
      defMul*=1+ramp*0.026;
    }
    if(floor>=100){
      const beyond=Math.floor((floor-100)/10);
      hpMul*=boss?3.0:2.15;
      atkMul*=boss?2.25:1.78;
      defMul*=boss?2.05:1.62;
      hpMul*=1+beyond*0.10;
      atkMul*=1+beyond*0.065;
      defMul*=1+beyond*0.045;
      rewardMul*=1.55+beyond*0.04;
      e.n=`覚醒 ${e.n}`;
      e.traits=e.traits||[];
      if(!e.traits.includes('永久SP前提'))e.traits.push('永久SP前提');
    }
    if(elite){hpMul*=1.18;atkMul*=1.12;defMul*=1.1;rewardMul*=1.2;}
    e.hp=Math.max(1,Math.round((e.hp||1)*hpMul));
    e.maxHp=Math.max(1,Math.round((e.maxHp||e.hp||1)*hpMul));
    e.atk=Math.max(1,Math.round((e.atk||1)*atkMul));
    e.def=Math.max(0,Math.round((e.def||0)*defMul));
    e.g=Math.max(0,Math.round((e.g||0)*rewardMul));
    e.x=Math.max(0,Math.round((e.x||0)*rewardMul));
    return e;
  }

  const oldMakeEnemyV7=(typeof makeEnemyFromPool==='function')?makeEnemyFromPool:null;
  window.makeEnemyFromPool=function(floor,elite){
    const e=oldMakeEnemyV7?oldMakeEnemyV7(floor,elite):{n:'敵',s:'👾',hp:20,atk:5,def:1,g:8,x:10};
    return applyV7EnemyScaling(e,floor,false,!!elite);
  };
  try{makeEnemyFromPool=window.makeEnemyFromPool;}catch(e){}

  function makeFloorBossV7(type){
    const p=G.player;if(typeof ensureV3State==='function')ensureV3State(p);

    if(p.floor%5===0){
      const bi=Math.min(Math.floor(p.floor/25),BOSSES.length-1);
      e=JSON.parse(JSON.stringify(BOSSES[bi]));
      e.n=`${p.floor}階の支配者 ${e.n}`;
    }else{
      e=makeEnemyFromPool(p.floor,true);
      e.n=`${p.floor}階の番人 ${e.n}`;
    }
    const danger=(type==='danger_wave');
    const elite=(type==='elite'||danger);
    const baseScale=1+Math.floor(p.floor/10)*0.12+(elite?0.28:0)+(p.floor%5===0?0.35:0);
    e.hp=Math.round((e.hp||80)*baseScale*1.65);
    e.maxHp=e.hp;
    e.atk=Math.round((e.atk||10)*(1+p.floor*0.015+(elite?0.22:0)));
    e.def=Math.round((e.def||4)*(1+p.floor*0.01+(elite?0.18:0)));
    e.g=Math.round((e.g||20)*(2.2+(elite?0.7:0)));
    e.x=Math.round((e.x||30)*(2.1+(elite?0.75:0)));
    e.isBoss=true;e.isElite=elite;
    if(typeof initEnemyStatus==='function')initEnemyStatus(e);
    if(typeof empowerEnemy==='function')empowerEnemy(e,p.floor,true,true);
    return applyV7EnemyScaling(e,p.floor,true,elite);
  }

  function spawnStageWaveV7(){
    const p=G.player;if(typeof ensureV3State==='function')ensureV3State(p);
    G.stageMode='wave';
    G.stageWaveNo=(G.stageWaveNo||0)+1;

      for(let i=0;i<3;i++)enemies.push(makeEnemyFromPool(p.floor+floorMod,Math.random()<eliteRate));

      addLog(`上振れイベント！万能素材+${mat}`,'l-i');G.stageType='battle';
    }
    if(type==='danger_wave'){
      p.curses=(p.curses||0)+1;addLog('下振れイベント！呪い+1、敵が強化された','l-w');
    }
    spawnStageWaveV7();
  }

  window.chooseStage=function(type){
    const p=G.player;if(typeof ensureV3State==='function')ensureV3State(p);
    p.stageHistory=p.stageHistory||[];
    p.stageHistory.push({floor:p.floor,type});
    startFloorStageV7(type||'battle');
  };

  window.advanceFloor=function(){

    showStageSelect();
  };
  try{advanceFloor=window.advanceFloor;}catch(e){}

    }

    g.innerHTML=`<div class="v6-note" style="grid-column:1/-1;margin:0">
      通常SP：<b>${p.statPoints||0}</b>（死亡で消える） / 永久SP：<b>${m.permPoints||0}</b>（死亡しても残る）<br>
      永久SP：${m.permUnlocked?'✅ 解放済み':'🔒 未解放'}。一度101階以上に到達すると解放され、以後は死亡時に到達階層50階ごとに獲得。現在この挑戦で死亡すると：<b>+${m.permUnlocked?permDeathRewardForFloorV7(p.floor):0}</b><br>

      ? `🌟 今回の死亡報酬：永久SP +${result.gain}（到達${result.floor}階）`
      : `🔒 永久SPは未解放。101階以上に到達すると解放。`;
    document.getElementById('over-body').innerHTML=`${p.icon} ${p.job} Lv.${p.lv}<br>到達階: ${p.floor}階<br>通常SP・装備・素材はリセット<br>${rewardLine}<br>未使用永久SP: ${m.permPoints||0}<br>永久補正: ${PERM_STAT_KEYS_V7.map(k=>`${k}+${m.permStats[k]||0}`).join(' ')}`;
    const btn=document.querySelector('#scr-over button');
    if(btn)btn.textContent='タイトルへ戻る（最初から）';
    G.enemy=null;G.enemies=[];G.stageMode=null;G.__deathRewardGranted=true;
    go('over');
  };
  try{gameOver=window.gameOver;}catch(e){}

  const oldRenderGameV7=(typeof renderGame==='function')?renderGame:null;
  window.renderGame=function(){
    oldRenderGameV7&&oldRenderGameV7();
    if(G&&G.player&&G.player.floor>=100){
      const tags=document.getElementById('e-tags');
      if(tags){
        const warn=document.createElement('div');warn.className='v6-hud';
        warn.innerHTML='<span class="v6-chip">⚠️ 100階以降：覚醒敵</span><span class="v6-chip">永久SP前提</span>';
        tags.appendChild(warn);
      }
    }
  };
  try{renderGame=window.renderGame;}catch(e){}

  installV7Layout();
  updateQuickActions&&updateQuickActions();
})();
</script>

    if(act){

      act.innerHTML=`<button class="btn btn-p v8-next-btn" onclick="goNextRoomV8()" style="width:100%;font-size:13px">🚪 次の部屋へ進む</button>`;

    const name=document.getElementById('e-name');if(name)name.textContent='ステージクリア！';
    const hpv=document.getElementById('e-hpv');if(hpv)hpv.textContent='7/7 撃破';
    const hpb=document.getElementById('e-hpb');if(hpb)hpb.style.width='100%';
    const atk=document.getElementById('e-atk-v');if(atk)atk.textContent='-';

      tags.innerHTML=`<div class="v8-next-room-card"><b>次の部屋へ進めます</b><br><span class="muted">Shop / 鍛冶屋 / 宝部屋のどれかが出現します。</span><br><button class="btn btn-p v8-next-btn" onclick="goNextRoomV8()">🚪 次の部屋へ</button></div>`;

    if(seg)seg.textContent='ステージクリア：次の部屋へ進める';
  }

  const oldRenderGameV8=window.renderGame||((typeof renderGame==='function')?renderGame:null);

      renderNextRoomPanelV8();
    }else{
      restoreBattleActionsV8();
    }
  };
  try{renderGame=window.renderGame;}catch(e){}

  const oldUpdateQuickV8=window.updateQuickActions||((typeof updateQuickActions==='function')?updateQuickActions:null);

      <div style="grid-column:1/-1">
        <div class="v8-summary">
          <div class="v8-summary-card"><b>${normalSp}</b><span>通常SP：死亡で消える</span></div>

          <button class="btn btn-g" ${permSp<=0?'disabled':''} onclick="allocatePermStat('${k}')">永久SP +1</button>
        </div>`;
      g.appendChild(card);

  };
  try{renderStats=window.renderStats;}catch(e){}

  const oldAllocateStatV8=window.allocateStat||((typeof allocateStat==='function')?allocateStat:null);
  window.allocateStat=function(k){
    if(oldAllocateStatV8)oldAllocateStatV8(k);

  window.allocatePermStat=function(k){
    if(oldAllocatePermV8)oldAllocatePermV8(k);
    else{
      const m=metaForStatsV8();
      if((m.permPoints||0)<=0)return;
      m.permPoints--;m.permStats[k]=(m.permStats[k]||0)+1;saveMetaV8(m);
    }
    try{renderStats();}catch(e){}
    try{renderGame();}catch(e){}
    try{updateQuickActions();}catch(e){}
  };
  try{allocatePermStat=window.allocatePermStat;}catch(e){}

  const oldOpenStatsV8=window.openStats||((typeof openStats==='function')?openStats:null);
  window.openStats=function(){
    if(typeof ensureV3State==='function'&&G&&G.player)ensureV3State(G.player);
    renderStats();
    if(typeof go==='function')go('stats');
    else if(oldOpenStatsV8)oldOpenStatsV8();
  };
  try{openStats=window.openStats;}catch(e){}

  try{updateQuickActions();}catch(e){}
})();
</script>


<script>
/* === v9追加アップデート: ローグライク向けEXP/SPコスト曲線 === */
(()=>{
  const STAT_KEYS_V9=['HP','MP','STR','DEX','AGI','INT','VIT','LUK'];
  const STAT_NAME_V9={HP:'HP',MP:'MP',STR:'STR',DEX:'DEX',AGI:'AGI',INT:'INT',VIT:'VIT',LUK:'LUK'};
  const STAT_DESC_V9={
    HP:'最大HPを直接増やす。長期戦で安定しやすい。',
    MP:'最大MPを増やす。スキルを多く使える。',
    STR:'物理攻撃と通常攻撃の火力を伸ばす。',
    DEX:'攻撃補助・クリティカル率を少し伸ばす。',
    AGI:'素早さを伸ばす。先に動きやすくなる。',
    INT:'最大MPと魔法火力を伸ばす。',
    VIT:'防御力と最大HPを同時に伸ばす。',
    LUK:'レアドロップ・宝箱・クリティカル補助。'
  };
  const STAT_EFFECT_V9={
    HP:'最大HP +12',
    MP:'最大MP +8',
    STR:'攻撃力 約+1.8',
    DEX:'攻撃補助 + クリ率少しUP',
    AGI:'素早さ 約+0.9',
    INT:'魔法火力UP / 最大MP +4',
    VIT:'防御 約+1.2 / 最大HP +5',
    LUK:'運要素UP / クリ率少しUP'
  };

  // Lvが上がるほど、ゆるやかに重くなる。指数ほど暴れずローグライク向け。
  window.getRequiredExp=function(level){
    level=Math.max(1,Number(level)||1);
    return Math.floor(30 + level*15 + Math.pow(level,1.6)*12);
  };

  // 通常SPコスト：ステータス5ごとに+1。装備はコスト計算から除外。
  window.getRequiredSP=function(statValue){
    statValue=Math.max(0,Number(statValue)||0);
    return 1 + Math.floor(statValue/5);
  };

  // 永久SPコスト：永久強化2回ごとに+1。長期育成なので通常より重め。
  window.getPermanentSPCost=function(upgradeLevel){
    upgradeLevel=Math.max(0,Number(upgradeLevel)||0);
    return 1 + Math.floor(upgradeLevel/2);
  };

  function addV9Style(){
    if(document.getElementById('v9-growth-style'))return;
    const st=document.createElement('style');st.id='v9-growth-style';
    st.textContent=`
      .v9-cost{display:inline-block;margin-left:4px;border-radius:999px;padding:2px 6px;font-size:10px;background:#eef8ff;color:#185FA5;font-weight:600}
      .v9-cost.perm{background:#eaf7ee;color:#0F6E56}
      .v9-formula{background:#f6f4ff;border:0.5px solid #bdb8f0;color:#3C3489;border-radius:var(--border-radius-md);padding:8px 10px;font-size:11px;line-height:1.7;margin-bottom:10px}
      .v9-mini{font-size:10px;color:var(--color-text-secondary);line-height:1.45;margin-top:4px}
    `;
    document.head.appendChild(st);
  }

  function metaV9(){
    let m={unlocked:5,bestFloor:1,permPoints:0,permStats:{}};
    try{
      if(typeof window.metaV7==='function')m=window.metaV7();
      else if(typeof window.metaV6==='function')m=window.metaV6();
      else if(typeof metaV3==='function')m=metaV3();
      else m=JSON.parse(localStorage.getItem('itrl_meta_v3')||'{}');
    }catch(e){m={};}
    if(!m.permStats)m.permStats={};
    STAT_KEYS_V9.forEach(k=>{if(m.permStats[k]===undefined)m.permStats[k]=0;});
    if(m.permPoints===undefined)m.permPoints=0;
    if((m.bestFloor||0)>100)m.permUnlocked=true;
    return m;
  }
  function saveMetaV9(m){
    if(typeof saveMetaV3==='function')saveMetaV3(m);
    else localStorage.setItem('itrl_meta_v3',JSON.stringify(m));
  }
  function syncXpNextV9(p){
    if(!p)return;
    p.lv=Math.max(1,Number(p.lv)||1);
    p.xp=Math.max(0,Number(p.xp)||0);
    p.xpNext=window.getRequiredExp(p.lv);
  }
  function totalStatV9(p,m,k){
    const normal=(p&&p.stats&&p.stats[k])||0;
    const equip=(p&&p.equipStatBonus&&p.equipStatBonus[k])||0;
    const perm=(m&&m.permStats&&m.permStats[k])||0;
    return {normal,equip,perm,total:normal+equip+perm};
  }
  function normalCostV9(p,m,k){
    const s=totalStatV9(p,m,k);
    // 通常SPは「自前の通常値+永久値」で重くする。装備は外せるので対象外。
    return window.getRequiredSP(s.normal+s.perm);
  }
  function permanentCostV9(m,k){
    const lv=(m&&m.permStats&&m.permStats[k])||0;
    return window.getPermanentSPCost(lv);
  }
  function permDeathRewardV9(floor){
    floor=Number(floor)||0;
    if(floor<50)return 0;
    return Math.floor(floor/50);
  }

  const oldEnsureV9=window.ensureV3State||((typeof ensureV3State==='function')?ensureV3State:null);
  window.ensureV3State=function(p){
    if(oldEnsureV9)oldEnsureV9(p);
    if(p)syncXpNextV9(p);
  };
  try{ensureV3State=window.ensureV3State;}catch(e){}

  window.checkLevelUp=function(){
    const p=G&&G.player;if(!p)return;
    if(typeof ensureV3State==='function')ensureV3State(p);
    syncXpNextV9(p);
    let up=0;
    while(p.xp>=p.xpNext){
      const need=p.xpNext;
      p.xp-=need;
      p.lv++;
      p.baseMaxHp=(p.baseMaxHp||p.maxHp||100)+10;
      p.baseMaxMp=(p.baseMaxMp||p.maxMp||50)+5;
      p.baseAtk=(p.baseAtk||p.atk||10)+1;
      p.baseDef=(p.baseDef||p.def||5)+1;
      p.statPoints=(p.statPoints||0)+3;
      syncXpNextV9(p);
      if(typeof recalcVitals==='function')recalcVitals(p);
      p.hp=Math.min(p.maxHp,p.hp+20);
      p.mp=Math.min(p.maxMp,p.mp+10);
      up++;
      if(typeof addLog==='function')addLog(`🎉 Lv.${p.lv}！ 通常SP+3 / 次Lv EXP:${p.xpNext}`,'l-h');
    }
    if(up>0){
      try{renderStats();}catch(e){}
      try{renderGame();}catch(e){}
      try{updateQuickActions();}catch(e){}
    }
  };
  try{checkLevelUp=window.checkLevelUp;}catch(e){}

  const oldStartGameV9=window.startGame||((typeof startGame==='function')?startGame:null);

  try{startGame=window.startGame;}catch(e){}

  const oldRenderGameV9=window.renderGame||((typeof renderGame==='function')?renderGame:null);

  window.renderStats=function(){
    const p=G&&G.player;if(!p)return;

    const totalPerm=allocatedPerm+permSp;
    const deathGain=(m.permUnlocked||m.bestFloor>100)?permDeathRewardV9(p.floor):0;
    const spLabel=document.getElementById('stat-points');
    if(spLabel)spLabel.textContent=`通常 ${normalSp} / 永久 ${permSp}`;
    const g=document.getElementById('stat-grid-alloc');if(!g)return;
    g.className='v8-stat-grid';
    g.innerHTML=`
      <div style="grid-column:1/-1">
        <div class="v8-summary">
          <div class="v8-summary-card"><b>${normalSp}</b><span>通常SP：死亡で消える</span></div>
          <div class="v8-summary-card"><b>${permSp}</b><span>未使用の永久SP</span></div>
          <div class="v8-summary-card"><b>${allocatedPerm}</b><span>割り振り済み永久SP</span></div>
          <div class="v8-summary-card"><b>${p.xp}/${p.xpNext}</b><span>現在EXP / 次Lv必要EXP</span></div>
          <div class="v8-summary-card"><b>+${deathGain}</b><span>今死んだ時の永久SP報酬</span></div>
        </div>
        <div class="v9-formula">
          <b>成長式：</b>必要EXP = 30 + Lv×15 + Lv^1.6×12 / 通常SPコスト = 1 + floor((通常+永久)/5) / 永久SPコスト = 1 + floor(永久強化回数/2)<br>
          序盤はサクサク、深層ほどステ振りの選択が重くなるローグライク向け調整。
        </div>
        <div class="v8-help">
          <b>使い分け：</b>通常SPはこの挑戦だけの強化。永久SPは次回以降も残る強化。<br>
          <b>おすすめ：</b>序盤安定ならHP/VIT、火力ならSTR/INT、レア狙いならLUK。100階以降は永久SP強化前提の難易度です。
          <br>永久SP状態：${(m.permUnlocked||m.bestFloor>100)?'✅ 解放済み':'🔒 未解放'} / 累計永久SP：${totalPerm}
        </div>
      </div>`;
    STAT_KEYS_V9.forEach(k=>{
      const s=totalStatV9(p,m,k);
      const nCost=normalCostV9(p,m,k);
      const pCost=permanentCostV9(m,k);
      const card=document.createElement('div');
      card.className='v8-stat-card';
      card.innerHTML=`
        <div class="v8-stat-top">
          <div>
            <div class="v8-stat-label">${STAT_NAME_V9[k]}</div>
            <div class="muted">${STAT_DESC_V9[k]}</div>
          </div>
          <div class="v8-stat-total">${s.total}<small>合計値</small></div>
        </div>
        <div class="v8-stat-break">
          <div>通常<b>${s.normal}</b></div>
          <div>装備<b>${s.equip>=0?'+':''}${s.equip}</b></div>

        </div>
        <div class="v8-stat-effect">効果：${STAT_EFFECT_V9[k]}<div class="v9-mini">通常コストは装備を除いた「通常+永久」で計算。</div></div>
        <div class="v8-stat-actions">
          <button class="btn" ${normalSp<nCost?'disabled':''} onclick="allocateStat('${k}')">通常 +1 <span class="v9-cost">SP${nCost}</span></button>

        </div>`;
      g.appendChild(card);
    });
  };
  try{renderStats=window.renderStats;}catch(e){}

  window.allocateStat=function(k){
    const p=G&&G.player;if(!p)return;
    const m=metaV9();
    if(typeof ensureV3State==='function')ensureV3State(p);
    if(!p.stats)p.stats={};
    const cost=normalCostV9(p,m,k);
    if((p.statPoints||0)<cost){
      if(typeof addLog==='function')addLog(`SP不足：${STAT_NAME_V9[k]||k}強化には通常SP${cost}必要。`,'l-w');
      try{renderStats();}catch(e){}
      return;

    p.statPoints-=cost;
    p.stats[k]=(p.stats[k]||0)+1;
    if(typeof syncEquipmentStats==='function')syncEquipmentStats(p);
    if(typeof recalcVitals==='function')recalcVitals(p);
    if(['HP','MP','VIT','INT'].includes(k)){
      p.hp=Math.min(p.maxHp,p.hp+(k==='HP'||k==='VIT'?12:0));

    try{renderGame();}catch(e){}

  try{allocateStat=window.allocateStat;}catch(e){}

      try{renderStats();}catch(e){}
      return;
    }
    m.permPoints-=cost;
    m.permStats[k]=(m.permStats[k]||0)+1;
    saveMetaV9(m);
    if(G&&G.player){
      if(typeof ensureV3State==='function')ensureV3State(G.player);
      if(typeof syncEquipmentStats==='function')syncEquipmentStats(G.player);
      if(typeof recalcVitals==='function')recalcVitals(G.player);
    }
    if(typeof addLog==='function')addLog(`${STAT_NAME_V9[k]||k}永久+1！ 永久SP-${cost}`,'l-s');
    try{renderStats();}catch(e){}
    try{renderGame();}catch(e){}
    try{updateQuickActions();}catch(e){}
  };
  try{allocatePermStat=window.allocatePermStat;}catch(e){}

  const oldOpenStatsV9=window.openStats||((typeof openStats==='function')?openStats:null);
  window.openStats=function(){
    if(G&&G.player&&typeof ensureV3State==='function')ensureV3State(G.player);
    renderStats();
    if(typeof go==='function')go('stats');
    else if(oldOpenStatsV9)oldOpenStatsV9();
  };
  try{openStats=window.openStats;}catch(e){}

  const oldInitTitleV9=window.initTitle||((typeof initTitle==='function')?initTitle:null);
  window.initTitle=function(){
    if(oldInitTitleV9)oldInitTitleV9();
    addV9Style();
    const title=document.querySelector('#scr-title h2');if(title)title.textContent='🏰 無限の塔 v9';
    const saveNotice=document.getElementById('save-notice');
    if(saveNotice){
      const m=metaV9();
      saveNotice.style.display='block';
      saveNotice.innerHTML=`<div class="v6-note">☠️ <b>ローグライク仕様</b>：中断セーブなし。死亡すると通常Lv・装備・素材・通常SPはすべて失う。<br>
        📈 <b>成長曲線</b>：LvUP必要EXPとステ振り必要SPが徐々に増加。通常SPは5ステごと、永久SPは2強化ごとに重くなる。<br>
        🌟 <b>永久SP</b>：一度でも101階以上に到達すると解放。${(m.permUnlocked||m.bestFloor>100)?'✅ 解放済み':'🔒 未解放'}</div>`;
    }
  };
  try{initTitle=window.initTitle;}catch(e){}

  addV9Style();
  try{
    const title=document.querySelector('#scr-title h2');if(title)title.textContent='🏰 無限の塔 v9';
    if(G&&G.player)syncXpNextV9(G.player);
    updateQuickActions&&updateQuickActions();
  }catch(e){}
})();
</script>


<script>
/* === v10追加アップデート: スキル付き武器 / ステ強化武器 / 弱い〜通常〜上振れ〜超強 === */
(()=>{
  const V10_VERSION='v10_weapon_skills';
  const V10_TIER={
    weak:{id:'weak',jp:'弱い',tag:'弱',mul:.78,skillPower:.85,cls:'v10-tier-weak'},
    normal:{id:'normal',jp:'普通',tag:'普',mul:1.00,skillPower:1.00,cls:'v10-tier-normal'},
    highroll:{id:'highroll',jp:'上振れ',tag:'上振れ',mul:1.42,skillPower:1.35,cls:'v10-tier-highroll'},
    ultra:{id:'ultra',jp:'超強',tag:'超強',mul:2.15,skillPower:1.85,cls:'v10-tier-ultra'}

  const V10_SKILLS={
    weak:[

      {n:'牽制突き',d:'小ダメージ+敵ATK少し低下。',kind:'debuffAtk',mul:.95,val:3,cost:4,cd:2},
      {n:'粗削り連撃',d:'2回攻撃。火力は控えめ。',kind:'multi',hits:2,mul:.72,cost:5,cd:2}
    ],
    normal:[
      {n:'パワースラッシュ',d:'扱いやすい武器攻撃。',kind:'damage',mul:1.75,cost:8,cd:2},
      {n:'ブレイクエッジ',d:'ダメージ+敵DEF低下。硬い敵に有効。',kind:'debuffDef',mul:1.25,val:7,cost:10,cd:3},
      {n:'クイック二連',d:'2回攻撃。安定火力。',kind:'multi',hits:2,mul:.95,cost:9,cd:3},
      {n:'守りの構え',d:'小ダメージ+次の被弾を軽減。',kind:'guardHit',mul:1.05,cost:7,cd:3}
    ],
    highroll:[
      {n:'覇気斬',d:'強烈な一撃。上振れ武器の主力。',kind:'damage',mul:2.85,cost:16,cd:4},
      {n:'裂空二連',d:'高倍率の2回攻撃。',kind:'multi',hits:2,mul:1.45,cost:15,cd:4},
      {n:'吸命刃',d:'大ダメージ+与ダメージの一部を回復。',kind:'drain',mul:2.15,drain:.30,cost:14,cd:4},
      {n:'破甲の一閃',d:'防御を大きく無視する攻撃。',kind:'pierce',mul:2.35,cost:17,cd:4}
    ],
    ultra:[
      {n:'天壊一閃',d:'防御を無視する超火力の一撃。',kind:'pierce',mul:5.20,full:true,cost:28,cd:5},
      {n:'星滅連牙',d:'5回連続の超攻撃。ボス削り用。',kind:'multi',hits:5,mul:1.35,cost:30,cd:6},
      {n:'不死鳥剣',d:'超火力+最大HPの50%回復。',kind:'healHit',mul:3.20,healPct:.50,cost:32,cd:6},
      {n:'王器解放',d:'3ターンATK大幅上昇+一撃。',kind:'buffHit',mul:2.40,buff:.85,turns:3,cost:34,cd:7}
    ]
  };
  const WEAPON_NAMES_V10={
    weak:['錆びた剣','欠けた短剣','曲がった槍','古い斧','見習いの刃'],
    normal:['鋼の剣','冒険者の双剣','魔石の槍','銀刃の斧','騎士の長剣'],
    highroll:['月影の刃','雷鳴の双牙','竜骨の大剣','紅蓮の戦斧','星巡りの槍'],
    ultra:['神滅剣','天帝の双刃','虹竜槍','終焉の覇斧','星界の王剣']
  };

  function addV10Style(){
    if(document.getElementById('v10-weapon-style'))return;
    const st=document.createElement('style');st.id='v10-weapon-style';
    st.textContent=`
      .v10-tier{display:inline-block;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:700;margin-right:4px;border:0.5px solid var(--color-border-tertiary)}
      .v10-tier-weak{background:#f5f2ee;color:#6b5644}.v10-tier-normal{background:#edf7ff;color:#185FA5}.v10-tier-highroll{background:#fff2db;color:#8a4f00}.v10-tier-ultra{background:#f7eaff;color:#6d258c}
      .v10-skill{display:block;margin-top:4px;padding:5px 6px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);font-size:10px;line-height:1.45;color:var(--color-text-secondary)}
      .v10-skill b{color:var(--color-text-primary)}
      .v10-weapon-btn .tag{margin-right:4px}.v10-weapon-btn small{display:block;color:var(--color-text-secondary);font-size:10px;margin-top:2px}
    `;
    document.head.appendChild(st);
  }
  function escV10(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
  function randV10(arr){return arr[Math.floor(Math.random()*arr.length)];}
  function rarityIndexV10(it){try{return Math.max(0,ADV_RARITIES.findIndex(r=>r.id===(it&&it.rar)));}catch(e){return 0;}}
  function chooseWeaponTierV10(floor,rar){
    const rIdx=typeof rar==='number'?rar:0;
    const f=Math.max(1,Number(floor)||1);
    const roll=Math.random()+Math.min(.22,f*.0025)+rIdx*.045;
    if(roll>.985)return 'ultra';
    if(roll>.82)return 'highroll';
    if(roll>.24)return 'normal';
    return 'weak';
  }
  function scaleStatsV10(it,tierId,force){
    if(!it||!it.stats)return;
    if(it.v10Scaled&&!force)return;
    const tier=V10_TIER[tierId]||V10_TIER.normal;
    const st=it.stats;
    const keys=['atk','STR','DEX','AGI','INT','VIT','LUK','hp','mp','def'];
    keys.forEach(k=>{
      if(!st[k])return;
      let v=st[k];
      if(['STR','DEX','AGI','INT','VIT','LUK'].includes(k))v=Math.max(0,Math.round(v*tier.mul));
      else v=Math.max(1,Math.round(v*tier.mul));
      st[k]=v;
    });
    if(it.slot==='weapon'){
      const f=Math.max(1,Number((G&&G.player&&G.player.floor)||1));
      if(!st.atk)st.atk=Math.max(1,Math.round((4+Math.ceil(f/4))*tier.mul));
      if(!st.STR&&!st.DEX&&!st.AGI&&!st.LUK){
        const bonus=tierId==='weak'?1:tierId==='normal'?2:tierId==='highroll'?4:7;
        st.STR=(st.STR||0)+bonus;
        st.DEX=(st.DEX||0)+Math.max(1,Math.floor(bonus*.75));
        if(tierId==='highroll'||tierId==='ultra')st.LUK=(st.LUK||0)+Math.max(1,Math.floor(bonus*.7));
      }
    }
    it.v10Scaled=true;
  }
  function makeWeaponSkillV10(tierId){
    const tier=V10_TIER[tierId]||V10_TIER.normal;
    const src=randV10(V10_SKILLS[tierId]||V10_SKILLS.normal);
    const sk=JSON.parse(JSON.stringify(src));
    sk.id='wsk_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    sk.tier=tierId;
    sk.cost=Math.max(0,Math.round((sk.cost||0)*(tierId==='weak'?.85:1)));
    sk.cd=Math.max(1,Math.round(sk.cd||2));
    return sk;
  }
  function setWeaponTierV10(it,tierId,opts={}){
    if(!it||it.slot!=='weapon')return false;
    const old=it.v10Tier;
    it.v10Tier=tierId;
    it.v10TierJp=(V10_TIER[tierId]||V10_TIER.normal).jp;
    if(tierId==='ultra'){it.ultra=true;it.rar='legend';it.rarJp=it.rarJp==='超上振れ'?it.rarJp:'超強';it.rarCls='r-legend';}
    if(opts.rename!==false){
      const base=randV10(WEAPON_NAMES_V10[tierId]||WEAPON_NAMES_V10.normal);
      if(!it.n||opts.forceName||/^(コモン|アンコモン|レア|エピック|レジェンド) /.test(it.n)||it.n.includes('鉄剣')||it.n.includes('双刃短剣')||it.n.includes('魔導剣')||it.n.includes('獣牙')||it.n.includes('星屑')){
        const prefix=tierId==='weak'?'弱い':tierId==='normal'?(it.rarJp||'普通'):tierId==='highroll'?'上振れ':'🌈超強';
        it.n=`${prefix} ${base}`;
      }
    }
    if(opts.scale!==false)scaleStatsV10(it,tierId,opts.rescale===true);
    if(!it.weaponSkill||opts.replaceSkill||old!==tierId){it.weaponSkill=makeWeaponSkillV10(tierId);}
    it.v10Ready=V10_VERSION;
    return true;
  }
  function enhanceWeaponV10(it,floor,opts={}){
    if(!it||it.slot!=='weapon')return false;
    const forceUltra=opts.tier==='ultra'||it.ultra||it.rarJp==='超上振れ'||String(it.n||'').includes('超上振れ')||String(it.n||'').includes('超強');
    let tier=opts.tier||it.v10Tier;
    if(forceUltra)tier='ultra';
    if(!tier)tier=chooseWeaponTierV10(floor,rarityIndexV10(it));
    const changed=setWeaponTierV10(it,tier,{rename:opts.rename,forceName:opts.forceName,replaceSkill:forceUltra&&it.v10Tier!=='ultra',scale:opts.scale,rescale:opts.rescale});
    if(forceUltra&&!it.v10UltraBoosted){
      ['atk','STR','DEX','LUK'].forEach(k=>{if(it.stats&&it.stats[k])it.stats[k]=Math.max(1,Math.round(it.stats[k]*1.25));});
      it.weaponSkill=makeWeaponSkillV10('ultra');
      it.v10UltraBoosted=true;
    }
    return changed;
  }
  function refreshWeaponsV10(p){
    if(!p||!p.inventory||!p.inventory.equipment)return false;
    let changed=false;
    p.inventory.equipment.forEach(it=>{if(it&&it.slot==='weapon')changed=enhanceWeaponV10(it,p.floor)||changed;});
    if(!p.weaponSkillCd)p.weaponSkillCd={right:0,left:0};
    ['right','left'].forEach(s=>{if(p.weaponSkillCd[s]===undefined)p.weaponSkillCd[s]=0;});
    return changed;
  }
  function tierChipV10(it){
    if(!it||it.slot!=='weapon')return '';
    const tier=V10_TIER[it.v10Tier]||V10_TIER.normal;
    return `<span class="v10-tier ${tier.cls}">${tier.tag}</span>`;
  }
  function weaponSkillTextV10(it){
    if(!it||it.slot!=='weapon'||!it.weaponSkill)return '';
    const sk=it.weaponSkill;
    return `<span class="v10-skill">${tierChipV10(it)}<b>武器スキル：${escV10(sk.n)}</b><br>${escV10(sk.d||'') } / MP${sk.cost||0} / CD${sk.cd||1}T</span>`;
  }
  function equipDetailV10(it){
    if(!it)return 'なし';
    const stat=typeof statText==='function'?statText(it.stats||{}):'';
    return `<span class="${escV10(it.rarCls||'')}">${tierChipV10(it)}${escV10(it.n||'装備')}</span><br>${escV10(stat)}${weaponSkillTextV10(it)}`;
  }
  function weaponShopDescV10(eq,base){
    if(!eq||eq.slot!=='weapon')return base||'';
    const sk=eq.weaponSkill;
    const tier=(V10_TIER[eq.v10Tier]||V10_TIER.normal).jp;
    return `${base||''} / ${tier}武器 / スキル:${sk?sk.n:'なし'}${sk?`(MP${sk.cost}/CD${sk.cd})`:''}`;
  }

  const oldMakeEquipV10=window.makeEquip||((typeof makeEquip==='function')?makeEquip:null);
  window.makeEquip=function(slotType,floor,rarity){
    const it=oldMakeEquipV10?oldMakeEquipV10(slotType,floor,rarity):null;
    if(it&&it.slot==='weapon')enhanceWeaponV10(it,floor,{rename:true});
    return it;
  };
  try{makeEquip=window.makeEquip;}catch(e){}

  const oldSyncV10=window.syncEquipmentStats||((typeof syncEquipmentStats==='function')?syncEquipmentStats:null);
  window.syncEquipmentStats=function(p){
    refreshWeaponsV10(p);
    if(oldSyncV10)return oldSyncV10(p);
  };
  try{syncEquipmentStats=window.syncEquipmentStats;}catch(e){}

  const oldEnsureV10=window.ensureV3State||((typeof ensureV3State==='function')?ensureV3State:null);
  window.ensureV3State=function(p){
    if(oldEnsureV10)oldEnsureV10(p);
    refreshWeaponsV10(p);
  };
  try{ensureV3State=window.ensureV3State;}catch(e){}

  const oldStarterV10=window.addStarterEquipment||((typeof addStarterEquipment==='function')?addStarterEquipment:null);
  window.addStarterEquipment=function(p){
    oldStarterV10&&oldStarterV10(p);
    try{
      const sw=getEquipById(p,p.equip.right);
      if(sw){
        setWeaponTierV10(sw,'weak',{rename:false,replaceSkill:true,scale:false});
        sw.n='初期の剣';
        sw.stats.atk=Math.min(sw.stats.atk||7,9);
        sw.stats.STR=Math.min(sw.stats.STR||1,2);
        sw.stats.DEX=Math.min(sw.stats.DEX||1,2);
      }
      refreshWeaponsV10(p);
      syncEquipmentStats(p);recalcVitals(p);
    }catch(e){}
  };
  try{addStarterEquipment=window.addStarterEquipment;}catch(e){}

  function tickWeaponCooldownsV10(){
    const p=G&&G.player;if(!p||!p.weaponSkillCd)return;

  function currentEnemyV10(){
    if(typeof setCurrentEnemy==='function')return setCurrentEnemy();

  }
  function weaponDamageV10(sk,it,e){
    const p=G.player;
    const tier=V10_TIER[(it&&it.v10Tier)||'normal']||V10_TIER.normal;
    const baseMul=(sk.mul||1)*tier.skillPower;
    const def=(sk.full||sk.kind==='pierce')?0:(e.def-(e.debuffDef||0));
    const pierce=(sk.kind==='pierce')?1:(p.pierceDef||0);
    return Math.round(calcDmg(pAtk(),def,pierce,!!sk.full)*baseMul);
  }
  window.useWeaponSkill=function(slot){
    const p=G&&G.player;if(!p)return;
    if(typeof ensureV3State==='function')ensureV3State(p);
    const e=currentEnemyV10();
    const it=getEquipById(p,p.equip&&p.equip[slot]);
    if(!e||e.hp<=0){addLog('攻撃対象がいない！');return;}
    if(!it||!it.weaponSkill){addLog('この武器にはスキルがない。');return;}
    const sk=it.weaponSkill;
    if(!p.weaponSkillCd)p.weaponSkillCd={right:0,left:0};
    if((p.weaponSkillCd[slot]||0)>0){addLog(`${sk.n}はCD中！`,'l-w');return;}
    const cost=Math.round((sk.cost||0)*(p.mpDiscount||1));
    if(cost>0&&p.mp<cost){addLog(`MP不足：${sk.n}にはMP${cost}必要。`,'l-w');return;}
    p.mp=Math.max(0,p.mp-cost);
    p.weaponSkillCd[slot]=sk.cd||2;
    let dealt=0;
    if(sk.kind==='multi'){
      const hits=sk.hits||2;let total=0;
      for(let i=0;i<hits;i++){if(e.hp<=0)break;const d=weaponDamageV10(sk,it,e);total+=applyDmgToEnemy(d);}
      dealt=total;addLog(`⚔️${sk.n}！ ${hits}連撃 計${total}ダメ`,'l-s');
    }else if(sk.kind==='drain'){
      const d=weaponDamageV10(sk,it,e);dealt=applyDmgToEnemy(d);const h=Math.round(dealt*(sk.drain||.25));p.hp=Math.min(p.maxHp,p.hp+h);addLog(`⚔️${sk.n}！ ${dealt}ダメ / HP+${h}`,'l-h');
    }else if(sk.kind==='healHit'){
      const d=weaponDamageV10(sk,it,e);dealt=applyDmgToEnemy(d);const h=Math.round(p.maxHp*(sk.healPct||.35));p.hp=Math.min(p.maxHp,p.hp+h);addLog(`⚔️${sk.n}！ ${dealt}ダメ / HP+${h}`,'l-h');
    }else if(sk.kind==='debuffAtk'){
      const d=weaponDamageV10(sk,it,e);dealt=applyDmgToEnemy(d);e.debuffAtk=Math.max(e.debuffAtk||0,sk.val||3);addLog(`⚔️${sk.n}！ ${dealt}ダメ / 敵ATK-${sk.val||3}`,'l-s');
    }else if(sk.kind==='debuffDef'){
      const d=weaponDamageV10(sk,it,e);dealt=applyDmgToEnemy(d);e.debuffDef=Math.max(e.debuffDef||0,sk.val||6);addLog(`⚔️${sk.n}！ ${dealt}ダメ / 敵DEF-${sk.val||6}`,'l-s');
    }else if(sk.kind==='guardHit'){
      const d=weaponDamageV10(sk,it,e);dealt=applyDmgToEnemy(d);p.blockTurns=Math.max(p.blockTurns||0,1);addLog(`⚔️${sk.n}！ ${dealt}ダメ / 次の攻撃を防御`,'l-s');
    }else if(sk.kind==='buffHit'){
      const d=weaponDamageV10(sk,it,e);dealt=applyDmgToEnemy(d);p.buffAtk=Math.max(p.buffAtk||0,Math.round(pAtk()*(sk.buff||.5)));p.buffAtkTurns=Math.max(p.buffAtkTurns||0,sk.turns||3);addLog(`⚔️${sk.n}！ ${dealt}ダメ / ATK強化${sk.turns||3}T`,'l-s');
    }else{
      const d=weaponDamageV10(sk,it,e);dealt=applyDmgToEnemy(d);addLog(`⚔️${sk.n}！ ${dealt}ダメ`,'l-s');
    }
    if(e.hp<=0){killEnemy();return;}
    setTimeout(enemyTurn,250);renderGame();
  };

  const oldRenderSkillsV10=window.renderSkills||((typeof renderSkills==='function')?renderSkills:null);
  window.renderSkills=function(){

      btn.innerHTML=`<span><span class="tag tag-clear">武器</span>${escV10(slotJp)}:${escV10(sk.n)}<small>${tierChipV10(it)}${escV10(sk.d||'')}</small></span><span class="sk-ct">${cost}MP${cdTxt}</span>`;
      btn.onclick=()=>useWeaponSkill(slot);
      sl.appendChild(btn);
    });
  };
  try{renderSkills=window.renderSkills;}catch(e){}

  const oldRenderInventoryV10=window.renderInventory||((typeof renderInventory==='function')?renderInventory:null);
  window.renderInventory=function(){
    const p=G&&G.player;if(!p){oldRenderInventoryV10&&oldRenderInventoryV10();return;}
    addV10Style();ensureV3State(p);
    const slots=document.getElementById('eq-slots');if(!slots){oldRenderInventoryV10&&oldRenderInventoryV10();return;}
    slots.innerHTML='';
    EQUIP_SLOTS.forEach(s=>{
      const it=getEquipById(p,p.equip[s]);
      const d=document.createElement('div');d.className='inv-item';
      d.innerHTML=`<b>${SLOT_ICON[s]} ${SLOT_LABEL[s]}</b><br>${it?`${equipDetailV10(it)}<br><button class="btn tiny-btn" onclick="unequip('${s}')">外す</button>`:'なし'}`;
      slots.appendChild(d);
    });
    const forge=document.getElementById('forge-box');
    if(forge)forge.innerHTML=`所持金 ${p.gold}G / 万能素材 ${p.materials['万能素材']||0}<br>
      <button class="btn tiny-btn" onclick="forgeEnhance('right')">右手武器を強化</button>
      <button class="btn tiny-btn" onclick="forgeEnhance('left')">左手武器を強化</button>
      <button class="btn tiny-btn" onclick="fuseWeapons()">未装備武器2本を合成</button>
      <div class="v10-skill"><b>武器仕様</b><br>すべての武器にステ補正＋武器スキルが付与。弱い/普通/上振れ/超強でステとスキル倍率が変化。</div>`;
    const chest=document.getElementById('chest-box');
    if(chest){
      chest.innerHTML='';
      ADV_COLORS.forEach(c=>{
        const d=document.createElement('div');d.className='inv-item';
        d.innerHTML=`<b>${ADV_COLOR_ICON[c]} ${c}</b><br>鍵:${p.inventory.keys[c]||0} / 宝箱:${p.inventory.chests[c]||0}<br><button class="btn tiny-btn" onclick="openChest('${c}')">開ける</button>`;
        chest.appendChild(d);
      });
      const mat=document.createElement('div');mat.className='inv-item';
      mat.innerHTML='<b>素材</b><br>'+Object.entries(p.materials||{}).slice(0,8).map(([k,v])=>`${escV10(k)}:${v}`).join('<br>');
      chest.appendChild(mat);
      const pots=document.createElement('div');pots.className='inv-item';
      pots.innerHTML='<b>薬</b><br>'+POTION_DEF.map(po=>`${escV10(po.jp)}(${Math.round(po.pct*100)}%): ${p.inventory.potions[po.id]||0}`).join('<br>');
      chest.appendChild(pots);
    }
    const inv=document.getElementById('inv-grid');if(inv){
      inv.innerHTML='';
      const eqIds=equippedIds(p);
      (p.inventory.equipment||[]).forEach(it=>{
        const d=document.createElement('div');d.className='inv-item';
        let btns='';
        if(!eqIds.has(it.id)){
          if(it.slot==='weapon')btns=`<button class="btn tiny-btn" onclick="equipItem('${it.id}','right')">右手</button> <button class="btn tiny-btn" onclick="equipItem('${it.id}','left')">左手</button>`;
          else if(it.slot==='accessory')btns=`<button class="btn tiny-btn" onclick="equipItem('${it.id}','acc1')">アクセ1</button> <button class="btn tiny-btn" onclick="equipItem('${it.id}','acc2')">アクセ2</button>`;
          else btns=`<button class="btn tiny-btn" onclick="equipItem('${it.id}','${it.slot}')">装備</button>`;
        }else btns='<span class="muted">装備中</span>';
        d.innerHTML=`${equipDetailV10(it)}<br>${btns}`;
        inv.appendChild(d);
      });
      if(!p.inventory.equipment.length)inv.innerHTML='<div class="muted">装備なし</div>';
    }
  };
  try{renderInventory=window.renderInventory;}catch(e){}

  const oldRenderShopV10=window.renderShop||((typeof renderShop==='function')?renderShop:null);
  window.renderShop=function(){
    if(G&&G.shopStock){
      G.shopStock.forEach(item=>{
        if(item&&item.eq&&item.eq.slot==='weapon'){
          enhanceWeaponV10(item.eq,(G.player&&G.player.floor)||1);
          const stat=typeof statText==='function'?statText(item.eq.stats||{}):'';
          item.d=weaponShopDescV10(item.eq,`${item.eq.rarJp} / ${item.eq.slot} / ${stat}`);
          item.n=item.eq.n;
        }
      });
    }
    oldRenderShopV10&&oldRenderShopV10();
  };
  try{renderShop=window.renderShop;}catch(e){}

  const oldFuseV10=window.fuseWeapons||((typeof fuseWeapons==='function')?fuseWeapons:null);
  if(oldFuseV10){
    window.fuseWeapons=function(){oldFuseV10&&oldFuseV10();if(G&&G.player){refreshWeaponsV10(G.player);try{renderInventory();}catch(e){}}};
    try{fuseWeapons=window.fuseWeapons;}catch(e){}
  }

  const oldRenderGameV10=window.renderGame||((typeof renderGame==='function')?renderGame:null);
  window.renderGame=function(){
    if(G&&G.player){addV10Style();ensureV3State(G.player);}
    oldRenderGameV10&&oldRenderGameV10();
    try{
      const p=G&&G.player;const box=document.getElementById('equip-info');
      if(p&&box){
        const weaponSkills=['right','left'].map(s=>getEquipById(p,p.equip&&p.equip[s])).filter(it=>it&&it.weaponSkill).map(it=>`${tierChipV10(it)}${escV10(it.weaponSkill.n)}`).join('<br>');
        const base=`${EQUIP_SLOTS.map(s=>`${SLOT_ICON[s]}${SLOT_LABEL[s]}: ${escV10(getEquipById(p,p.equip[s])?.n||'なし')}`).join('<br>')}`;
        const potionTotal=Object.values(p.inventory.potions||{}).reduce((a,b)=>a+(b||0),0);
        box.innerHTML=`${base}<div class="v10-skill"><b>装備中武器スキル</b><br>${weaponSkills||'なし'}</div>
         <div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">
           <button class="btn tiny-btn" onclick="openInventory()">装備/鍛冶</button>

         </div>
         <div class="muted" style="margin-top:5px">薬:${potionTotal} / 呪い:${p.curses||0}</div>`;
      }
    }catch(e){}
  };
  try{renderGame=window.renderGame;}catch(e){}

  const oldInitTitleV10=window.initTitle||((typeof initTitle==='function')?initTitle:null);
  window.initTitle=function(){
    oldInitTitleV10&&oldInitTitleV10();addV10Style();
    const title=document.querySelector('#scr-title h2');if(title)title.textContent='🏰 無限の塔 v10';
    const notice=document.getElementById('save-notice');
    if(notice){
      notice.style.display='block';
      notice.innerHTML=`<div class="v6-note">☠️ <b>ローグライク仕様</b>：中断セーブなし。死亡すると通常Lv・装備・素材・通常SPはすべて失う。<br>
      ⚔️ <b>v10武器</b>：武器にステ補正＋武器スキルを追加。弱い/普通/上振れ/超強の4段階で性能が変化。<br>
      📈 <b>成長曲線</b>：LvUP必要EXPとステ振り必要SPは徐々に増加。</div>`;
    }
  };
  try{initTitle=window.initTitle;}catch(e){}

  addV10Style();
  try{
    if(G&&G.player){ensureV3State(G.player);refreshWeaponsV10(G.player);}

  }catch(e){}
})();
