<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>無限の塔</title><style>
:root{--bg:#0f1020;--panel:#17192d;--panel2:#20233d;--txt:#f4f5ff;--mut:#a8acc8;--line:#303552;--acc:#6d63ff;--good:#35c88a;--bad:#ff5c6c;--gold:#f0b84a}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0b0c18,#16172a);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}#app{max-width:920px;margin:auto;padding:12px}.hide{display:none!important}.screen{display:none}.screen.on{display:block}.card{background:rgba(23,25,45,.96);border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.18)}h1,h2,h3,p{margin:0}.mut{color:var(--mut);font-size:12px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.between{display:flex;justify-content:space-between;gap:8px;align-items:center}.grid{display:grid;gap:8px}.jobs{grid-template-columns:repeat(auto-fit,minmax(132px,1fr))}.shop{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--txt);border-radius:11px;padding:9px 12px;font-weight:700;cursor:pointer}.btn:hover{filter:brightness(1.1)}.btn:disabled{opacity:.45;cursor:not-allowed}.primary{background:var(--acc);border-color:var(--acc)}.danger{background:#8b2632;border-color:#8b2632}.job,.item{cursor:pointer;min-height:86px}.job.sel{outline:2px solid var(--acc)}.ico{font-size:28px}.name{font-weight:800}.tag{font-size:11px;color:var(--mut);margin-top:2px}.bar{height:10px;background:#2c304e;border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}.fill{height:100%;width:100%;transition:width .18s}.hp{background:linear-gradient(90deg,#32c98b,#89e082)}.mp{background:linear-gradient(90deg,#5291ff,#8b7cff)}.ehp{background:linear-gradient(90deg,#ff5c6c,#ffad7a)}.mini{font-size:11px;color:var(--mut)}#log{height:104px;overflow:hidden;font-size:13px;line-height:1.65}.logline{border-top:1px solid rgba(255,255,255,.05);padding-top:3px}.battle{grid-template-columns:1.3fr .8fr}.enemyface{font-size:46px;text-align:center;margin:8px 0}.actions{grid-template-columns:repeat(2,1fr)}.pill{border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px;color:var(--mut)}.sold{opacity:.4}.item b{display:block;margin:4px 0}.price{color:var(--gold);font-weight:800}.footer{position:sticky;bottom:0;background:rgba(15,16,32,.86);backdrop-filter:blur(8px);padding:8px;margin:10px -12px -12px}.tiny{font-size:11px}.kpi{font-weight:800;color:var(--gold)}@media(max-width:720px){#app{padding:8px}.battle{grid-template-columns:1fr}.actions{grid-template-columns:1fr 1fr}.shop{grid-template-columns:repeat(2,minmax(0,1fr))}.btn{padding:10px 8px}.item{min-height:104px}}
</style></head><body><div id="app">
<section id="title" class="screen on"><div class="card" style="text-align:center;margin-bottom:10px"><div class="mut" style="letter-spacing:.12em">INFINITE TOWER ROGUELIKE</div><h1>🏰 無限の塔</h1><p class="mut" style="margin-top:6px">塔に終わりはない。</p></div><div class="between" style="margin:8px 0"><h2>職業を選ぶ</h2><span id="unlockInfo" class="mut"></span></div><div id="jobs" class="grid jobs"></div><div class="row" style="margin-top:10px"><button id="start" class="btn primary" disabled>冒険開始</button><button id="load" class="btn hide">セーブを読み込む</button></div></section>
<section id="game" class="screen"><div class="between" style="margin-bottom:8px"><div><h2 id="floor">1階</h2><div id="room" class="mut">静かな入口</div></div><div class="row"><span class="pill">💰 <span id="gold" class="kpi">300</span>G</span><button id="save" class="btn">セーブ</button></div></div><div class="grid battle"><div class="card"><div class="between"><div><div id="eName" class="name">スライム</div><div id="eMood" class="mut">こちらを見ている</div></div><span id="eRank" class="pill">通常</span></div><div id="eFace" class="enemyface">🟢</div><div class="mini">敵HP</div><div class="bar"><div id="eHp" class="fill ehp"></div></div><div id="log" style="margin-top:10px"></div></div><div class="grid"><div class="card"><div class="between"><div><div id="pName" class="name">剣士</div><div id="pNote" class="mut">冒険中</div></div><span id="level" class="pill">Lv.1</span></div><div style="margin-top:10px"><div class="between mini"><span>HP</span><span id="hpTone">安定</span></div><div class="bar"><div id="pHp" class="fill hp"></div></div></div><div style="margin-top:8px"><div class="between mini"><span>MP</span><span id="mpTone">余裕</span></div><div class="bar"><div id="pMp" class="fill mp"></div></div></div><div class="row" style="margin-top:10px"><span class="pill">🧪 <span id="pots">3</span></span><span class="pill">🗝️ <span id="keys">0</span></span><span id="eq" class="pill">初期装備</span></div></div><div class="card"><div class="grid actions"><button id="atk" class="btn">⚔️ 攻撃</button><button id="def" class="btn">🛡️ 防御</button><button id="sk1" class="btn">技</button><button id="sk2" class="btn">奥義</button><button id="pot" class="btn">🧪 薬</button><button id="next" class="btn primary" disabled>次へ</button></div></div></div></div><div class="footer row"><button id="toShop" class="btn hide">商店へ</button><button id="resetRun" class="btn danger">冒険をやめる</button></div></section>
<section id="shop" class="screen"><div class="between" style="margin-bottom:10px"><div><h2>🏪 商店</h2><p class="mut">品揃えは毎回20個。買うと売り切れになる。</p></div><span class="pill">💰 <span id="sgold" class="kpi">0</span>G</span></div><div class="row" style="margin-bottom:8px"><button id="reroll" class="btn">品替え</button><button id="leave" class="btn primary">次の階へ</button></div><div id="shopGrid" class="grid shop"></div></section>
<section id="over" class="screen"><div class="card" style="text-align:center"><div style="font-size:42px">💀</div><h2>冒険終了</h2><p id="overText" class="mut" style="margin:10px 0 16px"></p><button id="home" class="btn primary">タイトルへ戻る</button></div></section>
</div><script>
(()=>{"use strict";const $=id=>document.getElementById(id),KEY="tower_lite_v32";
const J=[['war','剣士','⚔️','安定型',120,40,15,8,10,['渾身撃','中'],['英雄撃','大']],['mag','魔法使い','🔮','魔法型',78,110,9,4,9,['魔力弾','小'],['星落とし','大']],['rog','盗賊','🗡️','速攻型',86,58,14,5,18,['連撃','中'],['影走り','大']],['pal','聖騎士','🛡️','防御型',135,64,12,15,7,['聖剣','中'],['祈り','大']],['ber','狂戦士','🪓','攻撃型',112,32,22,5,12,['狂撃','小'],['死狂い','大']],['mon','モンク','👊','解放職',105,62,16,9,14,['乱打','中'],['無双','大'],12],['arc','狩人','🏹','解放職',88,56,18,6,15,['貫通矢','中'],['矢雨','大'],20],['nec','死霊術師','💀','解放職',82,92,11,5,8,['骨矢','小'],['死霊嵐','大'],30],['nin','忍者','🥷','解放職',82,58,17,6,20,['瞬身','中'],['千鳥','大'],42],['sam','侍','🗾','解放職',108,44,21,8,11,['居合','中'],['無刀','大'],55]];
const E=[['スライム','🟢'],['コウモリ','🦇'],['ゴブリン','👺'],['コボルド','🐺'],['スケルトン','💀'],['オーク','👹'],['ミミック','📦'],['ワイバーン','🐉'],['ゴーレム','🗿'],['塔の番人','🗼']];
const P={weapon:[['鉄の剣','扱いやすい武器'],['黒曜の短剣','素早い武器'],['祈りの槍','光を帯びた武器'],['獣斧','荒々しい武器'],['星屑の杖','魔力を宿す武器']],armor:[['旅人の服','軽い防具'],['鉄の鎧','硬い防具'],['魔導ローブ','集中しやすい防具'],['守護盾','粘れる防具']],orb:[['技のオーブ','技が少し冴える'],['魔力のオーブ','集中が長持ちする'],['会心のオーブ','攻めが鋭くなる']],potion:[['小回復薬','少し立て直せる'],['回復薬','しっかり立て直せる'],['濃い回復薬','大きく立て直せる']],key:[['古びた鍵','宝箱を開けやすくなる'],['銀の鍵','良い箱に強い'],['塔の鍵','深い階層向け']],mat:[['鉄片','鍛冶素材'],['魔石の欠片','不思議な素材'],['獣皮','防具素材'],['古い歯車','仕掛け素材']],charm:[['幸運札','報酬運が少し上がる'],['守り札','少し粘り強くなる'],['疾風札','行動が軽くなる']]};
let S=null,sel=null,stock=[],log=[];const cost={小:8,中:16,大:30,極大:45};
function best(){return +(localStorage.getItem(KEY+"_best")||0)}function unlocked(){let b=best();return J.filter((j,i)=>i<5||b>=(j[11]||999))}function save(){if(S){localStorage.setItem(KEY,JSON.stringify(S));localStorage.setItem(KEY+"_best",Math.max(best(),S.floor))}}
function load(){try{let s=JSON.parse(localStorage.getItem(KEY)||"null");if(!s||!s.job)return false;S=s;stock=(S.stock&&S.stock.length===20)?S.stock:[];log=S.log||[];show('game');drawAll();return true}catch(e){localStorage.removeItem(KEY);return false}}
function show(id){['title','game','shop','over'].forEach(x=>$(x).classList.toggle('on',x===id))}
function title(){let b=best(),a=unlocked();$('unlockInfo').textContent=b?`最高 ${b}階`:'';$('load').classList.toggle('hide',!localStorage.getItem(KEY));$('jobs').innerHTML=a.map(j=>`<div class="card job" data-j="${j[0]}"><div class="ico">${j[2]}</div><div class="name">${j[1]}</div><div class="tag">${j[3]}</div></div>`).join('');}
function job(id){return J.find(j=>j[0]===id)||J[0]}function start(){let j=job(sel);S={job:j[0],floor:1,room:1,lv:1,xp:0,gold:300,pot:3,key:0,maxHp:j[4],hp:j[4],maxMp:j[5],mp:j[5],atk:j[6],def:j[7],spd:j[8],boost:0,guard:0,wep:0,arm:0,luck:0};log=[];enemy();show('game');drawAll();save()}
function enemy(){let boss=S.room>=3,base=S.floor,ix=boss?Math.min(E.length-1,Math.floor(base/5)+4):Math.min(E.length-2,Math.floor((base-1)/6)+R(0,2));let e=E[ix];S.e={n:boss?e[0]+'・強':e[0],f:e[1],max:Math.floor((boss?42:24)+base*(boss?13:8)+S.lv*4),hp:0,atk:Math.floor((boss?10:6)+base*2.2),boss};S.e.hp=S.e.max;S.win=false;add(boss?'強い気配が立ちはだかった。':'敵が現れた。')}
function R(a,b){return Math.floor(Math.random()*(b-a+1))+a}function pct(a,b){return Math.max(0,Math.min(100,Math.round(a/b*100)))}function tone(v){return v>70?'安定':v>35?'まだ動ける':'危険'}function mpTone(v){return v>70?'余裕':v>35?'残りあり':'少ない'}
function add(t){log.unshift(t);log=log.slice(0,6);if(S)S.log=log;drawLog()}function drawLog(){$('log').innerHTML=log.map(x=>`<div class="logline">${x}</div>`).join('')}
function drawAll(){if(!S)return;let j=job(S.job),e=S.e;$('floor').textContent=S.floor+'階';$('room').textContent=S.room>=3?'奥に進んでいる':'探索中';$('gold').textContent=S.gold;$('pName').textContent=j[2]+' '+j[1];$('level').textContent='Lv.'+S.lv;$('pHp').style.width=pct(S.hp,S.maxHp)+'%';$('pMp').style.width=pct(S.mp,S.maxMp)+'%';$('hpTone').textContent=tone(pct(S.hp,S.maxHp));$('mpTone').textContent=mpTone(pct(S.mp,S.maxMp));$('pots').textContent=S.pot;$('keys').textContent=S.key;$('eq').textContent=(S.wep?'武器強化':'初期装備')+(S.arm?' / 防具強化':'');$('eName').textContent=e.n;$('eFace').textContent=e.f;$('eHp').style.width=pct(e.hp,e.max)+'%';$('eRank').textContent=e.boss?'強敵':'通常';$('eMood').textContent=e.hp/e.max<.3?'弱っている':'こちらを見ている';$('sk1').textContent=j[9][0]+'（'+j[9][1]+'）';$('sk2').textContent=j[10][0]+'（'+j[10][1]+'）';['atk','def','sk1','sk2','pot'].forEach(id=>$(id).disabled=S.win);$('next').disabled=!S.win;$('toShop').classList.toggle('hide',!(S.win&&S.room>3));drawLog()}
function dmg(mult=1,skill=false){let base=(S.atk+S.wep*3+S.boost*2)*mult+R(-3,4);if(skill)base+=S.boost*3;return Math.max(1,Math.floor(base-(S.e.boss?S.floor*.4:S.floor*.25)))}
function hit(d,txt){S.e.hp=Math.max(0,S.e.hp-d);add(txt||feel(d,S.e.max));if(S.e.hp<=0)win();else foe()}function feel(d,m){let r=d/m;return r>.35?'かなり大きな手応え。':r>.18?'しっかり効いた。':'少し効いた。'}
function attack(){hit(dmg(1),Math.random()<.12?'鋭い一撃が入った。':'攻撃が当たった。')}function skill(n){let j=job(S.job),c=cost[j[n][1]]||15;if(S.mp<c){add('集中が足りない。');return}S.mp-=c;if(j[0]==='pal'&&n===10){heal(.45);add('光が体を包んだ。');foe();return}let m=n===9?1.75:3.0;if(j[0]==='rog')m+=.35;if(j[0]==='mag')m+=.5;hit(dmg(m,true),n===9?'技が決まった。':'奥義が放たれた。')}
function defend(){S.guard=1;add('身構えた。');foe()}function potion(){if(S.pot<1){add('薬がない。');return}S.pot--;heal(.45);add('薬で立て直した。');foe()}function heal(r){S.hp=Math.min(S.maxHp,S.hp+Math.floor(S.maxHp*r))}
function foe(){if(S.win)return;let miss=Math.random()<Math.min(.28,S.spd/130);if(miss){add('敵の攻撃をかわした。');regen();drawAll();save();return}let d=Math.max(1,Math.floor(S.e.atk-(S.def+S.arm*3)*(S.guard?.75:.35)+R(-2,3)));S.guard=0;S.hp=Math.max(0,S.hp-d);add(d>S.maxHp*.22?'重い攻撃を受けた。':'敵の攻撃を受けた。');regen();if(S.hp<=0)over();else{drawAll();save()}}
function regen(){S.mp=Math.min(S.maxMp,S.mp+Math.max(3,Math.floor(S.maxMp*.06)))}
function win(){S.win=true;let g=R(20,42)+S.floor*R(2,5)+Math.floor(S.luck*8);S.gold+=g;S.xp+=R(12,22)+S.floor*2;if(S.xp>=S.lv*35){S.xp=0;S.lv++;autoGrow();add('体が少し成長した。')}add('報酬を得た。');S.room++;if(S.room>3)add('少し休めそうだ。');drawAll();save()}
function autoGrow(){let j=job(S.job);S.maxHp+=R(7,12)+(j[3].includes('防御')?3:0);S.maxMp+=R(3,8)+(j[3].includes('魔法')?5:0);S.atk+=R(1,3)+(j[3].includes('攻撃')?1:0);S.def+=R(1,2)+(j[3].includes('防御')?1:0);S.hp=S.maxHp;S.mp=S.maxMp}
function next(){if(S.room>3){shop();return}enemy();drawAll();save()}function shop(){if(stock.length!==20)stock=genShop();S.stock=stock;show('shop');drawShop();save()}function genShop(){let types=['weapon','armor','orb','potion','key','mat','charm'],a=[];for(let i=0;i<20;i++){let t=types[i%types.length],p=P[t][R(0,P[t].length-1)],rank=1+Math.floor((S.floor+R(0,10))/12);a.push({t,n:p[0],d:p[1],r:rank,price:Math.floor((35+rank*28+S.floor*3)*(t==='mat'?.55:t==='key'?1.15:1)),sold:0})}return a.sort(()=>Math.random()-.5)}
function drawShop(){$('sgold').textContent=S.gold;$('shopGrid').innerHTML=stock.map((it,i)=>`<div class="card item ${it.sold?'sold':''}" data-buy="${i}"><div class="mini">${label(it.t)}</div><b>${it.n}</b><div class="mut">${it.d}</div><div class="between" style="margin-top:8px"><span class="price">${it.sold?'売切':it.price+'G'}</span><button class="btn tiny" ${it.sold?'disabled':''}>買う</button></div></div>`).join('')}
function label(t){return{weapon:'武器',armor:'防具',orb:'スキルオーブ',potion:'回復薬',key:'鍵',mat:'素材',charm:'札'}[t]||'品'}
function buy(i){let it=stock[i];if(!it||it.sold)return;if(S.gold<it.price){flash('手持ちが足りない。');return}S.gold-=it.price;it.sold=1;if(it.t==='weapon')S.wep=Math.max(S.wep,it.r);else if(it.t==='armor')S.arm=Math.max(S.arm,it.r);else if(it.t==='orb')S.boost++;else if(it.t==='potion')S.pot+=it.r>2?2:1;else if(it.t==='key')S.key++;else if(it.t==='charm')S.luck++;else S.gold+=Math.floor(it.price*.35);flash('購入した。');drawShop();save()}
function flash(t){let p=$('shop').querySelector('p'),old=p.textContent;p.textContent=t;setTimeout(()=>p.textContent=old,800)}function leave(){stock=[];S.stock=[];S.floor++;S.room=1;enemy();show('game');drawAll();save()}function over(){localStorage.setItem(KEY+"_best",Math.max(best(),S.floor));$('overText').textContent=`${S.floor}階まで進んだ。`;localStorage.removeItem(KEY);S=null;show('over')}
$('jobs').onclick=e=>{let c=e.target.closest('.job');if(!c)return;sel=c.dataset.j;document.querySelectorAll('.job').forEach(x=>x.classList.toggle('sel',x.dataset.j===sel));$('start').disabled=false};$('start').onclick=start;$('load').onclick=()=>load()||title();$('save').onclick=()=>{save();add('記録した。')};$('atk').onclick=attack;$('def').onclick=defend;$('sk1').onclick=()=>skill(9);$('sk2').onclick=()=>skill(10);$('pot').onclick=potion;$('next').onclick=next;$('toShop').onclick=shop;$('reroll').onclick=()=>{let fee=35+S.floor*2;if(S.gold<fee)return flash('品替えできない。');S.gold-=fee;stock=genShop();S.stock=stock;drawShop();save()};$('leave').onclick=leave;$('shopGrid').onclick=e=>{let c=e.target.closest('[data-buy]');if(c)buy(+c.dataset.buy)};$('resetRun').onclick=()=>{localStorage.removeItem(KEY);S=null;show('title');title()};$('home').onclick=()=>{show('title');title()};title();
})();
</script></body></html>
