<script>
/* === v11追加アップデート: 次の部屋バグ修正 / Shop出現率アップ === */
(()=>{
  const V11_VERSION='v11_nextroom_shopfix';
  const V11_ROOM_WEIGHTS=[
    {type:'shop',jp:'Shop',icon:'🏪',w:9},
    {type:'forge',jp:'鍛冶屋',icon:'⚒️',w:2},
    {type:'treasure',jp:'宝部屋',icon:'🎁',w:1}
  ];

  function addV11Style(){
    if(document.getElementById('v11-style'))return;
    const st=document.createElement('style');st.id='v11-style';
    st.textContent=`
      .v11-next-card{border:1px solid #534AB7;background:linear-gradient(90deg,#f2f0ff,#eefaff);border-radius:var(--border-radius-lg);padding:12px;text-align:center;margin-top:8px}
      .v11-next-card b{color:#3C3489}
      .v11-next-card .muted{line-height:1.6}
      .v11-rate{display:inline-block;margin-top:5px;padding:2px 7px;border-radius:999px;background:#E1F5EE;color:#085041;font-size:10px;font-weight:700}
      .v11-next-btn{font-weight:800;box-shadow:0 2px 10px rgba(83,74,183,.2)}
    `;
    document.head.appendChild(st);
  }
  function safeV11(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
  function weightedPickV11(list){
    const total=list.reduce((a,b)=>a+(b.w||1),0);
    let r=Math.random()*total;
    for(const x of list){r-=x.w||1;if(r<=0)return x;}
    return list[0];
  }
  function roomRateTextV11(){
    const total=V11_ROOM_WEIGHTS.reduce((a,b)=>a+b.w,0);
    return V11_ROOM_WEIGHTS.map(x=>`${x.icon}${x.jp} 約${Math.round(x.w/total*100)}%`).join(' / ');
  }
  function defaultBattleButtonsV11(){
    return `<button class="btn" onclick="doAtk()" id="btn-atk" style="flex:1;font-size:12px">⚔️ 攻撃</button>
      <button class="btn" onclick="doDef()" id="btn-def" style="flex:1;font-size:12px">🛡️ 防御</button>
      <button class="btn" onclick="usePotion()" id="btn-pot" style="flex:1;font-size:12px">🧪 薬 (<span id="pot-count">${(G&&G.player&&G.player.potions)||0}</span>)</button>
      <button class="btn" onclick="doFlee()" id="btn-flee" style="flex:1;font-size:12px">💨 逃げる</button>`;
  }
  function restoreBattleActionsV11(force){
    const act=document.getElementById('act-main');
    if(!act)return;
    const hasNext=(act.textContent||'').includes('次の部屋');
    if(force||act.dataset.v8Next==='1'||act.dataset.v11Next==='1'||hasNext){
      act.innerHTML=defaultBattleButtonsV11();
      delete act.dataset.v8Next;
      delete act.dataset.v11Next;
    }
  }
  function showNextRoomPanelV11(){
    addV11Style();
    const act=document.getElementById('act-main');
    if(act){
      act.dataset.v11Next='1';
      act.dataset.v8Next='1';
      act.innerHTML=`<button class="btn btn-p v11-next-btn" onclick="goNextRoomV8()" style="width:100%;font-size:13px;padding:10px">🚪 次の部屋へ進む</button>`;
    }
    const sprite=document.getElementById('e-sprite');if(sprite)sprite.textContent='🚪';
    const name=document.getElementById('e-name');if(name)name.textContent='ステージクリア！';
    const hpv=document.getElementById('e-hpv');if(hpv)hpv.textContent=`${(G&&G.stageKills)||7}/${(G&&G.stageTotal)||7} 撃破`;
    const hpb=document.getElementById('e-hpb');if(hpb)hpb.style.width='100%';
    const atk=document.getElementById('e-atk-v');if(atk)atk.textContent='-';
    const tags=document.getElementById('e-tags');
    if(tags){
      tags.innerHTML=`<div class="v11-next-card"><b>次の部屋へ進めます</b><br><span class="muted">ボタンを押すと Shop / 鍛冶屋 / 宝部屋 のどれかへ移動します。</span><br><span class="v11-rate">Shop出現率UP：${safeV11(roomRateTextV11())}</span><br><button class="btn btn-p v11-next-btn" onclick="goNextRoomV8()" style="margin-top:8px;width:100%">🚪 次の部屋へ</button></div>`;
    }
    const seg=document.getElementById('g-seg-label');if(seg)seg.textContent='ステージクリア：次の部屋へ進める';
  }
  function setNextRoomReadyV11(){
    if(!G)return;
    G.nextRoomReady=true;
    G.stageCompletePending=true;
    G.enemy=null;
    G.enemies=[];
    try{go('game');}catch(e){}
    try{addLog('🚪 ステージクリア！「次の部屋へ」を押して進もう。Shopが一番出やすくなった。','l-s');}catch(e){}
    try{renderGame();}catch(e){showNextRoomPanelV11();}
    try{updateQuickActions&&updateQuickActions();}catch(e){}
  }
  function stageIsCompleteV11(){
    if(!G)return false;
    const total=G.stageTotal||7;
    return G.stageMode==='wave' && (G.stageKills||0)>=total;
  }

  const oldShowPostRoomV11=window.showPostStageRoom||((typeof showPostStageRoom==='function')?showPostStageRoom:null);
  window.showPostStageRoom=function(){
    if(!G||!G.player){oldShowPostRoomV11&&oldShowPostRoomV11();return;}
    G.nextRoomReady=false;
    G.stageCompletePending=false;
    G.enemy=null;
    G.enemies=[];
    restoreBattleActionsV11(true);
    const picked=weightedPickV11(V11_ROOM_WEIGHTS).type;
    G.postRoom=picked;
    G.shopPreboss=false;
    G.shopStock=null;
    if(picked==='shop'&&typeof showShop==='function'){
      try{addLog('次の部屋：Shop（出現率アップ中）','l-i');}catch(e){}
      showShop(false);return;
    }
    if(picked==='forge'&&typeof showForgeRoom==='function'){
      try{addLog('次の部屋：鍛冶屋','l-i');}catch(e){}
      showForgeRoom();return;
    }
    if(typeof showTreasureRoom==='function'){
      try{addLog('次の部屋：宝部屋','l-i');}catch(e){}
      showTreasureRoom();return;
    }
    oldShowPostRoomV11&&oldShowPostRoomV11();
  };
  try{showPostStageRoom=window.showPostStageRoom;}catch(e){}

  window.goNextRoomV8=function(){
    if(!G||!G.player)return;
    const canGo=!!(G.nextRoomReady||G.stageCompletePending||stageIsCompleteV11());
    if(!canGo){
      try{addLog('まだ次の部屋には進めない。敵を全て倒そう。','l-w');}catch(e){}
      return;
    }
    window.showPostStageRoom();
  };
  try{goNextRoomV8=window.goNextRoomV8;}catch(e){}

  const oldEncounterV11=window.encounterCleared||((typeof encounterCleared==='function')?encounterCleared:null);
  window.encounterCleared=function(){
    if(G&&G.stageMode==='wave'){
      const total=G.stageTotal||7;
      if((G.stageKills||0)>=total){
        try{if(typeof tryChestDrop==='function')tryChestDrop();}catch(e){}
        setNextRoomReadyV11();
        return;
      }
    }
    if(oldEncounterV11)return oldEncounterV11();
  };
  try{encounterCleared=window.encounterCleared;}catch(e){}

  const oldRenderGameV11=window.renderGame||((typeof renderGame==='function')?renderGame:null);
  window.renderGame=function(){
    if(oldRenderGameV11)oldRenderGameV11();
    if(G&&G.nextRoomReady)showNextRoomPanelV11();
  };
  try{renderGame=window.renderGame;}catch(e){}

  const oldAdvanceFloorV11=window.advanceFloor||((typeof advanceFloor==='function')?advanceFloor:null);
  window.advanceFloor=function(){
    if(G){G.nextRoomReady=false;G.stageCompletePending=false;restoreBattleActionsV11(true);}
    if(oldAdvanceFloorV11)return oldAdvanceFloorV11();
  };
  try{advanceFloor=window.advanceFloor;}catch(e){}

  window.leaveShop=function(){
    if(!G)return;
    if(G.shopPreboss){G.shopStock=null;G.shopPreboss=false;restoreBattleActionsV11(true);if(typeof showStageSelect==='function')showStageSelect();return;}
    window.advanceFloor();
  };
  try{leaveShop=window.leaveShop;}catch(e){}

  const oldRenderShopV11=window.renderShop||((typeof renderShop==='function')?renderShop:null);
  window.renderShop=function(){
    if(oldRenderShopV11)oldRenderShopV11();
    const leaveBtn=document.querySelector('#scr-shop .btn-p');
    if(leaveBtn){
      leaveBtn.onclick=()=>window.leaveShop();

<script>
/* === v12: スマホUI最適化 / かんたん表示 / 軽量化パッチ === */
(()=>{
  const V12_KEY='itrl_simple_ui_v12';

  const V12_RECOMMENDED_JOBS=['warrior','mage','rogue','paladin','berserker','monk','archer','priest','samurai','ninja','alchemist','summoner'];

  function mobileV12(){

  function simpleV12(){
    const v=localStorage.getItem(V12_KEY);
    if(v==='1')return true;
    if(v==='0')return false;
    return mobileV12();
  }
  function setSimpleV12(on){
    localStorage.setItem(V12_KEY,on?'1':'0');
    applyModeV12();
    try{initTitle();}catch(e){}
    try{if(G&&G.player&&CURRENT_SCREEN==='shop')renderShop();}catch(e){}
  }
  window.setSimpleV12=setSimpleV12;
  window.toggleJobAllV12=function(){
    const now=localStorage.getItem(V12_SHOW_ALL_JOBS)==='1';
    localStorage.setItem(V12_SHOW_ALL_JOBS,now?'0':'1');
    try{renderJobGrid(document.getElementById('job-search')?.value||'');}catch(e){}
  };
  function escV12(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

  function addStyleV12(){
    if(document.getElementById('v12-mobile-style'))return;
    const st=document.createElement('style');st.id='v12-mobile-style';
    st.textContent=`
      .v12-control{margin:8px 0;padding:9px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-secondary);font-size:12px;line-height:1.6;color:var(--color-text-secondary)}
      .v12-control b{color:var(--color-text-primary)}
      .v12-control .btn{margin-top:6px;margin-right:4px;font-size:11px;padding:5px 8px;min-height:0}
      .v12-more-card{border-style:dashed;text-align:center;background:var(--color-background-secondary)}
      .v12-simple-panel{margin-bottom:8px;padding:10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-secondary);font-size:12px;line-height:1.65;color:var(--color-text-secondary)}

        .hpb{height:10px;border-radius:99px}
        #e-sprite{font-size:36px!important}
        #e-name{font-size:17px!important}
        .log{height:100px!important;overflow-y:auto!important;font-size:12px!important;line-height:1.75}
        #act-main{display:grid!important;grid-template-columns:1fr 1fr;gap:7px;position:sticky;bottom:66px;z-index:35;background:var(--color-background-primary);padding:7px;border:0.5px solid var(--color-border-tertiary);border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,.10)}

        .quick-actions .btn{flex:1;min-width:0;font-size:12px;padding:9px 6px;min-height:42px;white-space:nowrap;box-shadow:none}
        #scr-shop .btn-p{min-height:50px;font-size:15px;font-weight:600}
        #scr-title>div:first-child{padding-top:10px!important}
      }
    `;
    document.head.appendChild(st);
  }

  function applyModeV12(){
    addStyleV12();
    document.documentElement.classList.toggle('v12-simple',simpleV12());
    const app=document.getElementById('app');if(app)app.classList.add('v12-ready');

  function injectTitleControlV12(){
    const title=document.getElementById('scr-title');
    const search=document.getElementById('job-search');
    if(!title||!search)return;
    let box=document.getElementById('v12-title-control');
    if(!box){
      box=document.createElement('div');box.id='v12-title-control';box.className='v12-control';
      search.parentNode.insertBefore(box,search);
    }
    const on=simpleV12();
    box.innerHTML=`📱 <b>スマホ向けUI ${on?'ON':'OFF'}</b><br>
      ${on?'職業・Shop・装備画面を少しだけ整理して表示中。':'全部の情報をそのまま表示中。'}<br>
      <button class="btn ${on?'btn-g':''}" onclick="setSimpleV12(${on?'false':'true'})">${on?'通常表示にする':'スマホ向けにする'}</button>
      <button class="btn" onclick="toggleJobAllV12()">${localStorage.getItem(V12_SHOW_ALL_JOBS)==='1'?'おすすめ職だけ表示':'全職業を表示'}</button>`;
  }

  const oldRenderJobGridV12=window.renderJobGrid||((typeof renderJobGrid==='function')?renderJobGrid:null);
  window.renderJobGrid=function(q){
    const grid=document.getElementById('job-grid');
    if(!grid||!Array.isArray(window.JOBS||JOBS)){oldRenderJobGridV12&&oldRenderJobGridV12(q);return;}
    const query=String(q||'');
    const lc=query.toLowerCase();
    let jobs=JOBS.filter(j=>j.n.includes(query)||j.t.includes(query)||lc===''||j.id.includes(lc));
    const simple=simpleV12();
    const showAll=localStorage.getItem(V12_SHOW_ALL_JOBS)==='1';
    if(simple&&!query&&!showAll){
      const rec=new Set(V12_RECOMMENDED_JOBS);
      jobs=jobs.filter(j=>rec.has(j.id)).sort((a,b)=>V12_RECOMMENDED_JOBS.indexOf(a.id)-V12_RECOMMENDED_JOBS.indexOf(b.id));
    }
    const count=document.getElementById('job-count');
    if(count)count.textContent=`(${jobs.length}/${JOBS.length}職${simple&&!showAll&&!query?'・おすすめ':''})`;
    grid.innerHTML='';
    jobs.forEach(j=>{
      const d=document.createElement('div');d.className='jcard';d.id='jc-'+j.id;
      d.innerHTML=`<div class="ji">${escV12(j.i)}</div><div class="jn">${escV12(j.n)}</div><div class="jt">${escV12(j.t)}</div>`;
      d.onclick=()=>selectJob(j.id);grid.appendChild(d);
    });
    if(simple&&!query&&!showAll){
      const more=document.createElement('div');more.className='jcard v12-more-card';
      more.innerHTML=`<div class="ji">➕</div><div class="jn">全職業を見る</div><div class="jt">${JOBS.length-jobs.length}職を表示</div>`;
      more.onclick=()=>{localStorage.setItem(V12_SHOW_ALL_JOBS,'1');renderJobGrid('');};
      grid.appendChild(more);
    }
    injectTitleControlV12();
  };
  try{renderJobGrid=window.renderJobGrid;}catch(e){}

  const oldSelectJobV12=window.selectJob||((typeof selectJob==='function')?selectJob:null);
  window.selectJob=function(id){
    oldSelectJobV12&&oldSelectJobV12(id);
    if(mobileV12()){
      setTimeout(()=>document.getElementById('job-detail')?.scrollIntoView({block:'nearest',behavior:'smooth'}),30);
    }
  };
  try{selectJob=window.selectJob;}catch(e){}

  function shopPriorityV12(items){
    if(!Array.isArray(items)||!simpleV12())return items;
    const buckets={equip:[],skill:[],potion:[],key:[],orb:[],material:[]};
    items.forEach(x=>(buckets[x.t]||buckets.material).push(x));
    const out=[...buckets.equip.slice(0,4),...buckets.skill.slice(0,3),...buckets.potion.slice(0,2),...buckets.key.slice(0,1),...buckets.orb.slice(0,1),...buckets.material.slice(0,1)];
    return out.length?out.slice(0,12):items.slice(0,12);
  }
  const oldGenerateShopStockV12=window.generateShopStock||((typeof generateShopStock==='function')?generateShopStock:null);
  window.generateShopStock=function(){
    const items=oldGenerateShopStockV12?oldGenerateShopStockV12():[];
    return shopPriorityV12(items);
  };
  try{generateShopStock=window.generateShopStock;}catch(e){}

  const oldRenderShopV12=window.renderShop||((typeof renderShop==='function')?renderShop:null);
  window.renderShop=function(){
    oldRenderShopV12&&oldRenderShopV12();
    const grid=document.getElementById('shop-grid');
    if(grid&&simpleV12()&&!document.getElementById('v12-shop-simple-note')){
      const note=document.createElement('div');note.id='v12-shop-simple-note';note.className='v12-simple-panel';note.style='grid-column:1/-1';
      note.innerHTML='📱 <b>かんたんShop</b><br>スマホでは商品数を約12個に整理。武器・スキル・回復・鍵を優先して出しています。';
      grid.prepend(note);
    }
  };
  try{renderShop=window.renderShop;}catch(e){}

  function equipScoreV12(it){
    const s=it&&it.stats||{};const rar=['common','uncommon','rare','epic','legend','mythic','god','cosmic'];
    return (s.atk||0)*5+(s.def||0)*4+(s.STR||0)*4+(s.INT||0)*4+(s.DEX||0)*3+(s.AGI||0)*3+(s.VIT||0)*3+(s.LUK||0)*2+(s.HP||0)*0.06+(s.MP||0)*0.06+(it.weaponSkill?18:0)+(rar.indexOf(it.rar)+1)*6+(it.lv||1)*2;
  }
  window.autoEquipBestV12=function(){
    const p=G&&G.player;if(!p||typeof ensureV3State!=='function')return;
    ensureV3State(p);
    const items=[...(p.inventory&&p.inventory.equipment||[])].sort((a,b)=>equipScoreV12(b)-equipScoreV12(a));
    const used=new Set();
    function best(slot,filter){
      const it=items.find(x=>!used.has(x.id)&&filter(x));
      if(it){p.equip[slot]=it.id;used.add(it.id);}
    }
    best('right',x=>x.slot==='weapon');
    best('left',x=>x.slot==='weapon');
    if(typeof EQUIP_SLOTS!=='undefined'){
      EQUIP_SLOTS.forEach(slot=>{
        if(slot==='right'||slot==='left')return;
        if(slot==='acc1'||slot==='acc2')best(slot,x=>x.slot==='accessory');
        else best(slot,x=>x.slot===slot);
      });
    }
    try{syncEquipmentStats(p);recalcVitals(p);renderInventory();renderGame();addLog('おすすめ装備に変更した','l-s');}catch(e){}
  };
  window.autoAllocateStatsV12=function(){
    const p=G&&G.player;if(!p||!p.statPoints)return;
    const id=p.jobId||'';
    let order=['STR','VIT','HP','DEX','AGI','LUK'];
    if(/mage|mancer|witch|oracle|stargazer|chrono|summoner|priest|shaman|druid|elementalist/.test(id))order=['INT','MP','VIT','HP','AGI','LUK'];
    if(/paladin|knight|sentinel|geomancer/.test(id))order=['VIT','HP','STR','DEF','MP','LUK'];
    if(/rogue|ninja|assassin|archer|gunner|phantom/.test(id))order=['DEX','AGI','STR','LUK','HP','VIT'];
    while(p.statPoints>0){const k=order[p.statPoints%order.length];p.stats[k]=(p.stats[k]||0)+1;p.statPoints--;}
    try{syncEquipmentStats(p);recalcVitals(p);renderStats();renderGame();addLog('おすすめでステ振りした','l-s');}catch(e){}
  };
  window.openAllPossibleChestsV12=function(){
    const p=G&&G.player;if(!p||!p.inventory||typeof openChest!=='function')return;
    let opened=0;
    const colors=(typeof ADV_COLORS!=='undefined'?ADV_COLORS:Object.keys(p.inventory.chests||{}));
    colors.forEach(c=>{
      let guard=0;
      while((p.inventory.keys[c]||0)>0&&(p.inventory.chests[c]||0)>0&&guard<20){openChest(c,true);opened++;guard++;}
    });
    try{renderInventory();renderGame();addLog(opened?`宝箱を${opened}個開けた`:'開けられる宝箱がない','l-i');}catch(e){}
  };

  const oldRenderInventoryV12=window.renderInventory||((typeof renderInventory==='function')?renderInventory:null);
  window.renderInventory=function(){
    oldRenderInventoryV12&&oldRenderInventoryV12();
    const p=G&&G.player;const slots=document.getElementById('eq-slots');
    if(!p||!slots||!simpleV12())return;
    if(!document.getElementById('v12-inv-panel')){
      const panel=document.createElement('div');panel.id='v12-inv-panel';panel.className='v12-simple-panel';
      panel.innerHTML=`📱 <b>かんたん装備</b><br>迷ったらこの3つだけでOK。細かい装備変更は下に残してあります。<br>
        <button class="btn btn-p" onclick="autoEquipBestV12()">おすすめ装備</button>
        <button class="btn" onclick="forgeEnhance('right')">右手強化</button>
        <button class="btn" onclick="forgeEnhance('left')">左手強化</button>
        <button class="btn" onclick="openAllPossibleChestsV12()">宝箱まとめ開け</button>`;
      slots.parentNode.insertBefore(panel,slots);
    }
  };
  try{renderInventory=window.renderInventory;}catch(e){}

  const oldRenderStatsV12=window.renderStats||((typeof renderStats==='function')?renderStats:null);
  window.renderStats=function(){
    oldRenderStatsV12&&oldRenderStatsV12();
    const g=document.getElementById('stat-grid-alloc');
    if(!g||!simpleV12())return;
    if(!document.getElementById('v12-stat-panel')){
      const panel=document.createElement('div');panel.id='v12-stat-panel';panel.className='v12-simple-panel';
      panel.innerHTML=`📱 <b>かんたんステ振り</b><br>迷ったら「おすすめ振り分け」でOK。職業ごとに攻撃型・魔法型・耐久型をざっくり判定します。<br>
        <button class="btn btn-p" onclick="autoAllocateStatsV12()">おすすめ振り分け</button>`;
      g.parentNode.insertBefore(panel,g);
    }
  };
  try{renderStats=window.renderStats;}catch(e){}

  const oldRenderGameV12=window.renderGame||((typeof renderGame==='function')?renderGame:null);
  window.renderGame=function(){
    oldRenderGameV12&&oldRenderGameV12();
    if(simpleV12()&&mobileV12()){
      const equip=document.getElementById('equip-info');
      if(equip&&equip.innerHTML.length>90)equip.classList.add('muted');
      const seg=document.getElementById('g-seg-label');
      if(seg&&G&&G.nextRoomReady)seg.textContent='クリア！次の部屋へ';
    }
  };
  try{renderGame=window.renderGame;}catch(e){}

  const oldUpdateQuickV12=window.updateQuickActions||((typeof updateQuickActions==='function')?updateQuickActions:null);
  window.updateQuickActions=function(){
    oldUpdateQuickV12&&oldUpdateQuickV12();
    if(!simpleV12()||!mobileV12())return;
    const q=document.getElementById('quick-actions');if(!q)return;
    q.querySelectorAll('button').forEach(b=>{
      b.textContent=b.textContent.replace('装備変更','装備').replace('ステ振り','ステ').replace('次の部屋へ進む','次へ').replace('次の部屋へ','次へ');
    });
  };
  try{updateQuickActions=window.updateQuickActions;}catch(e){}

  const oldInitTitleV12=window.initTitle||((typeof initTitle==='function')?initTitle:null);
  window.initTitle=function(){
    applyModeV12();
    oldInitTitleV12&&oldInitTitleV12();
    applyModeV12();injectTitleControlV12();
    const title=document.querySelector('#scr-title h2');if(title)title.textContent='🏰 無限の塔 v12';
    const notice=document.getElementById('save-notice');
    if(notice&&!document.getElementById('v12-title-note')){
      const note=document.createElement('div');note.id='v12-title-note';note.className='v12-control';
      note.innerHTML='📱 <b>v12</b>：スマホで押しやすいUIに調整。スマホ向けON時は、職業・Shop・装備・ステ振りを少しだけ整理して表示します。';
      notice.insertAdjacentElement('afterend',note);
    }
  };
  try{initTitle=window.initTitle;}catch(e){}

  addStyleV12();applyModeV12();
  try{const title=document.querySelector('#scr-title h2');if(title)title.textContent='🏰 無限の塔 v12';injectTitleControlV12();}catch(e){}
})();
</script>


<script>
/* === v13: 未解放職業を完全非表示化 === */
(()=>{
  const V13_SHOW_ALL_JOBS='itrl_show_all_jobs_v12';
  const V13_RECOMMENDED_JOBS=['warrior','mage','rogue','paladin','berserker','monk','archer','priest','samurai','ninja','alchemist','summoner'];

  function escV13(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
  function mobileV13(){try{return window.matchMedia&&window.matchMedia('(max-width: 820px)').matches;}catch(e){return false;}}
  function simpleV13(){
    const v=localStorage.getItem('itrl_simple_ui_v12');
    if(v==='1')return true;
    if(v==='0')return false;
    return mobileV13();
  }
  function unlockedCountV13(){
    try{
      if(typeof jobUnlockedCount==='function')return Math.max(0,Math.min(JOBS.length,Number(jobUnlockedCount())||5));
    }catch(e){}
    try{
      if(typeof metaV3==='function'){
        const m=metaV3();return Math.max(0,Math.min(JOBS.length,Number(m.unlocked)||5));
      }
    }catch(e){}
    return Math.min(5,JOBS.length);
  }
  function unlockedJobsV13(){
    const n=unlockedCountV13();

  function pctV20(v,max){v=Number(v)||0;max=Math.max(1,Number(max)||1);return Math.max(0,Math.min(100,Math.round(v/max*100)));}
  function wordByPctV20(pct,a,b,c,d){return pct<=20?a:pct<=45?b:pct<=75?c:d;}

  function xpWordV20(p){const pct=pctV20(p&&p.xp,p&&p.xpNext);return wordByPctV20(pct,'芽生え','少し進んだ','育っている','満ちそう');}
  function countWordV20(n){n=Number(n)||0;return n<=0?'なし':n<=2?'少し':n<=6?'あり':'十分';}

  function stripStatWordsV20(s){
    s=String(s??'');
    const rep=[
      [/\bSTR\b/g,'力'],[/\bDEX\b/g,'技'],[/\bAGI\b/g,'速さ'],[/\bINT\b/g,'魔'],[/\bVIT\b/g,'耐久'],[/\bLUK\b/g,'運'],
      [/\bATK\b/g,'攻め'],[/\bDEF\b/g,'守り'],[/\bSPD\b/g,'速さ'],[/\bXP\b/g,'経験'],[/\bMP\b/g,'魔力'],[/\bHP\b/g,'生命']
    ];
    rep.forEach(([r,t])=>s=s.replace(r,t));
    s=s.replace(/(?:力|技|速さ|魔|耐久|運|攻め|守り|生命|魔力)\s*[+＋-]\s*\d+(?:\.\d+)?/g,'不思議な補正');
    s=s.replace(/[+＋-]\s*\d+(?:\.\d+)?\s*(?:%|倍|ターン|T)?/g,'');
    s=s.replace(/\d+(?:\.\d+)?\s*(?:%|倍|ターン|T)/g,'');
    s=s.replace(/\[\s*魔力\s*:\s*\d+\s*\]/g,'');
    s=s.replace(/CD\s*:\s*\d+\s*T?/g,'');
    return s.replace(/\s{2,}/g,' ').trim();
  }

  function escV25(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

    if(!bar){bar=document.createElement('div');bar.className='v25-progress';bar.innerHTML='<i></i>';const head=panel.firstElementChild;head&&head.insertAdjacentElement('afterend',bar);}
    const i=bar.querySelector('i');if(i)i.style.width=Math.max(1,Math.min(100,count/5000*100))+'%';
  }

  function limitListV25(container, selector, limit, key, moreLabel){
    const root=typeof container==='string'?$(container):container;if(!root)return;
    const expanded=storageGet(key)==='1';
    $$('.v25-more',root).forEach(x=>x.remove());
    const items=$$(selector,root).filter(el=>!el.classList.contains('v25-more'));
    if(!items.length)return;
    const actualLimit=expanded?items.length:limit;
    let hidden=0;
    items.forEach((el,idx)=>{const hide=idx>=actualLimit;el.style.display=hide?'none':'';if(hide)hidden++;});
    if(hidden>0){
      const more=document.createElement('div');
      more.className=(items[0].className||'card')+' v25-more';
      more.innerHTML=`<div><b>＋ さらに表示</b><br><span class="muted">${escV25(moreLabel||'残り')} ${hidden}件</span></div>`;
      more.onclick=()=>{storageSet(key,'1');limitListV25(root,selector,limit,key,moreLabel);};
      root.appendChild(more);
    }
  }

  function optimizeTitlePanelV25(){
    addProgressToTitlePanelV25();
    const panel=$('#v24-title-panel');if(!panel)return;
    limitListV25(panel.querySelector('.v24-title-row'), 'button', 12, 'titles_expanded', '称号');
    const note=panel.querySelector('.muted');

  function optimizeJobGridV25(){
    const grid=$('#job-grid');if(!grid)return;
    const q=String($('#job-search')?.value||'').trim();
    const limit=q?60:32;
    limitListV25(grid,'.jcard',limit,q?'jobs_search_expanded':'jobs_expanded','職業');
    const count=$('#job-count');
    if(count){
      count.textContent=count.textContent.replace(/全(\d+)職/,'記録上 $1職').replace(/表示 \/ /,'表示 / ');
    }
  }

  function optimizeShopV25(){
    limitListV25('#shop-grid', '.card, .inv-item, div', 12, 'shop_expanded', '商品');
  }
  function optimizeInventoryV25(){
    limitListV25('#inv-grid', '.inv-item', 30, 'inventory_expanded', '所持品');
  }

  function normalizeBarsV25(){
    // Keep exact values internal; show only readable bar labels.
    const pHp=$('#p-hpv');if(pHp)pHp.textContent='体力';
    const pMp=$('#p-mpv');if(pMp)pMp.textContent='魔力';
    const eHp=$('#e-hpv');if(eHp)eHp.textContent='気配';
    const eAtk=$('#e-atk-v');if(eAtk)eAtk.parentElement&&(eAtk.parentElement.style.display='none');
  }

  function labelButtonsV25(){
    const bAtk=$('#btn-atk');if(bAtk)bAtk.textContent='⚔️ 攻める';
    const bDef=$('#btn-def');if(bDef)bDef.textContent='🛡️ 守る';
    const bPot=$('#btn-pot');if(bPot){
      const cnt=$('#pot-count')?.textContent||'';
      bPot.innerHTML=`🧪 癒す <span id="pot-count">${escV25(cnt)}</span>`;
    }
    const bFlee=$('#btn-flee');if(bFlee)bFlee.textContent='💨 離脱';
    document.querySelectorAll('button').forEach(btn=>{
      const oc=btn.getAttribute('onclick')||'';
      if(oc.includes('openSave'))btn.textContent='💾 セーブ';
      if(btn.textContent.includes('中断セーブ'))btn.textContent='💾 セーブ';
    });
  }

  function tidyUtilityHeadersV25(){
    const invTitle=$('#scr-inventory h2');if(invTitle)invTitle.textContent='🎒 持ち物';
    const statTitle=$('#scr-stats h2');if(statTitle)statTitle.textContent='📈 鍛錬';
    const shopTitle=$('#scr-shop h2');if(shopTitle)shopTitle.textContent='🏪 店';
    const stageTitle=$('#scr-stage h2');if(stageTitle)stageTitle.textContent='🧭 行き先';
  }

  function optimizeScreenV25(){
    addStyleV25();setCleanTitleV25();compactTitleNoticeV25();tidyUtilityHeadersV25();
    optimizeTitlePanelV25();optimizeJobGridV25();optimizeShopV25();optimizeInventoryV25();
    normalizeBarsV25();labelButtonsV25();
  }

  function resetExpansionOnSearchV25(){
    const inp=$('#job-search');if(!inp||inp.dataset.v25Bound)return;
    inp.dataset.v25Bound='1';
    inp.addEventListener('input',()=>{storageSet('jobs_search_expanded','0');setTimeout(optimizeJobGridV25,0);},{passive:true});
  }

  function installQuickActionsV25(){
    const q=$('#quick-actions');if(!q)return;
    q.innerHTML=`
      <button class="btn" onclick="openStats&&openStats()">📈 鍛錬</button>
      <button class="btn" onclick="openInventory&&openInventory()">🎒 持ち物</button>
      <button class="btn btn-g" onclick="openSave&&openSave()">💾 セーブ</button>`;
  }

  function wrapV25(name, after){
    const old=window[name]||((typeof globalThis!=='undefined')?globalThis[name]:null);
    if(typeof old!=='function')return;
    window[name]=function(){const r=old.apply(this,arguments);try{after&&after();}catch(e){console.warn('v25 after failed',name,e);}return r;};
    try{eval(name+'=window[name]');}catch(e){}
  }

  ['initTitle','renderJobGrid','filterJobs','renderGame','renderShop','renderInventory','renderStats','openStats','openInventory','showStageSelect','showShop','showPostStageRoom','advanceFloor','goNextRoomV8','goNextRoomV11','loadGame','startGame'].forEach(fn=>wrapV25(fn,()=>setTimeout(optimizeScreenV25,0)));
  addStyleV25();resetExpansionOnSearchV25();installQuickActionsV25();

  setTimeout(optimizeScreenV25,250);
})();

<script>
/* === v28: lightweight title/job controller ===
   - 初期画面はタイトル・冒頭文・職業選択だけ
   - 最初は5職のみ表示
   - 5階ごとに1職ずつ条件解放
   - 称号/隠し補正/検索/カテゴリ/詳細パネルの初期描画を止める
   - 古い重いUI保存データを軽く掃除
*/
(()=>{
  'use strict';

  const INITIAL_JOB_IDS=['warrior','mage','rogue','paladin','berserker'];
  const META_KEY='itrl_meta_v3';
  const SAVE_KEY_LITE=(typeof SAVE_KEY!=='undefined'?SAVE_KEY:'itrl_save_v2');
  const LEGACY_KEYS=[
    'itrl_titles_v24','itrl_show_all_jobs_v12','itrl_job_category_v14',
    'itrl_titles_expanded','itrl_jobs_expanded','itrl_jobs_search_expanded'
  ];

  const oldStartGame=window.startGame||((typeof startGame==='function')?startGame:null);
  const oldLoadGame=window.loadGame||((typeof loadGame==='function')?loadGame:null);
  const oldGo=window.go||((typeof go==='function')?go:null);

  function $(id){return document.getElementById(id);}
  function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function safeJSON(raw,def=null){try{return raw?JSON.parse(raw):def;}catch(e){return def;}}
  function readMeta(){return Object.assign({bestFloor:1,unlocked:5}, safeJSON(localStorage.getItem(META_KEY),{})||{});}
  function unlockedCount(){
    const m=readMeta();
    const best=Math.max(1,Number(m.bestFloor)||1);
    return clamp(5+Math.floor(Math.max(0,best-1)/5),5,JOBS.length);
  }
  function normalizeMeta(){
    const m=readMeta();
    m.bestFloor=Math.max(1,Number(m.bestFloor)||1);
    m.unlocked=unlockedCount();
    try{localStorage.setItem(META_KEY,JSON.stringify(m));}catch(e){}
    return m;
  }
  function isUnlocked(id){
    const idx=JOBS.findIndex(j=>j.id===id);
    return idx>=0 && idx<unlockedCount();
  }
  function cleanupLegacyStorage(){
    try{LEGACY_KEYS.forEach(k=>localStorage.removeItem(k));}catch(e){}
  }

  function addLiteStyle(){
    if($('v28-lite-style'))return;
    const st=document.createElement('style');
    st.id='v28-lite-style';
    st.textContent=`
      #job-count,#job-filter-btns,#job-search,#job-detail,
      #v12-title-control,#v15-title-panel,#v16-adaptive-panel,#v17-hidden-panel,#v24-title-panel,#v15-dual-panel,
      .v12-more-card,.v25-more,.v15-job-meta,.v16-cond,.v17-secret-chip{display:none!important}
      #scr-title{display:block!important;max-width:720px;margin:0 auto;}
      #scr-title > div:first-child{text-align:center!important;padding:18px 0 12px!important}
      #scr-title h2{font-size:26px!important;letter-spacing:.01em}
      #scr-title .job-grid{display:grid!important;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px;max-height:none!important;overflow:visible!important;margin-top:10px;contain:layout style;}
      #scr-title .jcard{min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;content-visibility:auto;contain-intrinsic-size:92px 128px;}
      #scr-title .jcard .jt,#scr-title .jcard small{display:none!important}
      #scr-title .jcard.sel{border:2px solid #534AB7;background:var(--color-background-secondary)}

    `;
    document.head.appendChild(st);
  }

  function cleanTitleDOM(){
    addLiteStyle();
    const title=document.querySelector('#scr-title h2'); if(title)title.textContent='🏰 無限の塔';
    const lead=document.querySelector('#scr-title p'); if(lead)lead.textContent='塔に終わりはない。';

    const h3=document.querySelector('#scr-title h3');
    if(h3){
      h3.childNodes.forEach(n=>{if(n.nodeType===Node.TEXT_NODE)n.nodeValue='職業を選ぶ';});
      const count=$('job-count'); if(count){count.textContent=''; count.style.setProperty('display','none','important');}
    }
    ['job-filter-btns','job-search','job-detail','v12-title-control','v15-title-panel','v16-adaptive-panel','v17-hidden-panel','v24-title-panel','v15-dual-panel'].forEach(id=>{
      const el=$(id); if(!el)return;

      el.style.setProperty('display','none','important');

  }

  function liteJobs(){
    normalizeMeta();
    const n=unlockedCount();
    return JOBS.map((j,i)=>Object.assign({idx:i},j)).filter(j=>j.idx<n);
  }

  function renderJobGridLite(){
    cleanTitleDOM();
    const grid=$('job-grid'); if(!grid)return;
    const frag=document.createDocumentFragment();
    liteJobs().forEach(j=>{
      const d=document.createElement('div');
      d.className='jcard';

      d.innerHTML=`<div class="ji">${esc(j.i)}</div><div class="jn">${esc(j.n)}</div>`;
      d.onclick=()=>selectJobLite(j.id);
      frag.appendChild(d);
    });
    grid.replaceChildren(frag);
    const start=$('start-btn'); if(start)start.disabled=!G?.selectedJob;
  }

  function selectJobLite(id){
    if(!isUnlocked(id))return;
    if(typeof G==='object')G.selectedJob=id;
    document.querySelectorAll('#job-grid .jcard').forEach(c=>c.classList.toggle('sel',c.id==='jc-'+id));

  function renderSaveNotice(){
    const sn=$('save-notice'); const lb=$('load-btn');
    if(!sn||!lb)return;
    const raw=localStorage.getItem(SAVE_KEY_LITE);
    const d=safeJSON(raw,null);

      sn.style.display='block';
      sn.innerHTML=`<div class="surf" style="font-size:12px;color:var(--color-text-secondary)"><span class="save-dot"></span>セーブデータあり：${esc(d.player.job||'冒険者')} — ${esc(d.player.floor||1)}階</div>`;
      lb.style.display='block';
    }else{
      if(raw)try{localStorage.removeItem(SAVE_KEY_LITE);}catch(e){}
      sn.style.display='none';
      lb.style.display='none';
    }
  }

  function initTitleLite(){
    try{cleanupLegacyStorage();normalizeMeta();}catch(e){}
    if(typeof G==='object')G={};
    addLiteStyle();
    cleanTitleDOM();
    renderJobGridLite();
    renderSaveNotice();
    if(typeof oldGo==='function')oldGo('title');
    else document.querySelectorAll('.scr').forEach(x=>x.classList.toggle('on',x.id==='scr-title'));
  }

  window.renderJobGrid=()=>renderJobGridLite();
  window.filterJobs=()=>renderJobGridLite();
  window.selectJob=selectJobLite;
  window.initTitle=initTitleLite;
  window.jobUnlockedCount=unlockedCount;
  window.metaV3=function(){return normalizeMeta();};
  window.saveMetaV3=function(m){
    const cur=Object.assign(readMeta(),m||{});
    cur.bestFloor=Math.max(1,Number(cur.bestFloor)||1);
    cur.unlocked=clamp(5+Math.floor(Math.max(0,cur.bestFloor-1)/5),5,JOBS.length);
    try{localStorage.setItem(META_KEY,JSON.stringify(cur));}catch(e){}
  };
  window.startGame=function(){
    if(!G||!G.selectedJob||!isUnlocked(G.selectedJob))return;
    return oldStartGame&&oldStartGame.apply(this,arguments);
  };
  window.loadGame=function(){
    try{return oldLoadGame&&oldLoadGame.apply(this,arguments);}catch(e){
      console.warn('save load failed; removed broken save',e);
      try{localStorage.removeItem(SAVE_KEY_LITE);}catch(_){}
      initTitleLite();
    }
  };

  try{renderJobGrid=window.renderJobGrid;}catch(e){}
  try{filterJobs=window.filterJobs;}catch(e){}
  try{selectJob=window.selectJob;}catch(e){}
  try{initTitle=window.initTitle;}catch(e){}
  try{startGame=window.startGame;}catch(e){}
  try{loadGame=window.loadGame;}catch(e){}
  try{jobUnlockedCount=window.jobUnlockedCount;}catch(e){}
  try{metaV3=window.metaV3;}catch(e){}
  try{saveMetaV3=window.saveMetaV3;}catch(e){}

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initTitleLite,{once:true});
  else initTitleLite();
})();
</script>


<script>
/* === v29: extreme lightweight shop + auto growth + vague skill costs === */
(()=>{
  'use strict';
  const $=id=>document.getElementById(id);
  const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
  const ensure=p=>{try{if(p&&typeof ensureV3State==='function')ensureV3State(p);}catch(e){} return p;};
  const screen=()=>document.querySelector('.scr.on')?.id||'';

  function addV29Style(){
    if($('v29-style'))return;
    const st=document.createElement('style');st.id='v29-style';
    st.textContent=`
      #scr-stats{display:none!important}
      button[onclick*="openStats"], .v29-hide{display:none!important}
      #shop-grid{grid-template-columns:repeat(auto-fill,minmax(138px,1fr))!important;gap:7px!important;contain:layout style;}
      #shop-grid .card{padding:9px!important;min-height:92px;content-visibility:auto;contain-intrinsic-size:96px 150px;}
      #shop-material-tools,#v11-shop-rate-note{display:none!important}
      .v29-kind{display:inline-block;font-size:10px;border-radius:99px;padding:2px 7px;background:var(--color-background-secondary);color:var(--color-text-secondary);margin-bottom:4px}
      .v29-price{font-size:12px;color:#BA7517;font-weight:500;margin-top:5px}
      .sk-ct{min-width:46px;text-align:right;white-space:nowrap}
      @media(max-width:620px){#shop-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important}.game-wrap{grid-template-columns:1fr!important}.side-col{display:grid;grid-template-columns:1fr;}}
    `;
    document.head.appendChild(st);
  }

  function costWord(cost){
    cost=Math.max(0,Number(cost)||0);
    if(cost<=0)return 'なし';
    if(cost<=10)return '極小';
    if(cost<=20)return '小';
    if(cost<=35)return '中';
    if(cost<=55)return '大';
    return '極大';
  }

  function itemKindLabel(item){
    if(!item)return '品物';
    if(item.t==='equip'){
      const s=item.eq&&item.eq.slot;
      if(s==='weapon')return '武器';
      if(s==='head'||s==='body'||s==='feet')return '防具';
      return '装備';
    }
    if(item.t==='skill')return '技書';
    if(item.t==='orb'||item.t==='orb2')return 'オーブ';
    if(item.t==='potion')return '回復薬';
    if(item.t==='key')return '鍵';
    if(item.t==='material')return '素材';
    return '品物';
  }

  function vagueEquipDesc(eq){
    if(!eq)return '装備品。';
    const slot=eq.slot==='weapon'?'武器':(eq.slot==='head'||eq.slot==='body'||eq.slot==='feet'?'防具':'装飾品');
    const rare=(eq.rarJp||'ふつう').replace(/超上振れ|超強|上振れ/g,'珍品');
    return `${slot} / ${rare}`;
  }

  function potionDescById(id){
    const m={p20:'小回復',p35:'回復',p50:'大回復',p75:'特大回復',p100:'全快級'};
    return m[id]||'回復';
  }

  function makeOrbLite(kind,rank){
    const f=(G&&G.player&&G.player.floor)||1;
    const kinds={atk:'攻撃強化',def:'防御強化',hpdrain:'吸収',mpdrain:'魔力回収',crit:'会心',luck:'幸運'};
    const ranks={micro:'極小',small:'小',mid:'中',large:'大',huge:'極大'};
    kind=kind||pick(Object.keys(kinds));
    rank=rank||pick(['micro','small','small','mid','mid','large','huge']);
    const price={micro:60,small:95,mid:145,large:230,huge:380}[rank]+f*rnd(4,9);
    return {t:'orb',orb:{kind,rank},n:`スキルオーブ：${kinds[kind]}【${ranks[rank]}】`,d:'装着すると何かが伸びる。',c:price};
  }

  function makeEquipLite(slotType){
    const f=(G&&G.player&&G.player.floor)||1;
    let eq=null;
    try{eq=makeEquip(slotType,f);}catch(e){}
    if(!eq){eq={id:'it'+Date.now()+Math.random(),slot:slotType==='weapon'?'weapon':'body',n:slotType==='weapon'?'名もなき武器':'名もなき防具',rarJp:'コモン',stats:{}};}
    // 表示名だけ整える。性能は内部に残す。
    if(eq.n)eq.n=String(eq.n).replace(/超上振れ|超強|上振れ/g,'珍しい');
    return {t:'equip',n:eq.n,d:vagueEquipDesc(eq),c:Math.round(45+f*6+((eq.stats&&eq.stats.atk)||0)*3+((eq.stats&&eq.stats.def)||0)*4),eq};
  }

  function makePotionLite(id,qty){
    const f=(G&&G.player&&G.player.floor)||1;
    const defs=(typeof POTION_DEF!=='undefined'?POTION_DEF:[]);
    const po=defs.find(x=>x.id===id)||pick(defs)||{id:'p35',jp:'回復薬'};
    return {t:'potion',pid:po.id,qty:qty||1,n:`${po.jp}${qty&&qty>1?'×'+qty:''}`,d:potionDescById(po.id),c:18+f*2+({p20:0,p35:20,p50:55,p75:105,p100:180}[po.id]||25)};
  }

  function makeKeyLite(color){
    const f=(G&&G.player&&G.player.floor)||1;
    const colors=(typeof ADV_COLORS!=='undefined'?ADV_COLORS:['銅','銀','金','レインボー']);
    const icons=(typeof ADV_COLOR_ICON!=='undefined'?ADV_COLOR_ICON:{});
    color=color||pick(colors);
    const rank=Math.max(0,colors.indexOf(color));
    return {t:'key',color,n:`${icons[color]||'🔑'} ${color}の鍵`,d:'同じ色の宝箱に使う。',c:30+f*3+rank*55};
  }

  function makeSkillCardLite(target,kind){
    const f=(G&&G.player&&G.player.floor)||1;
    const jp={phys:'物理',mag:'魔法',ult:'奥義'}[target]||'技';
    if(kind==='cost')return {t:'skill',target,kind,n:`${jp}の省エネ書`,d:'消費感が少し軽くなる。',c:70+f*6};
    return {t:'skill',target,kind:'power',n:`${jp}の強化書`,d:'技のキレが増す。',c:90+f*8};
  }

  window.generateShopStock=function(){
    const p=ensure(G&&G.player);const f=(p&&p.floor)||1;
    const pool=[];
    // 必ずだいたい全部のジャンルが混ざるようにする。
    for(let i=0;i<6;i++)pool.push(makeEquipLite(i<4?'weapon':pick(['armor','accessory'])));
    for(let i=0;i<4;i++)pool.push(makeEquipLite(pick(['armor','accessory'])));
    ['phys','mag','ult'].forEach(t=>{pool.push(makeSkillCardLite(t,'power'));pool.push(makeSkillCardLite(t,'cost'));});
    for(let i=0;i<7;i++)pool.push(makeOrbLite());
    pool.push(makePotionLite('p20',2),makePotionLite('p35',2),makePotionLite('p50',1),makePotionLite('p75',1),makePotionLite('p100',1));
    const colors=(typeof ADV_COLORS!=='undefined'?ADV_COLORS:['銅','銀','金','レインボー']);
    colors.forEach(c=>pool.push(makeKeyLite(c)));
    pool.push({t:'material',mat:'万能素材',qty:rnd(3,7),n:'素材袋',d:'鍛冶に使えそう。',c:35+f*3});
    pool.push({t:'material',mat:'希少な結晶素材',qty:1,n:'希少素材袋',d:'いい素材の気配。',c:110+f*7});
    return shuffle(pool).slice(0,20);
  };
  try{generateShopStock=window.generateShopStock;}catch(e){}

  window.renderShop=function(){
    addV29Style();
    const p=ensure(G&&G.player); if(!p)return;
    const gold=$('sh-gold'); if(gold)gold.textContent=p.gold;
    if(!G.shopStock||!Array.isArray(G.shopStock)||G.shopStock.length<20)G.shopStock=window.generateShopStock();
    const grid=$('shop-grid'); if(!grid)return;
    const html=G.shopStock.map((item,idx)=>{
      const sold=item&&item.sold;
      return `<div class="card" data-shop-idx="${idx}" style="cursor:${sold?'default':'pointer'};opacity:${sold?'.42':'1'}">
        <span class="v29-kind">${esc(itemKindLabel(item))}</span>
        <div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">${sold?'✅ ':''}${esc(item&&item.n)}</div>
        <div class="muted" style="margin-top:3px">${esc(item&&item.d)}</div>
        <div class="v29-price">💰 ${esc(item&&item.c)}G</div>
      </div>`;
    }).join('');
    grid.innerHTML=html;
    if(!grid.dataset.v29Click){
      grid.dataset.v29Click='1';
      grid.addEventListener('click',ev=>{
        const card=ev.target.closest('[data-shop-idx]');
        if(!card)return;
        const idx=Number(card.dataset.shopIdx);
        if(Number.isFinite(idx))window.buyShopItemV3(idx);
      });
    }
    const mat=$('shop-material-tools'); if(mat)mat.remove();
    const note=$('v11-shop-rate-note'); if(note)note.remove();
    let reroll=$('shop-reroll-btn');
    const leaveBtn=document.querySelector('#scr-shop .btn-p');
    if(!reroll&&leaveBtn){reroll=document.createElement('button');reroll.id='shop-reroll-btn';reroll.className='btn';reroll.style='width:100%;margin-top:8px;padding:8px';leaveBtn.parentNode.insertBefore(reroll,leaveBtn);}
    if(reroll){const cost=35+p.floor*2;reroll.textContent=`🔄 商品入れ替え（${cost}G）`;reroll.onclick=()=>{if(p.gold<cost){window.addLog&&addLog('お金が足りない。','l-w');return;}p.gold-=cost;G.shopStock=window.generateShopStock();window.renderShop();};}
    if(leaveBtn){leaveBtn.onclick=()=>window.leaveShop?window.leaveShop():null;leaveBtn.textContent=(G&&G.shopPreboss)?'ボス選択に戻る':'次の階層へ進む';}
  };
  try{renderShop=window.renderShop;}catch(e){}

  const oldBuy=window.buyShopItemV3||((typeof buyShopItemV3==='function')?buyShopItemV3:null);
  window.buyShopItemV3=function(idx){
    const item=G&&G.shopStock&&G.shopStock[idx]; if(!item||item.sold)return;
    const p=ensure(G&&G.player); if(!p)return;
    if(p.gold<item.c){addLog('お金が足りない。','l-w');return;}
    p.gold-=item.c; item.sold=true;
    try{
      if(item.t==='equip'){p.inventory.equipment.push(item.eq);addLog(`${item.n}を手に入れた。`,'l-i');}
      else if(item.t==='skill'){if(typeof upgradeSkill==='function')upgradeSkill(item.target,item.kind);addLog(`${item.n}を読んだ。`,'l-s');}
      else if(item.t==='orb'||item.t==='orb2'){if(typeof window.applyOrb==='function')window.applyOrb(item.orb||item.orbKind||item.orb);addLog(`${item.n}を装着した。`,'l-s');}
      else if(item.t==='potion'){p.inventory.potions[item.pid]=(p.inventory.potions[item.pid]||0)+(item.qty||1);addLog(`${item.n}を買った。`,'l-h');}
      else if(item.t==='key'){p.inventory.keys[item.color]=(p.inventory.keys[item.color]||0)+1;addLog(`${item.color}の鍵を入手。`,'l-i');}
      else if(item.t==='material'){p.materials[item.mat]=(p.materials[item.mat]||0)+(item.qty||1);addLog('素材を入手。','l-i');}
      else if(oldBuy)return oldBuy(idx);
      if(typeof syncEquipmentStats==='function')syncEquipmentStats(p);
      if(typeof recalcVitals==='function')recalcVitals(p);
    }catch(e){console.warn('buy failed',e);}
    window.renderShop(); try{renderGame();}catch(e){}
  };
  try{buyShopItemV3=window.buyShopItemV3;}catch(e){}

  const oldShowShop=window.showShop||((typeof showShop==='function')?showShop:null);
  window.showShop=function(preboss){
    addV29Style();
    const p=ensure(G&&G.player); if(!p&&oldShowShop)return oldShowShop(preboss);
    G.shopPreboss=!!preboss;
    G.shopStock=window.generateShopStock();
    window.renderShop();
    if(typeof go==='function')go('shop');
  };
  try{showShop=window.showShop;}catch(e){}

  function autoWeights(p){
    const w={HP:1.1,MP:1,STR:1,DEX:.8,AGI:.8,INT:1,VIT:1,LUK:.45};
    try{
      const j=(typeof JOBS!=='undefined'&&JOBS.find(x=>x.id===p.jobId))||null;
      if(j){
        if(j.hp>=105){w.HP+=1.8;w.VIT+=1.0;}
        if(j.mp>=70){w.MP+=1.5;w.INT+=1.7;}
        if(j.atk>=16){w.STR+=2.0;w.DEX+=.6;}
        if(j.def>=10){w.VIT+=1.7;w.HP+=.6;}
        if(j.spd>=13){w.AGI+=1.7;w.DEX+=1.0;}
      }
    }catch(e){}
    return w;
  }
  function weightedPick(w){
    const entries=Object.entries(w);let sum=entries.reduce((a,[,v])=>a+v,0),r=Math.random()*sum;
    for(const [k,v] of entries){r-=v;if(r<=0)return k;}return entries[0][0];
  }
  function autoAllocate(p,points){
    p=ensure(p); if(!p)return;
    points=Math.max(0,Number(points)||0);
    if(!p.stats)p.stats={HP:0,MP:0,STR:0,DEX:0,AGI:0,INT:0,VIT:0,LUK:0};
    const w=autoWeights(p);
    for(let i=0;i<points;i++){const k=weightedPick(w);p.stats[k]=(p.stats[k]||0)+1;}
    p.statPoints=0;
    try{if(typeof syncEquipmentStats==='function')syncEquipmentStats(p);if(typeof recalcVitals==='function')recalcVitals(p);}catch(e){}
  }
  function consumePendingSP(){const p=G&&G.player;if(p&&p.statPoints>0)autoAllocate(p,p.statPoints);}

  window.checkLevelUp=function(){
    const p=ensure(G&&G.player); if(!p)return;
    while(p.xp>=p.xpNext){
      p.xp-=p.xpNext;p.lv++;p.xpNext=Math.round(p.xpNext*1.42);
      p.baseMaxHp=(p.baseMaxHp||p.maxHp||100)+10;
      p.baseMaxMp=(p.baseMaxMp||p.maxMp||50)+5;
      p.baseAtk=(p.baseAtk||p.atk||10)+1;
      p.baseDef=(p.baseDef||p.def||5)+1;
      autoAllocate(p,3);
      p.hp=Math.min(p.maxHp,p.hp+20);p.mp=Math.min(p.maxMp,p.mp+10);
      addLog(`🎉 Lv.${p.lv}！ 少し強くなった。`,'l-h');
    }
  };
  try{checkLevelUp=window.checkLevelUp;}catch(e){}

  window.renderSkills=function(){
    const p=ensure(G&&G.player); const sl=$('skill-list'); if(!p||!sl)return;
    const skills=[
      {sk:p.phys,type:'phys',tag:'物理',cls:'tag-phys'},
      {sk:p.mag,type:'mag',tag:'魔法',cls:'tag-mag'},
      {sk:p.ult,type:'ult',tag:'奥義',cls:'tag-ult',cd:p.ultCd},
    ];
    sl.innerHTML=skills.map(({sk,type,tag,cls,cd})=>{
      const cost=Math.round(((sk&&sk.cost)||0)*((p&&p.mpDiscount)||1));
      const can=(cost<=0||p.mp>=cost)&&((cd===undefined||cd===0)&&!!G.enemy);
      const cdTxt=cd>0?` 待ち:${cd}`:'';
      return `<button class="sk-btn" data-skill="${type}" ${can?'':'disabled'}>
        <span><span class="tag ${cls}" style="margin-right:4px">${tag}</span>${esc(sk&&sk.n)}<br><span class="muted">${esc((sk&&sk.d)||'')}</span></span>
        <span class="sk-ct">消費:${costWord(cost)}${cdTxt}</span>
      </button>`;
    }).join('');
    if(!sl.dataset.v29Click){sl.dataset.v29Click='1';sl.addEventListener('click',ev=>{const b=ev.target.closest('[data-skill]');if(b&&!b.disabled&&typeof useSkill==='function')useSkill(b.dataset.skill);});}
  };
  try{renderSkills=window.renderSkills;}catch(e){}

  const oldRenderGame=window.renderGame||((typeof renderGame==='function')?renderGame:null);
  window.renderGame=function(){
    addV29Style();consumePendingSP();
    const r=oldRenderGame&&oldRenderGame.apply(this,arguments);
    try{
      // oldRenderGame may call old skill renderer in some builds; force the light one.
      window.renderSkills();
      document.querySelectorAll('#p-stats .stat-item').forEach(el=>{if(/^SP\b|ステータスポイント|成長点/.test(el.textContent.trim()))el.remove();});
      const eq=$('equip-info');
      if(eq){eq.querySelectorAll('button').forEach(b=>{if(/ステ振り|育成|SP/.test(b.textContent))b.remove();});}
      document.querySelectorAll('button').forEach(b=>{if(/ステ振り|通常SP/.test(b.textContent))b.classList.add('v29-hide');});
      const chip=$('v17-hidden-chip-game'); if(chip)chip.remove();
    }catch(e){}
    return r;
  };
  try{renderGame=window.renderGame;}catch(e){}

  window.openStats=function(){consumePendingSP();addLog('成長は自動で反映される。','l-i');try{renderGame();}catch(e){}};
  try{openStats=window.openStats;}catch(e){}
  window.renderStats=function(){
    const box=$('stat-grid-alloc'), pt=$('stat-points');
    if(pt)pt.textContent='自動';
    if(box)box.innerHTML='<div class="card">成長は自動で振り分けられる。</div>';
  };
  try{renderStats=window.renderStats;}catch(e){}

  const oldAddLog=window.addLog||((typeof addLog==='function')?addLog:null);
  window.addLog=function(msg,cls){
    let s=String(msg??'');
    if(/隠し補正/.test(s)){
      if(/G[+＋]|XP[+＋]|宝箱/.test(s))return;
      s=s.replace(/🕯️\s*/g,'').replace(/隠し補正/g,'不思議な気配');
    }
    s=s.replace(/ステータスポイント\+?\d*/g,'成長').replace(/通常SP/g,'成長');
    return oldAddLog?oldAddLog(s,cls):undefined;
  };
  try{addLog=window.addLog;}catch(e){}

  // localStorageに残っていた通常SPも起動時に吸収。
  const oldLoad=window.loadGame||((typeof loadGame==='function')?loadGame:null);
  window.loadGame=function(){const r=oldLoad&&oldLoad.apply(this,arguments);try{consumePendingSP();renderGame();}catch(e){}return r;};
  try{loadGame=window.loadGame;}catch(e){}

  const oldStart=window.startGame||((typeof startGame==='function')?startGame:null);
  window.startGame=function(){const r=oldStart&&oldStart.apply(this,arguments);try{consumePendingSP();renderGame();}catch(e){}return r;};
  try{startGame=window.startGame;}catch(e){}

  addV29Style();
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>{addV29Style();try{if(screen()==='shop')renderShop();}catch(e){}},{once:true});
  else {addV29Style();try{if(screen()==='shop')renderShop();}catch(e){}}
})();
</script>
