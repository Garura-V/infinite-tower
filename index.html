
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{font-family:var(--font-sans);padding:10px;max-width:680px}
.scr{display:none}.scr.on{display:block}
h2{font-size:18px;font-weight:500;color:var(--color-text-primary)}
h3{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.btn{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 14px;font-size:13px;cursor:pointer;color:var(--color-text-primary);transition:background .15s}
.btn:hover{background:var(--color-background-secondary)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-p{background:#534AB7;border-color:#534AB7;color:#fff}.btn-p:hover{background:#3C3489}
.btn-d{background:#A32D2D;border-color:#A32D2D;color:#fff}.btn-d:hover{background:#791F1F}
.btn-g{background:#0F6E56;border-color:#0F6E56;color:#fff}.btn-g:hover{background:#085041}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px}
.surf{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500}
.tag-phys{background:#FAECE7;color:#712B13}
.tag-mag{background:#EEEDFE;color:#3C3489}
.tag-ult{background:#FAEEDA;color:#633806}
.tag-pass{background:#E1F5EE;color:#085041}
.tag-boss{background:#FCEBEB;color:#791F1F}
.tag-clear{background:#EAF3DE;color:#27500A}
.hpb{height:7px;border-radius:4px;background:var(--color-border-tertiary);overflow:hidden;margin-top:3px}
.hpf{height:100%;border-radius:4px;transition:width .3s}
.hpf-p{background:#534AB7}.hpf-e{background:#E24B4A}.hpf-m{background:#185FA5}.hpf-ct{background:#BA7517}
.log{height:80px;overflow-y:auto;font-size:11px;line-height:1.7}
.log .l-d{color:#E24B4A}.log .l-h{color:#0F6E56}.log .l-s{color:#534AB7}.log .l-b{color:#854F0B;font-weight:500}.log .l-i{color:#185FA5}.log .l-w{color:#993C1D;font-weight:500}
.job-search{width:100%;margin-bottom:8px;padding:6px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.job-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;max-height:280px;overflow-y:auto}
.jcard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px;cursor:pointer;transition:border-color .15s,background .15s;text-align:center}
.jcard:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.jcard.sel{border:2px solid #534AB7}
.jcard .ji{font-size:22px}
.jcard .jn{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-top:2px}
.jcard .jt{font-size:10px;color:var(--color-text-secondary)}
.skill-row{display:flex;flex-direction:column;gap:4px}
.sk-btn{display:flex;justify-content:space-between;align-items:center;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 8px;font-size:11px;cursor:pointer;color:var(--color-text-primary);transition:background .15s;text-align:left;width:100%}
.sk-btn:hover:not(:disabled){background:var(--color-background-primary);border-color:var(--color-border-secondary)}
.sk-btn:disabled{opacity:.35;cursor:not-allowed}
.sk-ct{font-size:10px;color:#BA7517}
.game-wrap{display:grid;grid-template-columns:1fr 190px;gap:8px}
.battle-col{display:flex;flex-direction:column;gap:8px}
.side-col{display:flex;flex-direction:column;gap:7px}
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.floor-prog{display:flex;gap:3px;margin-bottom:4px}
.fp-dot{width:14px;height:14px;border-radius:3px;background:var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--color-text-secondary)}
.fp-dot.done{background:#5DCAA5;color:#04342C}
.fp-dot.cur{background:#534AB7;color:#fff}
.fp-dot.boss{background:#E24B4A;color:#fff}
.save-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:4px}
.tab-row{display:flex;gap:4px;margin-bottom:8px}
.tab{padding:5px 12px;font-size:12px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary)}
.tab.act{background:#534AB7;color:#fff;border-color:#534AB7}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.stat-item{font-size:11px;display:flex;justify-content:space-between;color:var(--color-text-secondary);padding:1px 0}
.stat-item span:last-child{color:var(--color-text-primary);font-weight:500}

/* === v3 large update additions === */
#app{max-width:980px}
.log{height:58px;overflow:hidden}
.stage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.stage-card{cursor:pointer;min-height:116px;transition:transform .12s,border-color .12s}
.stage-card:hover{transform:translateY(-1px);border-color:#534AB7}
.enemy-party{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:4px;margin-top:6px}
.enemy-mini{font-size:10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:4px;border:0.5px solid var(--color-border-tertiary)}
.enemy-mini.target{border-color:#534AB7}
.screen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.inv-item{font-size:11px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:7px;border:0.5px solid var(--color-border-tertiary)}
.equip-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:6px}
.tiny-btn{font-size:10px;padding:3px 6px;margin-top:4px}
.r-common{color:var(--color-text-secondary)}
.r-uncommon{color:#0F6E56}
.r-rare{color:#185FA5}
.r-epic{color:#534AB7}
.r-legend{color:#BA7517;font-weight:600}
.muted{color:var(--color-text-secondary);font-size:11px}

/* === v4 quality/update patch === */
.quick-actions{position:fixed;right:12px;bottom:12px;z-index:50;display:none;gap:6px;flex-wrap:wrap;justify-content:flex-end;max-width:360px;background:rgba(20,20,28,.08);backdrop-filter:blur(6px);border-radius:12px;padding:6px}
.quick-actions .btn{font-size:11px;padding:6px 9px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.shop-tools{margin-bottom:8px}
.mat-row{display:flex;justify-content:space-between;align-items:center;gap:6px;border-top:0.5px solid var(--color-border-tertiary);padding:5px 0;font-size:11px}
.mat-row:first-of-type{border-top:0}
.trait-row{display:flex;gap:3px;flex-wrap:wrap;margin:4px 0}
.trait-chip{display:inline-block;font-size:10px;padding:2px 6px;border-radius:99px;background:#F2EEF9;color:#3C3489}

</style>

<div id="app">

<div id="scr-title" class="scr on">
  <div style="text-align:center;padding:16px 0 12px">
    <div style="font-size:11px;letter-spacing:.08em;color:var(--color-text-secondary);margin-bottom:4px">INFINITE TOWER ROGUELIKE</div>
    <h2 style="font-size:24px;margin-bottom:4px">🏰 無限の塔</h2>
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px">5階ごとにクリア。塔に終わりはない。</p>
    <div id="save-notice" style="display:none;margin-bottom:10px"></div>
  </div>
  <div style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">

  </div>

  <div style="margin-top:10px;display:flex;gap:6px">
    <button class="btn btn-p" id="start-btn" disabled onclick="startGame()" style="flex:1;padding:10px">冒険開始</button>
    <button class="btn" id="load-btn" style="display:none" onclick="loadGame()">セーブを読み込む</button>
  </div>
</div>

<div id="scr-game" class="scr">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div>
      <span style="font-size:13px;font-weight:500;color:var(--color-text-primary)" id="g-floor-label">1階</span>
      <span style="font-size:11px;color:var(--color-text-secondary);margin-left:6px" id="g-seg-label">セグメント1</span>
    </div>
    <div style="display:flex;gap:5px;align-items:center">
      <span style="font-size:12px;color:#BA7517">💰 <span id="g-gold">0</span>G</span>
      <button class="btn" style="font-size:11px;padding:4px 8px" onclick="openSave()">中断セーブ</button>
    </div>
  </div>
  <div class="floor-prog" id="floor-prog"></div>
  <div class="game-wrap">
    <div class="battle-col">
      <div class="card" style="min-height:200px;display:flex;flex-direction:column">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-size:22px" id="e-sprite">👾</div>
            <div style="font-size:14px;font-weight:500;color:var(--color-text-primary)" id="e-name">スライム</div>
            <div id="e-tags" style="margin-top:2px"></div>
          </div>
          <div style="text-align:right;min-width:80px">
            <div style="font-size:10px;color:var(--color-text-secondary)">HP <span id="e-hpv">20/20</span></div>
            <div class="hpb"><div class="hpf hpf-e" id="e-hpb" style="width:100%"></div></div>
            <div style="font-size:10px;color:var(--color-text-secondary);margin-top:4px">ATK <span id="e-atk-v">8</span></div>
          </div>

        <div class="log card" id="action-log" style="flex:1;padding:6px 8px"></div>

          <button class="btn" onclick="doDef()" id="btn-def" style="flex:1;font-size:12px">🛡️ 防御</button>
          <button class="btn" onclick="usePotion()" id="btn-pot" style="flex:1;font-size:12px">🧪 薬 (<span id="pot-count">3</span>)</button>
          <button class="btn" onclick="doFlee()" id="btn-flee" style="flex:1;font-size:12px">💨 逃げる</button>

    </div>
    <div class="side-col">

        <div style="font-size:14px;font-weight:500;color:var(--color-text-primary)" id="p-header"></div>
        <div style="margin:6px 0">
          <div style="font-size:10px;color:var(--color-text-secondary);display:flex;justify-content:space-between"><span>HP</span><span id="p-hpv">100/100</span></div>
          <div class="hpb"><div class="hpf hpf-p" id="p-hpb" style="width:100%"></div></div>
          <div style="font-size:10px;color:var(--color-text-secondary);display:flex;justify-content:space-between;margin-top:4px"><span>MP</span><span id="p-mpv">50/50</span></div>
          <div class="hpb"><div class="hpf hpf-m" id="p-mpb" style="width:100%"></div></div>
        </div>
        <div class="stat-grid" id="p-stats"></div>
      </div>
      <div class="card" style="padding:8px">
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:5px;font-weight:500">スキル</div>

      <div class="card" style="padding:8px">
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:5px;font-weight:500">装備</div>

    </div>

</div>

<div id="scr-shop" class="scr">

</div>

<div id="scr-event" class="scr">

</div>

<div id="scr-clear" class="scr">

    <div style="font-size:44px;margin-bottom:10px" id="cl-icon">🎉</div>
    <h2 id="cl-title" style="margin-bottom:8px"></h2>
    <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.9;margin-bottom:16px" id="cl-body"></div>
    <div id="cl-save-notice" style="margin-bottom:12px"></div>
    <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap" id="cl-btns"></div>
  </div>
</div>

<div id="scr-over" class="scr">
  <div style="text-align:center;padding:24px">
    <div style="font-size:44px;margin-bottom:10px">💀</div>
    <h2 style="margin-bottom:8px">冒険終了</h2>
    <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.9;margin-bottom:20px" id="over-body"></div>
    <button class="btn btn-p" onclick="go('title');initTitle()" style="padding:9px 24px">タイトルへ戻る</button>
  </div>
</div>

</div>

<div id="scr-stage" class="scr">

  <div class="stage-grid" id="stage-grid"></div>
</div>

    <div class="screen-grid" id="inv-grid"></div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

    <div class="screen-grid" id="stat-grid-alloc"></div>
  </div>
</div>

function renderJobGrid(q){
  const grid=document.getElementById('job-grid');
  const lc=q.toLowerCase();
  const filtered=JOBS.filter(j=>j.n.includes(q)||j.t.includes(q)||lc===''||j.id.includes(lc));
  document.getElementById('job-count').textContent=`(${filtered.length}/${JOBS.length}職)`;
  grid.innerHTML='';
  filtered.forEach(j=>{
    const d=document.createElement('div');d.className='jcard';d.id='jc-'+j.id;
    d.innerHTML=`<div class="ji">${j.i}</div><div class="jn">${j.n}</div><div class="jt">${j.t}</div>`;
    d.onclick=()=>selectJob(j.id);grid.appendChild(d);
  });
}

function filterJobs(){renderJobGrid(document.getElementById('job-search').value);}

function selectJob(id){

function loadGame(){
  const save=localStorage.getItem(SAVE_KEY);
  if(!save)return;
  G=JSON.parse(save);
  go('game');
  renderFloorProg();
  spawnEnemy();
}

function saveGame(){localStorage.setItem(SAVE_KEY,JSON.stringify(G));}
function openSave(){
  const p=G.player;
  const floorInSeg=((p.floor-1)%5)+1;
  if(floorInSeg===1&&G.turn>0){
    saveGame();
    addLog('✅ セーブしました','l-h');
  } else if(floorInSeg===1&&G.turn===0){
    saveGame();addLog('✅ セーブしました','l-h');
  } else {
    addLog(`⚠️ セグメント開始時(1階目)のみセーブ可能。現在は${floorInSeg}階目です。`,'l-b');
  }
}

function getFloorInSeg(){return((G.player.floor-1)%5)+1;}
function getSegment(){return Math.ceil(G.player.floor/5);}

function renderFloorProg(){
  const p=G.player;const seg=getSegment();const fi=getFloorInSeg();
  const prog=document.getElementById('floor-prog');prog.innerHTML='';
  document.getElementById('g-floor-label').textContent=`${p.floor}階`;
  document.getElementById('g-seg-label').textContent=`セグメント${seg} (${fi}/5)`;
  for(let i=1;i<=5;i++){
    const d=document.createElement('div');d.className='fp-dot';
    const isBoss=(i===5);
    if(i<fi){d.classList.add('done');d.textContent='✓';}
    else if(i===fi){d.classList.add(isBoss?'boss':'cur');d.textContent=isBoss?'B':i;}
    else{if(isBoss)d.classList.add('boss');d.textContent=isBoss?'B':i;}
    prog.appendChild(d);
  }
}

function spawnEnemy(){
  const p=G.player;const fi=getFloorInSeg();
  let e;
  if(fi===5){
    const bi=Math.min(Math.ceil(p.floor/25)-1,BOSSES.length-1);
    e=JSON.parse(JSON.stringify(BOSSES[bi]));
    const scale=1+Math.floor(p.floor/5)*0.1;
    e.hp=Math.round(e.hp*scale);e.atk=Math.round(e.atk*(1+p.floor*0.015));
    e.def=Math.round(e.def*(1+p.floor*0.01));
    if(p.bossDebuff>0){e.hp=Math.round(e.hp*(1-p.bossDebuff));}
  } else {
    const tier=Math.min(Math.floor(p.floor/10),ENEMIES.length-1);
    const pool=ENEMIES[tier];
    e=JSON.parse(JSON.stringify(pool[R(0,pool.length-1)]));
    const scale=1+p.floor*0.1;
    e.hp=Math.round(e.hp*scale);e.atk=Math.round(e.atk*(1+p.floor*0.07));
    e.def=Math.round(e.def*(1+p.floor*0.05));
    e.g=Math.round(e.g*(1+p.floor*0.06));
  }
  e.maxHp=e.hp;e.isBoss=e.isBoss||false;
  e.poisoned=false;e.poisonTurns=0;e.frozen=0;e.shocked=0;e.burned=0;
  e.bound=0;e.debuffAtk=0;e.debuffDef=0;e.stunTurns=0;e.doomTurns=0;
  G.enemy=e;G.turn=0;
  renderGame();
  addLog(`${e.isBoss?'⚠️ ボス！ ':''}${e.name}が現れた！`,e.isBoss?'l-w':'');
  if(p.goFirst&&!p.firstDone){addLog('先制攻撃！','l-s');}
}

function renderGame(){
  const p=G.player;const e=G.enemy;
  document.getElementById('g-gold').textContent=p.gold;
  document.getElementById('p-header').textContent=`${p.icon} ${p.job} Lv.${p.lv}`;
  document.getElementById('p-hpv').textContent=`${p.hp}/${p.maxHp}`;
  const hpPct=Math.round((p.hp/p.maxHp)*100);
  document.getElementById('p-hpb').style.width=hpPct+'%';
  document.getElementById('p-mpv').textContent=`${p.mp}/${p.maxMp}`;
  document.getElementById('p-mpb').style.width=Math.round((p.mp/p.maxMp)*100)+'%';
  const curAtk=p.atk+p.weaponBonus+(p.buffAtkTurns>0?p.buffAtk:0)+(p.allBuffTurns>0?(p.allBuffMul-1)*p.atk:0)+(p.atkRampVal||0)+(p.bardBuffVal||0)+(p.hp/p.maxHp<0.5?p.woundedBuff:0);
  const curDef=p.def+p.armorBonus+(p.buffDefTurns>0?(p.buffDef-1)*p.def:0);
  document.getElementById('p-stats').innerHTML=
    `<div class="stat-item"><span>ATK</span><span>${Math.round(curAtk)}</span></div>
     <div class="stat-item"><span>DEF</span><span>${Math.round(curDef)}</span></div>
     <div class="stat-item"><span>SPD</span><span>${p.spd}</span></div>
     <div class="stat-item"><span>薬</span><span>${p.potions}個</span></div>
     <div class="stat-item"><span>XP</span><span>${p.xp}/${p.xpNext}</span></div>
     <div class="stat-item"><span>クリ率</span><span>${Math.round(p.critRate*100)}%</span></div>`;
  document.getElementById('equip-info').innerHTML=
    `⚔️ ${p.weapon}（+${p.weaponBonus}）<br>🛡️ ${p.armor}（+${p.armorBonus}）`;
  if(e){
    document.getElementById('e-sprite').textContent=e.s;
    document.getElementById('e-name').textContent=e.n;
    document.getElementById('e-atk-v').textContent=Math.max(0,e.atk-(e.debuffAtk||0));
    document.getElementById('e-hpv').textContent=`${e.hp}/${e.maxHp}`;
    document.getElementById('e-hpb').style.width=Math.round((e.hp/e.maxHp)*100)+'%';
    const tags=document.getElementById('e-tags');tags.innerHTML='';
    if(e.isBoss){const t=document.createElement('span');t.className='tag tag-boss';t.textContent='BOSS';tags.appendChild(t);}
    if(e.poisoned||e.poisonTurns>0){const t=document.createElement('span');t.className='tag';t.style.cssText='background:#EAF3DE;color:#27500A';t.textContent='毒';tags.appendChild(t);}
    if(e.frozen>0){const t=document.createElement('span');t.className='tag';t.style.cssText='background:#E6F1FB;color:#0C447C';t.textContent='凍結';tags.appendChild(t);}
    if(e.bound>0){const t=document.createElement('span');t.className='tag';t.style.cssText='background:#FAEEDA;color:#633806';t.textContent='束縛';tags.appendChild(t);}
    if(e.stunTurns>0){const t=document.createElement('span');t.className='tag';t.style.cssText='background:#FBEAF0;color:#72243E';t.textContent='気絶';tags.appendChild(t);}
  }
  renderSkills();
  renderFloorProg();
  document.getElementById('pot-count').textContent=p.potions;
}

function renderSkills(){
  const p=G.player;const sl=document.getElementById('skill-list');sl.innerHTML='';
  const skills=[
    {sk:p.phys,type:'phys',tag:'物理',cls:'tag-phys'},
    {sk:p.mag,type:'mag',tag:'魔法',cls:'tag-mag'},
    {sk:p.ult,type:'ult',tag:'ULT',cls:'tag-ult',cd:p.ultCd},
  ];
  skills.forEach(({sk,type,tag,cls,cd})=>{
    const btn=document.createElement('button');btn.className='sk-btn';
    const canUse=(sk.cost<=0||p.mp>=sk.cost)&&(cd===undefined||cd===0);
    btn.disabled=!canUse;
    const cdTxt=cd>0?` CD:${cd}T`:'';
    btn.innerHTML=`<span><span class="tag ${cls}" style="margin-right:4px">${tag}</span>${sk.n}</span><span class="sk-ct">${sk.cost}MP${cdTxt}</span>`;
    btn.onclick=()=>useSkill(type);
    sl.appendChild(btn);
  });
}

function pAtk(){
  const p=G.player;
  let a=p.atk+p.weaponBonus;
  if(p.buffAtkTurns>0)a+=p.buffAtk;
  if(p.allBuffTurns>0)a=Math.round(a*p.allBuffMul);
  if(p.atkRampVal)a+=p.atkRampVal;
  if(p.bardBuffVal)a+=p.bardBuffVal;
  if(p.woundedBuff&&p.hp/p.maxHp<0.5)a+=p.woundedBuff;
  if(p.darkPow)a+=Math.round((1-p.hp/p.maxHp)*20);
  if(p.rage)a+=Math.round((1-p.hp/p.maxHp)*30);
  if(p.physBonus&&p.physBonus>1)a=Math.round(a*p.physBonus);
  return Math.round(a);
}
function pDef(){
  const p=G.player;
  let d=p.def+p.armorBonus;
  if(p.buffDefTurns>0)d=Math.round(d*p.buffDef);
  if(p.allBuffTurns>0)d=Math.round(d*p.allBuffMul);
  if(p.divineShield&&p.hp/p.maxHp<0.2)d*=2;
  return Math.round(d);
}
function calcDmg(atk,def,piercePct,fullPierce){
  let d=atk-def*(fullPierce?0:(1-(piercePct||0)));
  return Math.max(1,Math.round(d+R(-2,2)));
}
function isCrit(p){return Math.random()<p.critRate;}
function applyDmgToEnemy(raw){
  const e=G.enemy;const p=G.player;
  let d=raw;
  if(isCrit(p)){d=Math.round(d*(p.critMul||1.5));addLog(`💥 クリティカル！`,'l-s');}
  if(p.luckyDouble&&Math.random()<p.luckyDouble){d*=2;addLog('🌟 ラッキー倍加！','l-s');}
  e.hp=Math.max(0,e.hp-d);
  if(p.lifeSteal>0){const heal=Math.round(d*p.lifeSteal);p.hp=Math.min(p.maxHp,p.hp+heal);}
  if(p.autoPoison)e.poisonTurns=Math.max(e.poisonTurns,3);
  if(p.autoBurn)e.burned=Math.max(e.burned,3);
  if(p.autoFreeze)e.frozen=Math.max(e.frozen,2);
  if(p.autoShock)e.shocked=Math.max(e.shocked,2);
  if(p.curseAtk)e.debuffAtk=Math.max(e.debuffAtk,5);
  if(p.mpOnAtk)p.mp=Math.min(p.maxMp,p.mp+p.mpOnAtk);
  return d;
}
function applyDmgToPlayer(rawAtk){
  const p=G.player;const e=G.enemy;
  if(p.perfectEvadeTurns>0){addLog('回避！','l-s');return;}
  if(p.blockTurns>0){addLog('完全防御！','l-s');return;}
  if(p.holyOathTurns>0){addLog('無敵！反撃！','l-s');const rd=calcDmg(pAtk(),0,0);applyDmgToEnemy(rd);addLog(`反撃 ${rd}ダメ`,'l-d');return;}
  if(p.mirrorTurns>0){const rd=rawAtk;e.hp=Math.max(0,e.hp-rd);addLog(`反射！${rd}ダメ`,'l-s');return;}
  if(p.reflectTurns>0){const rd=Math.round(rawAtk*0.5);e.hp=Math.max(0,e.hp-rd);}
  if(Math.random()<p.evade){addLog('回避！','l-s');return;}
  let d=Math.max(1,rawAtk-pDef()-(p.flatReduce||0));
  if(p.dmgReduce)d=Math.round(d*(1-p.dmgReduce));
  if(p.reflect>0){const rf=Math.round(d*p.reflect);e.hp=Math.max(0,e.hp-rf);}
  if(p.absorbReady){p.hp=Math.min(p.maxHp,p.hp+d);p.absorbReady=false;addLog(`吸収！HP+${d}`,'l-h');return;}
  if(p.vampLordTurns>0){p.hp=Math.min(p.maxHp,p.hp+d);addLog(`吸血反転！HP+${d}`,'l-h');return;}
  p.hp=Math.max(0,p.hp-d);
  if(p.undying&&!p.undyingUsed&&p.hp<=0){p.hp=1;p.undyingUsed=true;addLog('不死発動！','l-s');}
  if(p.lightRevive&&!p.lightReviveUsed&&p.hp/p.maxHp<0.25){p.hp=p.maxHp;p.lightReviveUsed=true;addLog('光の復活！HP全回復！','l-h');}
  return d;
}

function doAtk(){
  if(!G.enemy)return;
  const p=G.player;const e=G.enemy;
  let d=calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef);
  if(!p.firstDone&&p.goFirst&&p.firstBonus>1){d=Math.round(d*p.firstBonus);addLog('先制ボーナス！','l-s');}
  p.firstDone=true;
  const dealt=applyDmgToEnemy(d);
  addLog(`${p.icon} 攻撃 → ${dealt}ダメ`,'l-d');
  if(e.hp<=0){killEnemy();return;}
  setTimeout(enemyTurn,400);renderGame();
}
function doDef(){
  G.player.blockTurns=1;
  addLog('🛡️ 防御態勢','');
  setTimeout(enemyTurn,300);renderGame();
}
function usePotion(){
  const p=G.player;
  if(p.potions<=0){addLog('回復薬がない！');return;}
  p.potions--;
  const base=Math.round(p.maxHp*0.3);
  const heal=Math.round(base*(p.potionBonus||1));
  p.hp=Math.min(p.maxHp,p.hp+heal);
  if(p.potionMp)p.mp=Math.min(p.maxMp,p.mp+(p.potionMp||0));
  addLog(`🧪 HP+${heal}回復`,'l-h');
  setTimeout(enemyTurn,300);renderGame();
}
function doFlee(){
  const p=G.player;const fi=getFloorInSeg();
  if(fi===5){addLog('ボス戦では逃げられない！');return;}
  if(Math.random()<0.5){addLog('逃走失敗！');setTimeout(enemyTurn,300);return;}
  addLog('逃走成功！');
  p.floor++;renderFloorProg();
  setTimeout(()=>spawnEnemy(),400);
}

function useSkill(type){
  const p=G.player;const e=G.enemy;
  let sk;
  if(type==='phys')sk=p.phys;
  else if(type==='mag')sk=p.mag;
  else {sk=p.ult;if(p.ultCd>0){addLog('ULTがクールタイム中！');return;}}
  const cost=Math.round(sk.cost*(p.mpDiscount||1));
  if(cost>0&&p.mp<cost){addLog('MPが足りない！');return;}
  p.mp=Math.max(0,p.mp-cost);
  if(type==='ult')p.ultCd=sk.cd||5;
  const fn=sk.fn;
  let dealt=0;
  if(fn==='physMul'){
    const mul=sk.mul||1;
    let d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*mul*(p.physBonus||1));
    dealt=applyDmgToEnemy(d);addLog(`${sk.n}！ ${dealt}ダメ`,'l-s');
  } else if(fn==='magAtk'){
    const mul=sk.mul||1;const elem=sk.elem||'';
    let mag=Math.round(pAtk()*mul*(p.magBonus||1));
    if(p.elemBonus&&p.elemBonus[elem])mag=Math.round(mag*p.elemBonus[elem]);
    dealt=applyDmgToEnemy(mag);addLog(`✨${sk.n}[${elem}]！ ${dealt}ダメ`,'l-s');
  } else if(fn==='multi'){
    const hits=sk.hits||3;const m=sk.mul||1.0;let total=0;
    for(let i=0;i<hits;i++){if(e.hp<=0)break;const d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*m);const dd=applyDmgToEnemy(d);total+=dd;}
    addLog(`${sk.n}！ ${hits}連撃 計${total}ダメ`,'l-s');dealt=total;
  } else if(fn==='pierce'){
    const full=sk.fullPierce||false;const mul=sk.mul||2;
    const d=Math.round(calcDmg(pAtk(),full?0:e.def-(e.debuffDef||0),1)*mul*(p.physBonus||1));
    dealt=applyDmgToEnemy(d);addLog(`${sk.n}！ 貫通${dealt}ダメ`,'l-s');
  } else if(fn==='stun'){
    e.stunTurns=(sk.turns||2);addLog(`${sk.n}！ 敵${sk.turns}ターン気絶`,'l-s');
  } else if(fn==='bind'||fn==='bindAtk'){
    e.bound=(sk.turns||2);
    if(fn==='bindAtk'){const d=calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef);dealt=applyDmgToEnemy(d);addLog(`${sk.n}！ 束縛+${dealt}ダメ`,'l-s');}
    else addLog(`${sk.n}！ 束縛${sk.turns}ターン`,'l-s');
  } else if(fn==='buff'){
    p.buffAtk=5;p.buffAtkTurns=3;addLog(`${sk.n}！ ATK+5 3ターン`,'l-s');
  } else if(fn==='buffUlt'){
    p.buffAtk=Math.round(pAtk()*(sk.buffAtk-1));p.buffAtkTurns=sk.turns||3;
    p.buffDef=sk.buffDef||1.5;p.buffDefTurns=sk.turns||3;
    addLog(`${sk.n}！ ATK×${sk.buffAtk} DEF×${sk.buffDef} ${sk.turns}T`,'l-s');
  } else if(fn==='heal'){
    const h=sk.amount||30;p.hp=Math.min(p.maxHp,p.hp+h);addLog(`${sk.n}！ HP+${h}`,'l-h');
  } else if(fn==='healPct'){
    const h=Math.round(p.maxHp*sk.pct);p.hp=Math.min(p.maxHp,p.hp+h);addLog(`${sk.n}！ HP+${h}`,'l-h');
  } else if(fn==='mp'){
    const m=sk.amount||25;p.mp=Math.min(p.maxMp,p.mp+m);addLog(`${sk.n}！ MP+${m}`,'l-h');
  } else if(fn==='mirror'){
    p.mirrorTurns=1;addLog(`${sk.n}！ 1ターン攻撃反射`,'l-s');
  } else if(fn==='evade'){
    p.evade=Math.min(1,p.evade+0.5);addLog(`${sk.n}！ 回避+50%`,'l-s');setTimeout(()=>{p.evade=Math.max(0,p.evade-0.5);},2000);
  } else if(fn==='block'){
    p.blockTurns=sk.turns||2;addLog(`${sk.n}！ ${sk.turns}ターン完全防御`,'l-s');
  } else if(fn==='hpPercent'){
    const d=Math.round(e.hp*sk.pct);e.hp=Math.max(0,e.hp-d);addLog(`${sk.n}！ 敵HP${Math.round(sk.pct*100)}%ダメ(${d})`,'l-s');dealt=d;
  } else if(fn==='berserk'){
    const d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*3.0);
    dealt=applyDmgToEnemy(d);p.hp=Math.max(1,p.hp-10);addLog(`${sk.n}！ ${dealt}ダメ(自HP-10)`,'l-s');
  } else if(fn==='debuffAtk'){
    e.debuffAtk=Math.max(e.debuffAtk,sk.val||8);addLog(`${sk.n}！ 敵ATK-${sk.val}`,'l-s');
  } else if(fn==='debuffDef'){
    e.debuffDef=Math.max(e.debuffDef,sk.val||10);addLog(`${sk.n}！ 敵DEF-${sk.val}`,'l-s');
  } else if(fn==='allBuff'){
    p.allBuffMul=sk.mul||1.5;p.allBuffTurns=sk.turns||3;addLog(`${sk.n}！ 全ステ×${sk.mul} ${sk.turns}T`,'l-s');
  } else if(fn==='spdAtk'){
    const d=Math.round(p.spd*2.5*(p.physBonus||1));dealt=applyDmgToEnemy(d);addLog(`${sk.n}！ SPD攻撃${dealt}ダメ`,'l-s');
  } else if(fn==='holyStrike'){
    const d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*2.0);
    dealt=applyDmgToEnemy(d);const h=Math.round(d*0.2);p.hp=Math.min(p.maxHp,p.hp+h);
    addLog(`${sk.n}！ ${dealt}ダメ+HP+${h}`,'l-s');
  } else if(fn==='darkStrike'){
    const d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*2.2);
    dealt=applyDmgToEnemy(d);const h=Math.round(d*0.2);p.hp=Math.min(p.maxHp,p.hp+h);
    addLog(`${sk.n}！ ${dealt}ダメ+HP+${h}`,'l-s');
  } else if(fn==='vampAttack'){
    const d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*2.0);
    dealt=applyDmgToEnemy(d);const h=Math.round(d*0.5);p.hp=Math.min(p.maxHp,p.hp+h);
    addLog(`${sk.n}！ ${dealt}ダメ+HP+${h}`,'l-s');
  } else if(fn==='vampLord'){
    p.hp=p.maxHp;p.vampLordTurns=4;addLog(`${sk.n}！ HP全回復+4T吸血反転`,'l-h');
  } else if(fn==='berserkUlt'){
    p.buffAtk=Math.round(pAtk()*2);p.buffAtkTurns=5;p.armorBonus=Math.max(p.armorBonus-p.def,0);
    addLog(`${sk.n}！ ATK×3 5ターン(DEF0)`,'l-s');
  } else if(fn==='reflect'){
    p.reflectTurns=sk.turns||2;addLog(`${sk.n}！ ${sk.turns}T攻撃反射50%`,'l-s');
  } else if(fn==='natureFury'){
    p.hp=p.maxHp;p.buffAtk=Math.round(pAtk());p.buffAtkTurns=4;
    addLog(`${sk.n}！ HP全回復+ATK×2 4T`,'l-h');
  } else if(fn==='philStone'){
    p.hp=p.maxHp;p.mp=p.maxMp;p.buffAtk=Math.round(pAtk());p.buffAtkTurns=2;
    addLog(`${sk.n}！ HP・MP全回復+ATK×2 2T`,'l-h');
  } else if(fn==='summonUlt'){
    let total=0;for(let i=0;i<3;i++){const d=Math.round(pAtk()*(p.magBonus||1)*R(20,40)/10);total+=applyDmgToEnemy(d);}
    addLog(`${sk.n}！ 召喚！計${total}ダメ`,'l-s');dealt=total;
  } else if(fn==='corrode'){
    const d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*1.3);
    dealt=applyDmgToEnemy(d);e.debuffDef=Math.max(e.debuffDef,8);
    addLog(`${sk.n}！ ${dealt}ダメ+DEF腐食`,'l-s');
  } else if(fn==='execute'){
    const th=sk.threshold||0.3;
    if(e.hp/e.maxHp<th){e.hp=0;addLog(`${sk.n}！ 即死！`,'l-w');}
    else{const d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*(sk.mul||4.5));
    dealt=applyDmgToEnemy(d);addLog(`${sk.n}！ ${dealt}ダメ`,'l-s');}
  } else if(fn==='forceCrit'){
    const d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*(sk.mul||3.0)*(p.critMul||1.5));
    dealt=applyDmgToEnemy(d);addLog(`${sk.n}！ 必中クリティカル！${dealt}ダメ`,'l-s');
  } else if(fn==='poisonSmoke'){
    e.poisonTurns=5;e.stunTurns=2;addLog(`${sk.n}！ 毒5T+気絶2T`,'l-s');
  } else if(fn==='doomCurse'){
    e.doomTurns=99;addLog(`${sk.n}！ 呪い：毎ターンHP15%減`,'l-s');
  } else if(fn==='absorb'){
    p.absorbReady=true;addLog(`${sk.n}！ 次の攻撃を吸収準備`,'l-s');
  } else if(fn==='defAtk'){
    const d=Math.round(pDef()*1.5);dealt=applyDmgToEnemy(d);addLog(`${sk.n}！ DEF参照${dealt}ダメ`,'l-s');
  } else if(fn==='roulette'){
    const mul=sk.mul||R(20,80)/10;const d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*mul);
    dealt=applyDmgToEnemy(d);addLog(`${sk.n}！ ×${mul.toFixed(1)} → ${dealt}ダメ`,'l-s');
  } else if(fn==='timeRewind'){
    p.hp=Math.min(p.maxHp,p.hp+Math.round(p.maxHp*0.4));p.mp=Math.min(p.maxMp,p.mp+Math.round(p.maxMp*0.4));
    p.buffAtk=0;p.buffAtkTurns=0;addLog(`${sk.n}！ HP・MP+40%回復`,'l-h');
  } else if(fn==='fullReset'){
    p.hp=p.maxHp;p.mp=p.maxMp;addLog(`${sk.n}！ 完全リセット！HP・MP全回復`,'l-h');
  } else if(fn==='revive'){
    p.hp=p.maxHp;p.perfectEvadeTurns=2;addLog(`${sk.n}！ HP全回復+無敵2T`,'l-h');
  } else if(fn==='shamanRitual'){
    const h=Math.round(p.maxHp*0.5);p.hp=Math.min(p.maxHp,p.hp+h);p.buffAtk=Math.round(pAtk()*2);p.buffAtkTurns=3;
    addLog(`${sk.n}！ HP+${h}+ATK×3 3T`,'l-h');
  } else if(fn==='natureFury'){
    p.hp=p.maxHp;p.buffAtk=Math.round(pAtk());p.buffAtkTurns=4;addLog(`${sk.n}！ HP全回復+ATK×2 4T`,'l-h');
  } else if(fn==='quakeUlt'){
    e.debuffDef=Math.round(e.def*0.5);
    const d=Math.round(pAtk()*(p.magBonus||1)*6.0);dealt=applyDmgToEnemy(d);
    addLog(`${sk.n}！ ${dealt}ダメ+敵DEF半減`,'l-s');
  } else if(fn==='dragonKing'){
    const d=Math.round(pAtk()*(p.magBonus||1)*6.0*(p.elemBonus&&p.elemBonus['炎']?p.elemBonus['炎']:1));
    dealt=applyDmgToEnemy(d);const h=Math.round(p.maxHp*0.5);p.hp=Math.min(p.maxHp,p.hp+h);
    addLog(`${sk.n}！ ${dealt}ダメ+HP+${h}`,'l-s');
  } else if(fn==='pirateUlt'){
    const gold=R(100,300);p.gold+=gold;
    const d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*3.5);
    dealt=applyDmgToEnemy(d);addLog(`${sk.n}！ G+${gold}+${dealt}ダメ`,'l-s');
  } else if(fn==='roboUlt'){
    p.roboTurns=2;p.buffAtk=Math.round(pAtk()*4);p.buffAtkTurns=2;addLog(`${sk.n}！ ATK×5 2T`,'l-s');
  } else if(fn==='immortalElixir'){
    p.hp=p.maxHp;p.mp=p.maxMp;p.perfectEvadeTurns=3;addLog(`${sk.n}！ 全回復+無敵3T`,'l-h');
  } else if(fn==='soulRelease'){
    const d=Math.round(calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef)*5.0);
    dealt=applyDmgToEnemy(d);const h=Math.round(p.maxHp*0.5);p.hp=Math.min(p.maxHp,p.hp+h);
    addLog(`${sk.n}！ ${dealt}ダメ+HP+${h}`,'l-h');
  } else if(fn==='divineLight'){
    const d=Math.round(pAtk()*(p.magBonus||1)*7.0*(p.elemBonus&&p.elemBonus['光']?p.elemBonus['光']:1));
    dealt=applyDmgToEnemy(d);p.hp=p.maxHp;addLog(`${sk.n}！ ${dealt}ダメ+HP全回復`,'l-s');
  } else if(fn==='shadowReign'){
    p.perfectEvadeTurns=5;p.shadowReignTurns=5;p.shadowReignAtk=Math.round(pAtk()*(p.magBonus||1)*3.0*(p.elemBonus&&p.elemBonus['闇']?p.elemBonus['闇']:1));
    addLog(`${sk.n}！ 5T全回避+闇攻撃/T`,'l-s');
  } else if(fn==='holyOath'){
    p.holyOathTurns=3;addLog(`${sk.n}！ 無敵+反撃 3T`,'l-s');
  } else if(fn==='worldBreak'){
    const d=Math.round(calcDmg(pAtk(),0,1)*6.0);dealt=applyDmgToEnemy(d);
    const self=Math.round(p.maxHp*0.1);p.hp=Math.max(1,p.hp-self);
    addLog(`${sk.n}！ ${dealt}ダメ(自-${self})`,'l-s');
  } else if(fn==='chaosUlt'){
    e.atk=R(1,e.atk*2);e.def=R(0,e.def*2);addLog(`${sk.n}！ 敵ステ混乱！`,'l-s');
  } else if(fn==='fortressUlt'){
    p.armorBonus+=20;p.hp=p.maxHp;addLog(`${sk.n}！ DEF+20+HP全回復`,'l-h');
  } else if(fn==='abyssalKing'){
    p.lifeSteal=0.5;p.buffAtk=Math.round(pAtk()*0.8);p.buffAtkTurns=5;
    addLog(`${sk.n}！ 吸血50%+ATK×1.8 5T`,'l-s');
  } else if(fn==='onmyoUlt'){
    p.buffAtk=Math.round(pAtk());p.buffAtkTurns=4;p.buffDef=2;p.buffDefTurns=4;
    e.debuffAtk=Math.round(e.atk*0.3);e.debuffDef=Math.round(e.def*0.3);
    addLog(`${sk.n}！ 全バフ最大化！`,'l-s');
  } else if(fn==='perfectEvade'){
    p.perfectEvadeTurns=3;addLog(`${sk.n}！ 3T完全回避+反撃`,'l-s');
  } else if(fn==='triMag'){
    let total=0;const elems=['炎','氷','雷'];
    elems.forEach(el=>{const d=Math.round(pAtk()*(p.magBonus||1)*3.0*(p.elemBonus&&p.elemBonus[el]?p.elemBonus[el]:1));total+=applyDmgToEnemy(d);});
    addLog(`${sk.n}！ 3属性計${total}ダメ`,'l-s');dealt=total;
  } else {
    addLog(`${sk.n}！`,'l-s');
  }
  if(e.hp<=0){killEnemy();return;}
  setTimeout(enemyTurn,400);renderGame();
}

function enemyTurn(){
  const p=G.player;const e=G.enemy;if(!e||e.hp<=0)return;
  G.turn++;
  if(p.ultCd>0)p.ultCd=Math.max(0,p.ultCd-1);
  if(p.mpRegen>0)p.mp=Math.min(p.maxMp,p.mp+p.mpRegen);
  if(p.hpRegen>0)p.hp=Math.min(p.maxHp,p.hp+p.hpRegen);
  if(p.buffAtkTurns>0)p.buffAtkTurns--;
  if(p.buffDefTurns>0)p.buffDefTurns--;
  if(p.allBuffTurns>0)p.allBuffTurns--;
  if(p.mirrorTurns>0)p.mirrorTurns--;
  if(p.blockTurns>0)p.blockTurns--;
  if(p.perfectEvadeTurns>0)p.perfectEvadeTurns--;
  if(p.holyOathTurns>0)p.holyOathTurns--;
  if(p.reflectTurns>0)p.reflectTurns--;
  if(p.vampLordTurns>0)p.vampLordTurns--;
  if(p.shadowReignTurns>0){
    p.shadowReignTurns--;
    if(G.enemy){G.enemy.hp=Math.max(0,G.enemy.hp-p.shadowReignAtk);addLog(`影の王国！ ${p.shadowReignAtk}ダメ`,'l-s');}
    if(G.enemy&&G.enemy.hp<=0){killEnemy();return;}
  }
  if(p.bardBuff&&p.bardBuffVal<10){p.bardBuffVal+=2;}
  if(p.atkRamp){p.atkRampVal=Math.min(20,(p.atkRampVal||0)+3);}
  if(p.goldRegen>0)p.gold+=p.goldRegen;
  if(p.autoAtk>0){e.hp=Math.max(0,e.hp-p.autoAtk);if(e.hp<=0){killEnemy();return;}}
  if(p.doomTurns>0){const d=Math.round(e.hp*0.15);e.hp=Math.max(0,e.hp-d);if(e.hp<=0){killEnemy();return;}}
  if(e.doomTurns>0){const d=Math.round(e.hp*0.15);e.hp=Math.max(0,e.hp-d);addLog(`呪い！ 敵HP-15%`,'l-s');if(e.hp<=0){killEnemy();return;}}
  if(e.poisonTurns>0){e.poisonTurns--;const d=R(5,12);e.hp=Math.max(0,e.hp-d);addLog(`毒！ ${d}ダメ`,'l-d');if(e.hp<=0){killEnemy();return;}}
  if(e.burned>0){e.burned--;const d=R(8,15);e.hp=Math.max(0,e.hp-d);addLog(`炎上！ ${d}ダメ`,'l-d');if(e.hp<=0){killEnemy();return;}}
  if(e.shocked>0){e.shocked--;const d=R(6,12);e.hp=Math.max(0,e.hp-d);addLog(`感電！ ${d}ダメ`,'l-d');if(e.hp<=0){killEnemy();return;}}
  if(e.stunTurns>0){e.stunTurns--;addLog(`${e.n}は気絶中…`,'');renderGame();return;}
  if(e.bound>0){e.bound--;addLog(`${e.n}は束縛中…`,'');renderGame();return;}
  if(p.immune&&(e.poisonTurns>0||e.frozen>0)){e.poisonTurns=0;e.frozen=0;}
  if(e.confuse&&Math.random()<(e.confuse||0)){addLog(`${e.n}は混乱！`,'');renderGame();return;}
  const eatk=Math.max(1,e.atk-(e.debuffAtk||0));
  const d=applyDmgToPlayer(eatk);
  if(d!==undefined)addLog(`${e.s} 攻撃！ ${p.name}に${d}ダメ`,'l-d');
  if(p.hp<=0){gameOver();return;}
  renderGame();
}

function killEnemy(){
  const p=G.player;const e=G.enemy;
  const goldMul=p.goldBonus||1;
  const gold=Math.round(e.g*goldMul);const xp=e.x;
  p.gold+=gold;p.xp+=xp;
  if(p.killHeal>0)p.hp=Math.min(p.maxHp,p.hp+p.killHeal);
  addLog(`${e.n}を倒した！ 💰+${gold}G XP+${xp}`,'l-h');
  checkLevelUp();
  const fi=getFloorInSeg();
  if(fi===5){showClear(e.isBoss);}
  else{
    p.floor++;
    const r=Math.random();
    if(r<0.12)setTimeout(()=>showEvent(),400);
    else if(r<0.3)setTimeout(()=>showShop(),400);
    else setTimeout(()=>{renderFloorProg();spawnEnemy();},400);
  }
}

function checkLevelUp(){
  const p=G.player;
  while(p.xp>=p.xpNext){
    p.xp-=p.xpNext;p.lv++;p.xpNext=Math.round(p.xpNext*1.45);
    p.maxHp+=12;p.hp=Math.min(p.maxHp,p.hp+12);
    p.maxMp+=6;p.mp=Math.min(p.maxMp,p.mp+6);
    p.atk+=2;p.def+=1;
    addLog(`🎉 Lv.${p.lv}！ HP+12 ATK+2 DEF+1`,'l-h');
  }
}

function showClear(isBoss){

  document.getElementById('cl-title').textContent=isBoss?`ボス撃破！ セグメント${seg}クリア！`:`${seg*5}階クリア！`;
  document.getElementById('cl-body').innerHTML=`${p.icon} ${p.job} Lv.${p.lv}<br>到達階: ${p.floor}階<br>💰 ${p.gold}G`;

  sn.innerHTML=`<div class="surf" style="font-size:12px"><span class="save-dot"></span>セーブポイント！ 次セグメント開始前にセーブ可能です。</div>`;
  const btns=document.getElementById('cl-btns');btns.innerHTML='';
  const cont=document.createElement('button');cont.className='btn btn-p';cont.textContent='次のセグメントへ';
  cont.onclick=()=>{p.floor++;go('game');renderFloorProg();spawnEnemy();};

    {n:'防衛の盾',t:'armor',b:R(5,10),c:35+p.floor*3,d:'DEF+'},
    {n:'鋼鉄の鎧',t:'armor',b:R(12,18),c:80+p.floor*5,d:'DEF++'},
    {n:'魔鎧',t:'armor',b:R(20,28),c:160+p.floor*8,d:'DEF+++'},
    {n:'回復薬×2',t:'potion',a:2,c:25+p.floor,d:'薬+2'},

function buyShopItem(item){
  const p=G.player;
  if(p.gold<item.c){addLog('所持金不足！');return;}
  p.gold-=item.c;document.getElementById('sh-gold').textContent=p.gold;
  if(item.t==='weapon'){p.weaponBonus=Math.max(p.weaponBonus,item.b);p.weapon='強化武器(+'+item.b+')';}
  else if(item.t==='armor'){p.armorBonus=Math.max(p.armorBonus,item.b);p.armor='強化鎧(+'+item.b+')';}
  else if(item.t==='potion'){p.potions+=item.a||1;}
  else if(item.t==='heal'){p.hp=p.maxHp;}
  else if(item.t==='mpfull'){p.mp=p.maxMp;}
  else if(item.t==='both'){p.hp=p.maxHp;p.mp=p.maxMp;}
  addLog(`${item.n}購入！`,'l-i');
}

const ENEMY_TRAITS=[
  {id:'armored',jp:'硬殻',prefix:'硬殻の'},
  {id:'berserk',jp:'狂暴',prefix:'狂暴な'},
  {id:'swift',jp:'俊敏',prefix:'俊敏な'},
  {id:'mage',jp:'魔力',prefix:'魔力を帯びた'},
  {id:'vampire',jp:'吸血',prefix:'吸血の'},
  {id:'regen',jp:'再生',prefix:'再生する'},
  {id:'poison',jp:'毒牙',prefix:'毒牙の'},
  {id:'commander',jp:'指揮',prefix:'指揮官'},
  {id:'shielded',jp:'障壁',prefix:'障壁持ちの'}
];
let CURRENT_SCREEN='title';

function safeHtml(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

// 画面切替を上書きして、どの画面でも装備/ステ振りボタンを表示できるようにする
function go(s){
  document.querySelectorAll('.scr').forEach(x=>x.classList.remove('on'));
  const target=document.getElementById('scr-'+s);
  if(target)target.classList.add('on');
  CURRENT_SCREEN=s;
  updateQuickActions();
}
function updateQuickActions(){
  const q=document.getElementById('quick-actions');
  if(!q)return;
  const p=G&&G.player;
  const hide=!p||['title','over','inventory','stats'].includes(CURRENT_SCREEN);
  if(hide){q.style.display='none';q.innerHTML='';return;}
  ensureV3State(p);
  q.style.display='flex';
  q.innerHTML=`<button class="btn" onclick="openInventory()">🎒 装備変更</button>
    <button class="btn" onclick="openStats()">📈 ステ振り(${p.statPoints||0})</button>
    <button class="btn" onclick="saveGame();addLog('セーブした','l-i');updateQuickActions()">💾 セーブ</button>`;
}
function closeUtilityPanel(){
  const back=(G&&G.returnScreen)||'game';
  G.returnScreen=null;
  go(back);
  if(back==='game')renderGame();
  if(back==='shop')renderShop();
  if(back==='stage'){renderFloorProg();document.getElementById('st-gold').textContent=G.player.gold;}
}
openInventory=function(){
  if(!G||!G.player)return;
  G.returnScreen=(!['inventory','stats','title','over'].includes(CURRENT_SCREEN)&&CURRENT_SCREEN)||'game';
  ensureV3State(G.player);renderInventory();go('inventory');
};
openStats=function(){
  if(!G||!G.player)return;
  G.returnScreen=(!['inventory','stats','title','over'].includes(CURRENT_SCREEN)&&CURRENT_SCREEN)||'game';
  ensureV3State(G.player);renderStats();go('stats');
};

// ロック中の職業は表示しない
renderJobGrid=function(q){
  const grid=document.getElementById('job-grid');
  const query=q||'';const lc=query.toLowerCase();
  const unlocked=jobUnlockedCount();
  const visible=JOBS.map((j,i)=>Object.assign({idx:i},j)).filter(j=>j.idx<unlocked);
  const filtered=visible.filter(j=>j.n.includes(query)||j.t.includes(query)||lc===''||j.id.includes(lc));
  document.getElementById('job-count').textContent=`(${filtered.length}/${visible.length}職表示・全${JOBS.length}職)`;
  grid.innerHTML='';
  filtered.forEach(j=>{
    const d=document.createElement('div');d.className='jcard';d.id='jc-'+j.id;
    d.innerHTML=`<div class="ji">${j.i}</div><div class="jn">${j.n}</div><div class="jt">${j.t}</div>`;
    d.onclick=()=>selectJob(j.id);grid.appendChild(d);
  });
};

function pickEnemyTrait(existing=[]){
  let t=pick(ENEMY_TRAITS);
  let guard=0;
  while(existing.includes(t.id)&&guard++<20)t=pick(ENEMY_TRAITS);
  return t;
}
function empowerEnemy(e,floor,elite,boss){
  const traits=[];
  const traitCount=boss?2:(elite?2:((floor>=8&&Math.random()<.55)||(floor>=18)?1:0));
  for(let i=0;i<traitCount;i++)traits.push(pickEnemyTrait(traits.map(x=>x.id)));
  e.traits=traits.map(x=>x.id);
  e.traitText=traits.map(x=>x.jp).join(' / ');
  if(traits.length)e.n=`${traits[0].prefix} ${e.n}`;
  traits.forEach(t=>{
    if(t.id==='armored'){e.hp=Math.round(e.hp*1.18);e.def=Math.round(e.def*1.45+2);}
    if(t.id==='berserk'){e.hp=Math.round(e.hp*1.08);e.atk=Math.round(e.atk*1.28+2);}
    if(t.id==='swift'){e.atk=Math.round(e.atk*1.12+1);e.spdBoost=true;}
    if(t.id==='mage'){e.atk=Math.round(e.atk*1.22+3);e.def=Math.max(0,Math.round(e.def*.9));}
    if(t.id==='vampire'){e.hp=Math.round(e.hp*1.12);}
    if(t.id==='regen'){e.hp=Math.round(e.hp*1.16);}
    if(t.id==='poison'){e.atk=Math.round(e.atk*1.12+1);}
    if(t.id==='commander'){e.hp=Math.round(e.hp*1.15);e.def+=2;}
    if(t.id==='shielded'){e.hp=Math.round(e.hp*1.1);e.barrier=1;}
  });
  e.maxHp=e.hp;
  return e;
}
makeEnemyFromPool=function(floor,elite){
  const tier=Math.min(Math.floor((floor||1)/8),ENEMIES.length-1);
  const pool=ENEMIES[tier]||ENEMIES[ENEMIES.length-1];
  const e=JSON.parse(JSON.stringify(pick(pool)));
  const scale=1+(floor||1)*0.14+(elite?.75:0);
  e.hp=Math.round(e.hp*scale);
  e.atk=Math.round(e.atk*(1+(floor||1)*0.095+(elite?.48:0)));
  e.def=Math.round(e.def*(1+(floor||1)*0.065+(elite?.35:0)));
  e.g=Math.round(e.g*(1+(floor||1)*0.075+(elite?.85:0)));
  e.x=Math.round(e.x*(1+(floor||1)*0.025)*(elite?2.15:1));
  e.isBoss=false;e.isElite=!!elite;initEnemyStatus(e);
  return empowerEnemy(e,floor,elite,false);
};
spawnEnemy=function(stageType){
  const p=G.player;ensureV3State(p);
  const fi=getFloorInSeg();
  const type=stageType||G.stageType||(fi===5?'boss':'battle');
  let enemies=[];
  if(type==='boss'||fi===5||type==='boss_elite'){
    const bi=Math.min(Math.ceil(p.floor/20)-1,BOSSES.length-1);
    const e=JSON.parse(JSON.stringify(BOSSES[bi]));
    const scale=1+Math.floor(p.floor/5)*0.18;
    e.hp=Math.round(e.hp*scale);e.atk=Math.round(e.atk*(1+p.floor*0.026));e.def=Math.round(e.def*(1+p.floor*0.018));
    e.g=Math.round(e.g*(1+p.floor*0.055));e.x=Math.round(e.x*(1+p.floor*0.04));
    if(type==='boss_elite'){e.n='凶暴化した'+e.n;e.hp=Math.round(e.hp*1.45);e.atk=Math.round(e.atk*1.32);e.def=Math.round(e.def*1.15);e.g=Math.round(e.g*1.75);e.x=Math.round(e.x*1.65);}
    if(p.bossDebuff>0){e.hp=Math.round(e.hp*(1-p.bossDebuff));}
    e.isBoss=true;e.isElite=type==='boss_elite';initEnemyStatus(e);empowerEnemy(e,p.floor,true,true);enemies=[e];
  }else if(type==='elite'){
    enemies=[makeEnemyFromPool(p.floor,true),makeEnemyFromPool(p.floor,true),makeEnemyFromPool(p.floor,false)];
  }else if(type==='ambush20'){
    enemies=[makeEnemyFromPool(p.floor+20,true),makeEnemyFromPool(p.floor+20,true),makeEnemyFromPool(p.floor+20,false)];
    enemies.forEach(e=>{e.n='異常個体 '+e.n;e.isElite=true;});
  }else{
    const count=R(3,4);
    for(let i=0;i<count;i++)enemies.push(makeEnemyFromPool(p.floor,false));
  }
  G.enemies=enemies;G.enemy=enemies[0];G.turn=0;G.stageType=type;
  go('game');renderGame();
  addLog(`${type==='elite'?'⚠️ エリート部隊！ ':type==='ambush20'?'🚨 危険イベント！ ':G.enemy.isBoss?'⚠️ ボス！ ':''}${enemies.length}体の敵が現れた！`,G.enemy.isBoss||type==='elite'||type==='ambush20'?'l-w':'');
};

applyDmgToEnemy=function(raw){
  const e=G.enemy;const p=G.player;if(!e)return 0;
  let d=raw;
  if(e.barrier>0){d=Math.max(1,Math.round(d*.5));e.barrier--;addLog(`${e.n}の障壁がダメージを半減！`,'l-s');}
  if(isCrit(p)){d=Math.round(d*(p.critMul||1.5));addLog(`💥 クリティカル！`,'l-s');}
  if(p.luckyDouble&&Math.random()<p.luckyDouble){d*=2;addLog('🌟 ラッキー倍加！','l-s');}
  e.hp=Math.max(0,e.hp-d);
  if(p.lifeSteal>0){const heal=Math.round(d*p.lifeSteal);p.hp=Math.min(p.maxHp,p.hp+heal);}
  if(p.autoPoison)e.poisonTurns=Math.max(e.poisonTurns,3);
  if(p.autoBurn)e.burned=Math.max(e.burned,3);
  if(p.autoFreeze)e.frozen=Math.max(e.frozen,2);
  if(p.autoShock)e.shocked=Math.max(e.shocked,2);
  if(p.curseAtk)e.debuffAtk=Math.max(e.debuffAtk,5);
  if(p.mpOnAtk)p.mp=Math.min(p.maxMp,p.mp+p.mpOnAtk);
  return d;
};
function enemyTraitStart(e,p){
  if(!e.traits)return;
  if(e.traits.includes('regen')&&e.hp>0&&e.hp<e.maxHp){const h=Math.max(2,Math.round(e.maxHp*.045));e.hp=Math.min(e.maxHp,e.hp+h);addLog(`${e.n}が再生 HP+${h}`,'l-h');}
  if(e.traits.includes('commander')&&Math.random()<.45){
    (G.enemies||[]).filter(x=>x.hp>0&&x!==e).forEach(x=>x.atk+=1);
    addLog(`${e.n}が仲間を鼓舞！`,'l-w');
  }
}
function enemyAttackPower(e){
  let a=Math.max(1,e.atk-(e.debuffAtk||0));
  if(e.traits&&e.traits.includes('berserk')&&e.hp/e.maxHp<.5)a=Math.round(a*1.45);
  if(e.traits&&e.traits.includes('mage')&&Math.random()<.3){a=Math.round(a*1.65);addLog(`${e.n}の魔力攻撃！`,'l-w');}
  return a;
}
function enemyAfterHit(e,dmg){
  const p=G.player;if(!dmg||!e.traits)return;
  if(e.traits.includes('vampire')){const h=Math.round(dmg*.25);e.hp=Math.min(e.maxHp,e.hp+h);addLog(`${e.n}が吸血 HP+${h}`,'l-h');}
  if(e.traits.includes('poison')&&Math.random()<.45){const pd=Math.max(3,Math.round(p.maxHp*.035));p.hp=Math.max(0,p.hp-pd);addLog(`毒牙で追加${pd}ダメ`,'l-d');}
}
enemyTurn=function(){
  const p=G.player;if(!aliveEnemies().length)return;
  tickPlayerStart();
  if(p.autoAtk>0){const e=setCurrentEnemy();if(e){e.hp=Math.max(0,e.hp-p.autoAtk);addLog(`自動攻撃 ${p.autoAtk}`,'l-s');}}
  let enemies=[...(G.enemies||[])].filter(e=>e.hp>0);
  for(const e of enemies){
    G.enemy=e;
    tickEnemyStatus(e);
    enemyTraitStart(e,p);
    if(e.hp<=0)continue;
    if(e.stunTurns>0){e.stunTurns--;addLog(`${e.n}は気絶中`);continue;}
    if(e.bound>0){e.bound--;addLog(`${e.n}は束縛中`);continue;}
    if(e.frozen>0){e.frozen--;addLog(`${e.n}は凍結中`);continue;}
    if(e.confuse&&Math.random()<(e.confuse||0)){addLog(`${e.n}は混乱！`);continue;}
    const d=applyDmgToPlayer(enemyAttackPower(e));
    if(d!==undefined){addLog(`${e.s} ${e.n}の攻撃 ${d}ダメ`,'l-d');enemyAfterHit(e,d);}
    if(p.hp<=0){gameOver();return;}
    if(e.traits&&e.traits.includes('swift')&&Math.random()<.22&&p.hp>0){
      const d2=applyDmgToPlayer(Math.round(enemyAttackPower(e)*.7));
      if(d2!==undefined){addLog(`${e.n}の追撃 ${d2}ダメ`,'l-d');enemyAfterHit(e,d2);}
      if(p.hp<=0){gameOver();return;}
    }
    if(e.hp<=0)addLog(`${e.n}は反撃で倒れた！`,'l-h');
  }
  G.enemies=(G.enemies||[]).filter(e=>e.hp>0);
  if(G.enemies.length===0){encounterCleared();return;}
  setCurrentEnemy();renderGame();
};

const __renderGameBaseV4=renderGame;
renderGame=function(){
  __renderGameBaseV4();
  updateQuickActions();
  const e=G&&G.enemy;const tags=document.getElementById('e-tags');
  if(e&&tags&&e.traitText){
    const party=tags.querySelector('.enemy-party');
    const row=document.createElement('div');row.className='trait-row';
    row.innerHTML=e.traitText.split(' / ').map(t=>`<span class="trait-chip">${safeHtml(t)}</span>`).join('');
    tags.insertBefore(row,party||null);
  }
};

function materialSellValue(name){
  const f=G.player.floor||1;
  if(name==='万能素材')return 14+Math.floor(f*1.5);
  if(String(name).includes('希少'))return 36+f*2;
  return 8+f;
}
function cleanupMaterials(){
  const p=G.player;if(!p.materials)p.materials={};
  Object.keys(p.materials).forEach(k=>{if((p.materials[k]||0)<=0)delete p.materials[k];});
}
function processMaterials(){
  const p=G.player;ensureV3State(p);
  let gain=0,used=0;
  Object.keys(p.materials).forEach(k=>{
    if(k==='万能素材')return;
    const v=p.materials[k]||0;
    if(v<=0)return;
    if(String(k).includes('希少')){gain+=v*3;used+=v;p.materials[k]=0;}
    else{const batch=Math.floor(v/3);if(batch>0){gain+=batch;used+=batch*3;p.materials[k]-=batch*3;}}
  });
  if(gain<=0){addLog('加工できる素材が足りない');return;}
  p.materials['万能素材']=(p.materials['万能素材']||0)+gain;
  cleanupMaterials();
  addLog(`素材加工：${used}個 → 万能素材+${gain}`,'l-i');
  renderShop();
}
function sellMaterialByIndex(idx,all){
  const p=G.player;ensureV3State(p);
  const name=G.shopMatKeys&&G.shopMatKeys[idx];
  if(!name||!p.materials[name])return;
  const qty=all?p.materials[name]:1;
  const gold=qty*materialSellValue(name);
  p.materials[name]-=qty;p.gold+=gold;cleanupMaterials();
  addLog(`${name} x${qty}を売却 +${gold}G`,'l-i');
  renderShop();
}
function sellAllMaterials(){
  const p=G.player;ensureV3State(p);
  let total=0,count=0;
  Object.entries(p.materials||{}).forEach(([k,v])=>{if(v>0){total+=v*materialSellValue(k);count+=v;p.materials[k]=0;}});
  cleanupMaterials();
  if(count<=0){addLog('売れる素材がない');return;}
  p.gold+=total;addLog(`素材を全売却：${count}個 +${total}G`,'l-i');renderShop();
}
function renderShopMaterialTools(){
  const grid=document.getElementById('shop-grid');if(!grid||!G||!G.player)return;
  let panel=document.getElementById('shop-material-tools');
  if(!panel){panel=document.createElement('div');panel.id='shop-material-tools';panel.className='card shop-tools';grid.parentNode.insertBefore(panel,grid);}
  const p=G.player;ensureV3State(p);
  const entries=Object.entries(p.materials||{}).filter(([,v])=>v>0).sort((a,b)=>a[0].localeCompare(b[0],'ja'));
  G.shopMatKeys=entries.map(([k])=>k);
  const rows=entries.slice(0,12).map(([k,v],i)=>{
    const price=materialSellValue(k);
    return `<div class="mat-row"><span>${safeHtml(k)} ×${v}<br><span class="muted">売値 ${price}G/個</span></span><span><button class="btn tiny-btn" onclick="sellMaterialByIndex(${i},false)">1個売却</button> <button class="btn tiny-btn" onclick="sellMaterialByIndex(${i},true)">全部</button></span></div>`;
  }).join('')||'<div class="muted">素材なし。敵を倒すと素材が落ちるよ。</div>';
  panel.innerHTML=`<h3 style="margin-bottom:6px">🧪 素材の加工・売却</h3>
    <div class="muted" style="margin-bottom:6px">通常素材3個→万能素材1個 / 希少素材1個→万能素材3個。万能素材は鍛冶で使用。</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
      <button class="btn btn-g" onclick="processMaterials()">素材を加工</button>
      <button class="btn btn-d" onclick="sellAllMaterials()">素材を全売却</button>
    </div>${rows}`;
}
const __renderShopBaseV4=renderShop;
renderShop=function(){
  __renderShopBaseV4();
  renderShopMaterialTools();
  updateQuickActions();
};

// 既存セーブにも新しい導線が出るように、表示系の後始末を少しだけ補強
const __renderInventoryBaseV4=renderInventory;
renderInventory=function(){__renderInventoryBaseV4();updateQuickActions();};
const __renderStatsBaseV4=renderStats;
renderStats=function(){__renderStatsBaseV4();updateQuickActions();};

initTitle();
</script>


<script>
/* === Infinite Tower Roguelike v3 expansion patch === */
const META_KEY_V3='itrl_meta_v3';
const ADV_COLORS=['銅','銀','金','レインボー'];
const ADV_COLOR_ICON={'銅':'🥉','銀':'🥈','金':'🥇','レインボー':'🌈'};
const ADV_RARITIES=[
  {id:'common',jp:'コモン',mul:1,cls:'r-common'},
  {id:'uncommon',jp:'アンコモン',mul:1.35,cls:'r-uncommon'},
  {id:'rare',jp:'レア',mul:1.8,cls:'r-rare'},
  {id:'epic',jp:'エピック',mul:2.45,cls:'r-epic'},
  {id:'legend',jp:'レジェンド',mul:3.4,cls:'r-legend'}
];
const POTION_DEF=[
  {id:'p20',jp:'小回復薬',pct:.20,rare:'コモン'},
  {id:'p35',jp:'回復薬',pct:.35,rare:'アンコモン'},
  {id:'p50',jp:'上級回復薬',pct:.50,rare:'レア'},
  {id:'p75',jp:'特級回復薬',pct:.75,rare:'エピック'},
  {id:'p100',jp:'完全回復薬',pct:1.00,rare:'レジェンド'}
];
const SLOT_LABEL={right:'右手',left:'左手',head:'頭',body:'胴',feet:'足',acc1:'アクセ1',acc2:'アクセ2'};
const SLOT_ICON={right:'⚔️',left:'🗡️',head:'🎩',body:'🥋',feet:'🥾',acc1:'💍',acc2:'🔮'};
const EQUIP_SLOTS=['right','left','head','body','feet','acc1','acc2'];

function metaV3(){
  let m={unlocked:5,bestFloor:1};
  try{m=Object.assign(m,JSON.parse(localStorage.getItem(META_KEY_V3)||'{}'));}catch(e){}
  m.unlocked=clamp(m.unlocked||5,5,JOBS.length);
  return m;
}
function saveMetaV3(m){localStorage.setItem(META_KEY_V3,JSON.stringify(m));}

function jobUnlockedCount(){return metaV3().unlocked;}

function rarityByFloor(f){
  const roll=Math.random()+Math.min(.22,(f||1)*.006);
  if(roll>.985)return ADV_RARITIES[4];
  if(roll>.93)return ADV_RARITIES[3];
  if(roll>.78)return ADV_RARITIES[2];
  if(roll>.52)return ADV_RARITIES[1];
  return ADV_RARITIES[0];
}
function itemId(){return 'it'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function pick(arr){return arr[R(0,arr.length-1)];}
function statText(st){
  const parts=[];
  ['atk','def','hp','mp','STR','DEX','AGI','INT','VIT','LUK'].forEach(k=>{if(st[k])parts.push(`${k}+${st[k]}`);});
  return parts.join(' / ')||'特殊なし';
}
function makeEquip(slotType,floor,rarity){
  const r=rarity||rarityByFloor(floor);
  const lv=Math.max(1,Math.ceil((floor||1)/3));
  const st={};
  let slot=slotType;
  if(slotType==='armor')slot=pick(['head','body','feet']);
  if(slotType==='accessory')slot='accessory';
  if(slot==='weapon'){
    st.atk=Math.round((R(5,10)+lv*2)*r.mul);
    if(Math.random()<.35)st.DEX=R(1,2)+Math.floor(r.mul);
    if(Math.random()<.25)st.STR=R(1,2)+Math.floor(r.mul);
  }else if(slot==='head'){
    st.def=Math.round((R(2,5)+lv)*r.mul); st.INT=R(0,2); st.LUK=R(0,2);
  }else if(slot==='body'){
    st.def=Math.round((R(5,9)+lv*2)*r.mul); st.hp=Math.round((R(10,22)+lv*5)*r.mul); st.VIT=R(1,3);
  }else if(slot==='feet'){
    st.def=Math.round((R(2,5)+lv)*r.mul); st.AGI=R(1,3)+Math.floor(r.mul);
  }else{
    st.mp=Math.round((R(8,18)+lv*4)*r.mul); st.LUK=R(1,4); 
    if(Math.random()<.5)st.INT=R(1,3); else st.STR=R(1,3);
  }
  const names={
    weapon:['鉄剣','双刃短剣','魔導剣','獣牙の斧','星屑の槍'],
    head:['革の帽子','魔導帽','鋼の兜','竜鱗の冠'],
    body:['旅人の服','チェインメイル','騎士鎧','霊布のローブ'],
    feet:['軽業ブーツ','鉄靴','風切り靴','影走りの足具'],
    accessory:['力の指輪','守りの護符','吸魔の石','幸運の耳飾り']
  };
  return {id:itemId(),slot:slot,rar:r.id,rarJp:r.jp,rarCls:r.cls,n:`${r.jp} ${pick(names[slot])}`,stats:st,lv:1};
}

function ensureV3State(p){
  if(!p)return;
  if(!p.baseMaxHp)p.baseMaxHp=p.maxHp||100;
  if(!p.baseMaxMp)p.baseMaxMp=p.maxMp||50;
  if(!p.baseAtk)p.baseAtk=p.atk||10;
  if(!p.baseDef)p.baseDef=p.def||5;
  if(!p.baseSpd)p.baseSpd=p.spd||10;
  if(!p.stats)p.stats={HP:0,MP:0,STR:Math.max(1,Math.round((p.baseAtk||10)/3)),DEX:5,AGI:Math.max(1,p.baseSpd||10),INT:Math.max(1,Math.round((p.baseMaxMp||50)/12)),VIT:Math.max(1,p.baseDef||5),LUK:5};
  ['HP','MP','STR','DEX','AGI','INT','VIT','LUK'].forEach(k=>{if(p.stats[k]===undefined)p.stats[k]=0;});
  if(p.statPoints===undefined)p.statPoints=0;
  if(!p.inventory)p.inventory={equipment:[],keys:{},chests:{},potions:{}};
  if(!p.inventory.equipment)p.inventory.equipment=[];
  if(!p.inventory.keys)p.inventory.keys={};
  if(!p.inventory.chests)p.inventory.chests={};
  if(!p.inventory.potions)p.inventory.potions={};
  ADV_COLORS.forEach(c=>{if(p.inventory.keys[c]===undefined)p.inventory.keys[c]=0;if(p.inventory.chests[c]===undefined)p.inventory.chests[c]=0;});
  POTION_DEF.forEach(x=>{if(p.inventory.potions[x.id]===undefined)p.inventory.potions[x.id]=0;});
  if(p.potions&&p.potions>0&&p.inventory.potions.p35===0){p.inventory.potions.p35=p.potions;}
  if(!p.equip)p.equip={right:null,left:null,head:null,body:null,feet:null,acc1:null,acc2:null};
  EQUIP_SLOTS.forEach(s=>{if(p.equip[s]===undefined)p.equip[s]=null;});
  if(!p.materials)p.materials={};
  if(!p.skillOrbs)p.skillOrbs=[];
  if(!p.curses)p.curses=0;
  if(!p.stageHistory)p.stageHistory=[];
  syncEquipmentStats(p);
  recalcVitals(p);
}
function getEquipById(p,id){return (p.inventory.equipment||[]).find(x=>x.id===id)||null;}
function equippedIds(p){return new Set(EQUIP_SLOTS.map(s=>p.equip&&p.equip[s]).filter(Boolean));}
function syncEquipmentStats(p){
  if(!p||!p.inventory)return;
  let atk=0,def=0,hp=0,mp=0,spd=0;
  const statAdd={STR:0,DEX:0,AGI:0,INT:0,VIT:0,LUK:0};
  EQUIP_SLOTS.forEach(s=>{
    const it=getEquipById(p,p.equip[s]);
    if(!it)return;
    const st=it.stats||{};
    atk+=st.atk||0;def+=st.def||0;hp+=st.hp||0;mp+=st.mp||0;spd+=st.AGI||0;
    Object.keys(statAdd).forEach(k=>statAdd[k]+=st[k]||0);
  });
  p.weaponBonus=atk;
  p.armorBonus=def;
  p.equipHpBonus=hp;
  p.equipMpBonus=mp;
  p.equipSpdBonus=spd;
  p.equipStatBonus=statAdd;
  const right=getEquipById(p,p.equip.right), left=getEquipById(p,p.equip.left);
  const body=getEquipById(p,p.equip.body);
  p.weapon=[right?right.n:null,left?left.n:null].filter(Boolean).join(' / ')||'未装備';
  p.armor=body?body.n:'未装備';
}
function statVal(p,k){return (p.stats&&p.stats[k]||0)+(p.equipStatBonus&&p.equipStatBonus[k]||0);}
function recalcVitals(p){
  const oldHp=p.maxHp||p.baseMaxHp||100, oldMp=p.maxMp||p.baseMaxMp||50;
  p.maxHp=Math.max(1,Math.round((p.baseMaxHp||100)+statVal(p,'HP')*12+statVal(p,'VIT')*5+(p.equipHpBonus||0)));
  p.maxMp=Math.max(1,Math.round((p.baseMaxMp||50)+statVal(p,'MP')*8+statVal(p,'INT')*4+(p.equipMpBonus||0)));
  if(p.hp===undefined)p.hp=p.maxHp;
  if(p.mp===undefined)p.mp=p.maxMp;
  if(p.maxHp>oldHp)p.hp+=p.maxHp-oldHp;
  if(p.maxMp>oldMp)p.mp+=p.maxMp-oldMp;
  p.hp=clamp(p.hp,0,p.maxHp);p.mp=clamp(p.mp,0,p.maxMp);
}
function addStarterEquipment(p){
  ensureV3State(p);
  const sword=makeEquip('weapon',1,ADV_RARITIES[0]);
  const body=makeEquip('body',1,ADV_RARITIES[0]);
  sword.n='初期の剣';body.n='旅立ちの服';
  p.inventory.equipment.push(sword,body);
  p.equip.right=sword.id;p.equip.body=body.id;
  syncEquipmentStats(p);recalcVitals(p);
}

function renderJobGrid(q){
  const grid=document.getElementById('job-grid');
  const lc=(q||'').toLowerCase();
  const unlocked=jobUnlockedCount();
  const filtered=JOBS.map((j,i)=>Object.assign({idx:i},j)).filter(j=>j.n.includes(q)||j.t.includes(q)||lc===''||j.id.includes(lc));
  document.getElementById('job-count').textContent=`(${Math.min(unlocked,JOBS.length)}/${JOBS.length}職解放)`;
  grid.innerHTML='';
  filtered.forEach(j=>{
    const locked=j.idx>=unlocked;
    const d=document.createElement('div');d.className='jcard'+(locked?'':'');d.id='jc-'+j.id;
    d.style.opacity=locked?.45:1;
    d.innerHTML=`<div class="ji">${locked?'🔒':j.i}</div><div class="jn">${j.n}</div><div class="jt">${locked?`解放条件：${(j.idx-4)*5}階クリア`:j.t}</div>`;
    d.onclick=()=>{if(locked){showLockedJob(j);return;}selectJob(j.id);};
    grid.appendChild(d);
  });
}
function showLockedJob(j){

function pAtk(){
  const p=G.player;ensureV3State(p);
  let a=(p.baseAtk||p.atk||1)+(p.weaponBonus||0)+statVal(p,'STR')*1.8+statVal(p,'DEX')*.6+statVal(p,'INT')*.25;
  if(p.buffAtkTurns>0)a+=p.buffAtk;
  if(p.allBuffTurns>0)a=Math.round(a*p.allBuffMul);
  if(p.atkRampVal)a+=p.atkRampVal;
  if(p.bardBuffVal)a+=p.bardBuffVal;
  if(p.woundedBuff&&p.hp/p.maxHp<0.5)a+=p.woundedBuff;
  if(p.darkPow)a+=Math.round((1-p.hp/p.maxHp)*20);
  if(p.rage)a+=Math.round((1-p.hp/p.maxHp)*30);
  if(p.physBonus&&p.physBonus>1)a=Math.round(a*p.physBonus);
  if(p.curses)a=Math.max(1,a-p.curses*2);
  return Math.round(a);
}
function pDef(){
  const p=G.player;ensureV3State(p);
  let d=(p.baseDef||p.def||0)+(p.armorBonus||0)+statVal(p,'VIT')*1.2+statVal(p,'STR')*.25;
  if(p.buffDefTurns>0)d=Math.round(d*p.buffDef);
  if(p.allBuffTurns>0)d=Math.round(d*p.allBuffMul);
  if(p.divineShield&&p.hp/p.maxHp<0.2)d*=2;
  if(p.curses)d=Math.max(0,d-p.curses*1.5);
  return Math.round(d);
}
function pSpd(){
  const p=G.player;return Math.round((p.baseSpd||p.spd||10)+statVal(p,'AGI')*.9+(p.equipSpdBonus||0));
}
function isCrit(p){
  ensureV3State(p);
  return Math.random()<((p.critRate||0)+statVal(p,'LUK')*.004+statVal(p,'DEX')*.002);
}

function aliveEnemies(){return (G.enemies&&G.enemies.length?G.enemies:(G.enemy?[G.enemy]:[])).filter(e=>e&&e.hp>0);}
function setCurrentEnemy(){
  const alive=aliveEnemies();
  G.enemy=alive.length?alive[0]:null;
  return G.enemy;
}
function makeEnemyFromPool(floor,elite){
  const tier=Math.min(Math.floor((floor||1)/10),ENEMIES.length-1);
  const pool=ENEMIES[tier]||ENEMIES[ENEMIES.length-1];
  const e=JSON.parse(JSON.stringify(pick(pool)));
  const scale=1+(floor||1)*0.1+(elite?.55:0);
  e.hp=Math.round(e.hp*scale);e.atk=Math.round(e.atk*(1+(floor||1)*0.07+(elite?.35:0)));
  e.def=Math.round(e.def*(1+(floor||1)*0.05+(elite?.25:0)));
  e.g=Math.round(e.g*(1+(floor||1)*0.06+(elite?.75:0)));
  e.x=Math.round(e.x*(elite?1.9:1));
  e.maxHp=e.hp;e.isBoss=false;e.isElite=!!elite;
  initEnemyStatus(e);return e;
}
function initEnemyStatus(e){
  e.poisoned=false;e.poisonTurns=0;e.frozen=0;e.shocked=0;e.burned=0;
  e.bound=0;e.debuffAtk=0;e.debuffDef=0;e.stunTurns=0;e.doomTurns=0;e.confuse=0;
}
function spawnEnemy(stageType){
  const p=G.player;ensureV3State(p);
  const fi=getFloorInSeg();
  const type=stageType||G.stageType||(fi===5?'boss':'battle');
  let enemies=[];
  if(type==='boss'||fi===5){
    const bi=Math.min(Math.ceil(p.floor/25)-1,BOSSES.length-1);
    const e=JSON.parse(JSON.stringify(BOSSES[bi]));
    const scale=1+Math.floor(p.floor/5)*0.12;
    e.hp=Math.round(e.hp*scale);e.atk=Math.round(e.atk*(1+p.floor*0.018));e.def=Math.round(e.def*(1+p.floor*0.012));
    e.g=Math.round(e.g*(1+p.floor*0.04));e.x=Math.round(e.x*(1+p.floor*0.03));
    if(type==='boss_elite'){e.n='凶暴化した'+e.n;e.hp=Math.round(e.hp*1.35);e.atk=Math.round(e.atk*1.25);e.g=Math.round(e.g*1.6);e.x=Math.round(e.x*1.5);}
    if(p.bossDebuff>0){e.hp=Math.round(e.hp*(1-p.bossDebuff));}
    e.maxHp=e.hp;e.isBoss=true;initEnemyStatus(e);enemies=[e];
  }else if(type==='elite'){
    enemies=[makeEnemyFromPool(p.floor,true),makeEnemyFromPool(p.floor,false)];
  }else if(type==='ambush20'){
    enemies=[makeEnemyFromPool(p.floor+20,true),makeEnemyFromPool(p.floor+20,true)];
    enemies.forEach(e=>{e.n='異常個体 '+e.n;e.isElite=true;});
  }else{
    const count=R(3,4);
    for(let i=0;i<count;i++)enemies.push(makeEnemyFromPool(p.floor,false));
  }
  G.enemies=enemies;G.enemy=enemies[0];G.turn=0;G.stageType=type;
  go('game');renderGame();
  addLog(`${type==='elite'?'⚠️ エリート！ ':type==='ambush20'?'🚨 危険イベント！ ':G.enemy.isBoss?'⚠️ ボス！ ':''}${enemies.length}体の敵が現れた！`,G.enemy.isBoss||type==='elite'||type==='ambush20'?'l-w':'');
}

function renderSkills(){
  const p=G.player;ensureV3State(p);const sl=document.getElementById('skill-list');sl.innerHTML='';
  const skills=[
    {sk:p.phys,type:'phys',tag:'物理',cls:'tag-phys'},
    {sk:p.mag,type:'mag',tag:'魔法',cls:'tag-mag'},
    {sk:p.ult,type:'ult',tag:'ULT',cls:'tag-ult',cd:p.ultCd},
  ];
  skills.forEach(({sk,type,tag,cls,cd})=>{
    const btn=document.createElement('button');btn.className='sk-btn';
    const cost=Math.round((sk.cost||0)*(p.mpDiscount||1));
    const canUse=(cost<=0||p.mp>=cost)&&(cd===undefined||cd===0)&&!!G.enemy;
    btn.disabled=!canUse;
    const cdTxt=cd>0?` CD:${cd}T`:'';
    btn.innerHTML=`<span><span class="tag ${cls}" style="margin-right:4px">${tag}</span>${sk.n}<br><span class="muted">${sk.d||''}</span></span><span class="sk-ct">${cost}MP${cdTxt}</span>`;
    btn.onclick=()=>useSkill(type);
    sl.appendChild(btn);
  });
}

function doAtk(){
  if(!setCurrentEnemy())return;
  const p=G.player;const e=G.enemy;
  let d=calcDmg(pAtk(),e.def-(e.debuffDef||0),p.pierceDef);
  if(!p.firstDone&&p.goFirst&&p.firstBonus>1){d=Math.round(d*p.firstBonus);addLog('先制ボーナス！','l-s');}
  p.firstDone=true;
  const dealt=applyDmgToEnemy(d);
  addLog(`${p.icon} 攻撃 → ${e.n}に${dealt}ダメ`,'l-d');
  if(e.hp<=0){killEnemy();return;}
  setTimeout(enemyTurn,250);renderGame();
}

function usePotion(){
  const p=G.player;ensureV3State(p);
  const candidates=[...POTION_DEF].reverse().filter(x=>(p.inventory.potions[x.id]||0)>0);
  if(candidates.length===0){addLog('回復薬がない！');return;}
  const po=candidates[0];
  p.inventory.potions[po.id]--;
  const heal=Math.round(p.maxHp*po.pct*(p.potionBonus||1));
  p.hp=Math.min(p.maxHp,p.hp+heal);
  if(p.potionMp)p.mp=Math.min(p.maxMp,p.mp+(p.potionMp||0));
  addLog(`🧪 ${po.jp}(${Math.round(po.pct*100)}%) HP+${heal}`,'l-h');
  setTimeout(enemyTurn,250);renderGame();
}

function doFlee(){
  const p=G.player;const fi=getFloorInSeg();
  if(fi===5){addLog('ボス戦では逃げられない！');return;}
  if(Math.random()<0.5){addLog('逃走失敗！');setTimeout(enemyTurn,250);return;}
  addLog('逃走成功！');
  advanceFloor();
}

function tickPlayerStart(){
  const p=G.player;
  G.turn++;
  if(p.ultCd>0)p.ultCd=Math.max(0,p.ultCd-1);
  if(p.mpRegen>0)p.mp=Math.min(p.maxMp,p.mp+p.mpRegen);
  if(p.hpRegen>0)p.hp=Math.min(p.maxHp,p.hp+p.hpRegen);
  ['buffAtkTurns','buffDefTurns','allBuffTurns','mirrorTurns','blockTurns','perfectEvadeTurns','holyOathTurns','reflectTurns','vampLordTurns'].forEach(k=>{if(p[k]>0)p[k]--;});
  if(p.shadowReignTurns>0){
    p.shadowReignTurns--;
    const e=setCurrentEnemy();if(e){e.hp=Math.max(0,e.hp-p.shadowReignAtk);addLog(`影の王国！ ${p.shadowReignAtk}ダメ`,'l-s');}
  }
  if(p.bardBuff&&p.bardBuffVal<10)p.bardBuffVal+=2;
  if(p.atkRamp)p.atkRampVal=Math.min(20,(p.atkRampVal||0)+3);
  if(p.goldRegen>0)p.gold+=p.goldRegen;
}
function tickEnemyStatus(e){
  if(e.poisonTurns>0){e.poisonTurns--;const d=R(5,12);e.hp=Math.max(0,e.hp-d);addLog(`${e.n} 毒${d}`,'l-d');}
  if(e.burned>0){e.burned--;const d=R(8,15);e.hp=Math.max(0,e.hp-d);addLog(`${e.n} 炎上${d}`,'l-d');}
  if(e.shocked>0){e.shocked--;const d=R(6,12);e.hp=Math.max(0,e.hp-d);addLog(`${e.n} 感電${d}`,'l-d');}
  if(e.doomTurns>0){const d=Math.round(e.hp*0.15);e.hp=Math.max(0,e.hp-d);addLog(`${e.n} 呪い-${d}`,'l-s');}
}
function enemyTurn(){
  const p=G.player;if(!aliveEnemies().length)return;
  tickPlayerStart();
  if(p.autoAtk>0){const e=setCurrentEnemy();if(e){e.hp=Math.max(0,e.hp-p.autoAtk);addLog(`自動攻撃 ${p.autoAtk}`,'l-s');}}
  let enemies=[...(G.enemies||[])].filter(e=>e.hp>0);
  for(const e of enemies){
    G.enemy=e;
    tickEnemyStatus(e);
    if(e.hp<=0)continue;
    if(e.stunTurns>0){e.stunTurns--;addLog(`${e.n}は気絶中`);continue;}
    if(e.bound>0){e.bound--;addLog(`${e.n}は束縛中`);continue;}
    if(e.confuse&&Math.random()<(e.confuse||0)){addLog(`${e.n}は混乱！`);continue;}
    const eatk=Math.max(1,e.atk-(e.debuffAtk||0));
    const d=applyDmgToPlayer(eatk);
    if(d!==undefined)addLog(`${e.s} ${e.n}の攻撃 ${d}ダメ`,'l-d');
    if(p.hp<=0){gameOver();return;}
    if(e.hp<=0)addLog(`${e.n}は反撃で倒れた！`,'l-h');
  }
  G.enemies=(G.enemies||[]).filter(e=>e.hp>0);
  if(G.enemies.length===0){encounterCleared();return;}
  setCurrentEnemy();renderGame();
}
function killEnemy(){
  const p=G.player;const e=G.enemy;
  if(!e)return;
  const gold=Math.round((e.g||0)*(p.goldBonus||1));const xp=e.x||0;
  p.gold+=gold;p.xp+=xp;
  if(p.killHeal>0)p.hp=Math.min(p.maxHp,p.hp+p.killHeal);
  giveMonsterDrops(e);
  addLog(`${e.n}撃破！ 💰+${gold} XP+${xp}`,'l-h');
  G.enemies=(G.enemies||[]).filter(x=>x!==e&&x.hp>0);
  checkLevelUp();
  if(G.enemies.length>0){setCurrentEnemy();renderGame();return;}
  encounterCleared();
}
function encounterCleared(){
  const p=G.player;
  tryChestDrop();
  if(getFloorInSeg()===5){showClear(true);}
  else setTimeout(()=>advanceFloor(),350);
}
function advanceFloor(){
  const p=G.player;ensureV3State(p);
  p.floor++;
  const m=metaV3();m.bestFloor=Math.max(m.bestFloor,p.floor);saveMetaV3(m);
  G.enemy=null;G.enemies=[];G.stageType=null;G.shopStock=null;
  showStageSelect();
}

function checkLevelUp(){
  const p=G.player;ensureV3State(p);
  while(p.xp>=p.xpNext){
    p.xp-=p.xpNext;p.lv++;p.xpNext=Math.round(p.xpNext*1.42);
    p.baseMaxHp+=10;p.baseMaxMp+=5;p.baseAtk+=1;p.baseDef+=1;
    p.statPoints+=3;
    recalcVitals(p);
    p.hp=Math.min(p.maxHp,p.hp+20);p.mp=Math.min(p.maxMp,p.mp+10);
    addLog(`🎉 Lv.${p.lv}！ ステータスポイント+3`,'l-h');
  }
}

function makeStageOptions(){
  const p=G.player;const fi=getFloorInSeg();
  if(fi===5){
    return [
      {type:'boss',icon:'👑',title:'ボスステージ',desc:'セグメント突破戦。勝つと職業解放が進む。',danger:'高'},
      {type:'boss_elite',icon:'💀',title:'凶暴ボス',desc:'かなり危険。ただし報酬と経験値が多い。',danger:'超高'},
      {type:'shop_preboss',icon:'🏪',title:'準備ショップ',desc:'買い物してからボス選択に戻る。',danger:'なし'}
    ];
  }
  const pool=[
    {type:'battle',icon:'⚔️',title:'雑魚パーティ',desc:'3〜4体の通常敵。素材集め向き。',danger:'中'},
    {type:'elite',icon:'🔥',title:'エリート',desc:'強敵。経験値・ゴールド多め。',danger:'高'},
    {type:'event',icon:'❔',title:'イベント',desc:'上振れも下振れもある運試し。',danger:'不明'},

function generateShopStock(){
  const p=G.player;const f=p.floor;const items=[];
  for(let i=0;i<6;i++){
    const slot=pick(['weapon','weapon','armor','armor','accessory']);
    const eq=makeEquip(slot,f);
    items.push({t:'equip',n:eq.n,d:`${eq.rarJp} / ${eq.slot} / ${statText(eq.stats)}`,c:Math.round(35+f*6+ADV_RARITIES.find(r=>r.id===eq.rar).mul*45),eq});
  }
  ['phys','mag','ult'].forEach(type=>{
    items.push({t:'skill',target:type,kind:'power',n:`${type==='phys'?'物理':type==='mag'?'魔法':'ULT'}強化カード`,d:'スキル倍率+0.25 / 説明も強化表示',c:90+f*8});
    items.push({t:'skill',target:type,kind:'cost',n:`${type==='phys'?'物理':type==='mag'?'魔法':'ULT'}省エネカード`,d:'消費MP-2',c:70+f*6});
  });
  items.push({t:'orb',orb:'atk',n:'スキルオーブ：攻撃強化',d:'パッシブ：物理/通常火力+8%',c:120+f*9});
  items.push({t:'orb',orb:'def',n:'スキルオーブ：防御強化',d:'パッシブ：被ダメージ-6%',c:120+f*9});
  items.push({t:'orb',orb:'hpdrain',n:'スキルオーブ：HPドレイン',d:'パッシブ：与ダメージの8%吸収',c:150+f*10});
  items.push({t:'orb',orb:'mpdrain',n:'スキルオーブ：MPドレイン',d:'パッシブ：攻撃時MP+3',c:140+f*10});
  POTION_DEF.forEach((po,i)=>items.push({t:'potion',pid:po.id,qty:i<2?2:1,n:`${po.jp}${i<2?'×2':''}`,d:`最大HPの${Math.round(po.pct*100)}%回復 / ${po.rare}`,c:20+f*2+i*35}));
  ADV_COLORS.forEach((c,i)=>items.push({t:'key',color:c,n:`${ADV_COLOR_ICON[c]} ${c}の鍵`,d:`${c}宝箱を1回開けられる`,c:30+f*3+i*70}));
  while(items.length<24)items.push({t:'material',mat:'万能素材',qty:R(2,5),n:'素材袋',d:'鍛冶で使う素材',c:25+f*2});
  return items.sort(()=>Math.random()-0.5).slice(0,20);
}

function rerollShop(){
  const p=G.player;const cost=40+p.floor*3;
  if(p.gold<cost){addLog('リロール資金不足！');return;}
  p.gold-=cost;G.shopStock=generateShopStock();addLog('ショップをリロール！','l-i');renderShop();
}
function buyShopItemV3(idx){
  const item=G.shopStock[idx];if(!item||item.sold)return;
  const p=G.player;ensureV3State(p);
  if(p.gold<item.c){addLog('所持金不足！');return;}
  p.gold-=item.c;item.sold=true;
  if(item.t==='equip'){p.inventory.equipment.push(item.eq);addLog(`${item.eq.n}入手！`,'l-i');}
  else if(item.t==='skill'){upgradeSkill(item.target,item.kind);addLog(`${item.n}使用！`,'l-s');}
  else if(item.t==='orb'){applyOrb(item.orb);addLog(`${item.n}装着！`,'l-s');}
  else if(item.t==='potion'){p.inventory.potions[item.pid]=(p.inventory.potions[item.pid]||0)+(item.qty||1);addLog(`${item.n}購入！`,'l-h');}
  else if(item.t==='key'){p.inventory.keys[item.color]=(p.inventory.keys[item.color]||0)+1;addLog(`${item.color}の鍵+1`,'l-i');}
  else if(item.t==='material'){p.materials[item.mat]=(p.materials[item.mat]||0)+(item.qty||1);addLog(`素材+${item.qty}`,'l-i');}
  syncEquipmentStats(p);recalcVitals(p);renderShop();renderGame();
}
function buyShopItem(item){ /* legacy adapter */ 
  if(item&&item.t){G.shopStock=[item];buyShopItemV3(0);}
}
function upgradeSkill(target,kind){
  const p=G.player;const sk=p[target];if(!sk)return;
  if(kind==='power'){sk.mul=(sk.mul||1)+.25;sk.d=(sk.d||sk.n)+` / 強化+${Math.round((sk.mul-1)*100)}%`;}
  if(kind==='cost')sk.cost=Math.max(0,(sk.cost||0)-2);
  if(kind==='cd'&&target==='ult')sk.cd=Math.max(1,(sk.cd||5)-1);
}
function applyOrb(orb){
  const p=G.player;p.skillOrbs.push(orb);
  if(orb==='atk')p.physBonus=(p.physBonus||1)+.08;
  if(orb==='def')p.dmgReduce=(p.dmgReduce||0)+.06;
  if(orb==='hpdrain')p.lifeSteal=(p.lifeSteal||0)+.08;
  if(orb==='mpdrain')p.mpOnAtk=(p.mpOnAtk||0)+3;
}

function openChest(color,auto){
  const p=G.player;ensureV3State(p);
  if((p.inventory.chests[color]||0)<=0){if(!auto)addLog(`${color}宝箱がない`);return;}
  if((p.inventory.keys[color]||0)<=0){if(!auto)addLog(`${color}の鍵がない`);return;}
  p.inventory.chests[color]--;p.inventory.keys[color]--;
  const rank=ADV_COLORS.indexOf(color);
  const gold=R(25,60)*(rank+1)+p.floor*R(2,5);
  p.gold+=gold;
  let msg=`${ADV_COLOR_ICON[color]}${color}宝箱OPEN！ G+${gold}`;
  if(Math.random()<.65){
    const eq=makeEquip(pick(['weapon','armor','accessory']),p.floor,ADV_RARITIES[Math.min(4,rank+R(0,1))]);
    p.inventory.equipment.push(eq);msg+=` / ${eq.n}`;
  }else{
    const po=POTION_DEF[Math.min(4,rank+1)];p.inventory.potions[po.id]=(p.inventory.potions[po.id]||0)+1;msg+=` / ${po.jp}`;
  }
  addLog(msg,'l-i');renderInventory();
}

function equipItem(id,slot){
  const p=G.player;ensureV3State(p);const it=getEquipById(p,id);if(!it)return;
  if(it.slot==='weapon'&&!['right','left'].includes(slot))return;
  if(it.slot==='accessory'&&!['acc1','acc2'].includes(slot))return;
  if(!['weapon','accessory'].includes(it.slot)&&slot!==it.slot)return;
  p.equip[slot]=id;syncEquipmentStats(p);recalcVitals(p);renderInventory();renderGame();
}

    else if(it.slot==='accessory')btns=`<button class="btn tiny-btn" onclick="equipItem('${it.id}','acc1')">アクセ1</button> <button class="btn tiny-btn" onclick="equipItem('${it.id}','acc2')">アクセ2</button>`;
    else btns=`<button class="btn tiny-btn" onclick="equipItem('${it.id}','${it.slot}')">装備</button>`;

function forgeEnhance(slot,free){
  const p=G.player;ensureV3State(p);const it=getEquipById(p,p.equip[slot]);
  if(!it||it.slot!=='weapon'){addLog(`${SLOT_LABEL[slot]}に武器がない`);return;}
  const cost=free?0:50+p.floor*4+(it.lv||1)*20;
  const matCost=free?0:2+(it.lv||1);
  if(p.gold<cost||(p.materials['万能素材']||0)<matCost){addLog('鍛冶素材かGold不足');return;}
  p.gold-=cost;p.materials['万能素材']=(p.materials['万能素材']||0)-matCost;
  it.lv=(it.lv||1)+1;it.stats.atk=(it.stats.atk||0)+R(3,7)+Math.floor(p.floor/5);
  it.n=it.n.replace(/\+目\+\d+/,'')+`+${it.lv-1}`;
  syncEquipmentStats(p);recalcVitals(p);addLog(`${it.n}を強化！`,'l-s');renderInventory();renderGame();
}
function fuseWeapons(){
  const p=G.player;ensureV3State(p);const used=equippedIds(p);
  const weapons=p.inventory.equipment.filter(x=>x.slot==='weapon'&&!used.has(x.id));
  if(weapons.length<2){addLog('未装備武器が2本必要');return;}
  const a=weapons[0],b=weapons[1];
  const nw=makeEquip('weapon',p.floor,ADV_RARITIES[Math.min(4,Math.max(ADV_RARITIES.findIndex(r=>r.id===a.rar),ADV_RARITIES.findIndex(r=>r.id===b.rar))+1)]);
  nw.n=`合成武器：${a.n.split(' ').pop()}×${b.n.split(' ').pop()}`;
  nw.stats.atk=Math.round(((a.stats.atk||0)+(b.stats.atk||0))*0.75+R(5,12));
  nw.stats.STR=(a.stats.STR||0)+(b.stats.STR||0)+1;
  p.inventory.equipment=p.inventory.equipment.filter(x=>x.id!==a.id&&x.id!==b.id);
  p.inventory.equipment.push(nw);
  addLog(`武器合成成功！ ${nw.n}`,'l-s');renderInventory();
}

function openStats(){ensureV3State(G.player);renderStats();go('stats');}
function renderStats(){
  const p=G.player;ensureV3State(p);
  document.getElementById('stat-points').textContent=p.statPoints;
  const g=document.getElementById('stat-grid-alloc');g.innerHTML='';
  const desc={
    HP:'最大HPが増える',MP:'最大MPが増える',STR:'攻撃力・物理火力',DEX:'命中/クリ率/攻撃補助',AGI:'素早さ',INT:'MPと魔法火力',VIT:'防御力とHP',LUK:'レアドロップ/宝箱/クリ率'
  };
  ['HP','MP','STR','DEX','AGI','INT','VIT','LUK'].forEach(k=>{
    const d=document.createElement('div');d.className='inv-item';
    d.innerHTML=`<b>${k}: ${p.stats[k]} <span class="muted">(+装備${p.equipStatBonus&&p.equipStatBonus[k]||0})</span></b><br>${desc[k]}<br><button class="btn tiny-btn" ${p.statPoints<=0?'disabled':''} onclick="allocateStat('${k}')">+1する</button>`;
    g.appendChild(d);
  });
}
function allocateStat(k){
  const p=G.player;ensureV3State(p);
  if(p.statPoints<=0)return;
  p.statPoints--;p.stats[k]=(p.stats[k]||0)+1;syncEquipmentStats(p);recalcVitals(p);renderStats();renderGame();
}

function addLog(msg,cls){
  const log=document.getElementById('action-log');if(!log)return;
  const d=document.createElement('div');d.className='log-line'+(cls?' '+cls:'');d.textContent=msg;
  log.appendChild(d);
  while(log.children.length>3)log.removeChild(log.firstChild);
}
